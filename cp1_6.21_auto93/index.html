<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>室内声音传播可视化工具</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a1a;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        color: #e0e0ff;
      }

      #app {
        width: 100%;
        height: 100%;
        position: relative;
        background: linear-gradient(180deg, #0a1628 0%, #050510 100%);
      }

      #canvas-container {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
      }

      #canvas-container canvas {
        display: block;
      }

      #panel-container {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 300px;
        z-index: 100;
      }

      .dg.ac {
        z-index: 100 !important;
      }

      .dg.main {
        width: 300px !important;
      }

      .dg .c {
        width: 200px !important;
      }

      .dg .slider {
        background: linear-gradient(90deg, #4a6fa5 0%, #6ab7ff 100%) !important;
      }

      .dg .slider-fg {
        background: #6ab7ff !important;
      }

      .dg .property-name {
        color: #e0e0ff !important;
        text-shadow: none !important;
      }

      .dg li:not(.folder) {
        background: rgba(26, 26, 46, 0.9) !important;
        border-bottom: 1px solid rgba(106, 183, 255, 0.1) !important;
      }

      .dg li.title {
        background: rgba(40, 50, 80, 0.95) !important;
        color: #6ab7ff !important;
        font-weight: 600 !important;
        letter-spacing: 1px;
        border-left: 3px solid #6ab7ff !important;
      }

      .dg .folder {
        border: 1px solid rgba(106, 183, 255, 0.2) !important;
        border-radius: 6px;
        margin-bottom: 6px;
        overflow: hidden;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      .dg.main ul {
        background: rgba(26, 26, 46, 0.85) !important;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-radius: 8px;
        padding: 4px;
      }

      .dg .number input,
      .dg .string input {
        color: #6ab7ff !important;
        background: rgba(10, 10, 26, 0.6) !important;
        border: 1px solid rgba(106, 183, 255, 0.3) !important;
      }

      #stats {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(26, 26, 46, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 12px 16px;
        border-radius: 8px;
        border: 1px solid rgba(106, 183, 255, 0.2);
        font-size: 13px;
        z-index: 50;
      }

      #stats .row {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        margin: 4px 0;
      }

      #stats .label {
        color: #8a8ab5;
      }

      #stats .value {
        color: #6ab7ff;
        font-weight: 600;
      }

      #instructions {
        position: absolute;
        bottom: 20px;
        left: 20px;
        background: rgba(26, 26, 46, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 12px 16px;
        border-radius: 8px;
        border: 1px solid rgba(106, 183, 255, 0.2);
        font-size: 12px;
        line-height: 1.6;
        z-index: 50;
        max-width: 280px;
      }

      #instructions .title {
        color: #6ab7ff;
        font-weight: 600;
        margin-bottom: 6px;
        font-size: 13px;
      }

      #instructions span.key {
        display: inline-block;
        background: rgba(106, 183, 255, 0.2);
        padding: 1px 6px;
        border-radius: 4px;
        margin: 0 2px;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="canvas-container"></div>
      <div id="panel-container"></div>
      <div id="stats">
        <div class="row"><span class="label">FPS</span><span class="value" id="fps">--</span></div>
        <div class="row"><span class="label">射线数</span><span class="value" id="ray-count">--</span></div>
        <div class="row"><span class="label">反射总数</span><span class="value" id="reflection-count">--</span></div>
      </div>
      <div id="instructions">
        <div class="title">操作指南</div>
        <div><span class="key">左键拖拽</span> 旋转视角</div>
        <div><span class="key">右键拖拽</span> 平移场景</div>
        <div><span class="key">滚轮</span> 缩放视图</div>
        <div><span class="key">鼠标悬停</span> 高亮墙面</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
