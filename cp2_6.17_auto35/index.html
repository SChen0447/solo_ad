<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>像素平台跳跃 - 关卡编辑器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #2F2F2F;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      color: #fff;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    #game-wrapper {
      position: relative;
      width: 1000px;
      height: 660px;
      background: #2F2F2F;
      border: 2px solid #8B4513;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #game-canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: crosshair;
    }

    #ui-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #ui-container * {
      pointer-events: auto;
    }

    .toolbar {
      position: absolute;
      right: 0;
      top: 0;
      width: 200px;
      height: 600px;
      background: #3a3a3a;
      border-left: 2px solid #8B4513;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toolbar-title {
      font-size: 14px;
      color: #DAA520;
      margin-bottom: 8px;
      text-align: center;
      border-bottom: 1px solid #8B4513;
      padding-bottom: 6px;
    }

    .tool-btn {
      width: 48px;
      height: 48px;
      background: #4a4a4a;
      border: 1px solid #666;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      font-size: 10px;
      color: #fff;
      font-family: monospace;
      font-weight: bold;
      position: relative;
    }

    .tool-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 2px 8px rgba(218, 165, 32, 0.5);
      border-color: #DAA520;
    }

    .tool-btn.active {
      background: #DAA520;
      border-color: #FFD700;
      color: #2F2F2F;
    }

    .tool-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .switch-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background: #3a3a3a;
      border-top: 2px solid #8B4513;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .switch-btn {
      height: 30px;
      padding: 0 24px;
      background: #4a4a4a;
      border: 1px solid #666;
      color: #fff;
      font-family: monospace;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    .switch-btn:hover {
      transform: translateY(-2px);
    }

    .switch-btn.active {
      background: #DAA520;
      color: #2F2F2F;
      border-color: #FFD700;
    }

    .score-display {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 20px;
      color: #FFD700;
      text-shadow: 2px 2px 0 #000;
    }

    .hint-text {
      position: absolute;
      bottom: 70px;
      left: 20px;
      font-size: 12px;
      color: #999;
    }

    .tool-preview {
      width: 32px;
      height: 32px;
      image-rendering: pixelated;
    }

    @media (max-width: 1280px) {
      #game-wrapper {
        transform: scale(0.75);
        transform-origin: center center;
      }
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <canvas id="game-canvas" width="1000" height="660"></canvas>
    <div id="ui-container">
      <div class="toolbar" id="editor-toolbar">
        <div class="toolbar-title">地形块</div>
        <div class="tool-row" id="terrain-tools"></div>
        <div class="toolbar-title" style="margin-top: 10px;">实体</div>
        <div class="tool-row" id="entity-tools"></div>
        <div class="toolbar-title" style="margin-top: 10px;">工具</div>
        <div class="tool-row" id="utility-tools"></div>
      </div>
      <div class="score-display" id="score-display" style="display: none;">分数: 0</div>
      <div class="hint-text" id="hint-text">快捷键: 1=编辑 2=游玩 | WASD=移动跳跃 | 点击放置/擦除</div>
      <div class="switch-bar">
        <button class="switch-btn active" id="btn-edit">编辑 (1)</button>
        <button class="switch-btn" id="btn-play">游玩 (2)</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
