<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 地形沙盒 - 六轮小车驾驶模拟</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #0a1628;
      color: #ffffff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #hud-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a1628 0%, #1e3a5f 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.8s ease-out;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-title {
      font-size: 32px;
      font-weight: 300;
      letter-spacing: 8px;
      margin-bottom: 40px;
      background: linear-gradient(90deg, #4fc3f7, #81d4fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .progress-container {
      width: 300px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #4fc3f7, #29b6f6);
      width: 0%;
      transition: width 0.3s ease-out;
      box-shadow: 0 0 20px rgba(79, 195, 247, 0.5);
    }

    .loading-text {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 2px;
    }

    #ready-text {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 12px;
      color: #4fc3f7;
      opacity: 0;
      text-shadow: 0 0 30px rgba(79, 195, 247, 0.5);
      pointer-events: none;
      z-index: 20;
    }

    #ready-text.visible {
      animation: fadeInOut 3s ease-in-out forwards;
    }

    #ready-text::after {
      content: '|';
      display: inline-block;
      animation: blink 0.8s infinite;
      margin-left: 4px;
    }

    @keyframes fadeInOut {
      0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
      20% { opacity: 1; transform: translateX(-50%) translateY(0); }
      80% { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    .control-panel {
      position: absolute;
      top: 24px;
      left: 24px;
      padding: 20px 24px;
      background: rgba(30, 58, 95, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      border: 1px solid rgba(79, 195, 247, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      min-width: 220px;
    }

    .panel-title {
      font-size: 14px;
      font-weight: 600;
      color: #4fc3f7;
      margin-bottom: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .control-item {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.85);
    }

    .control-item:last-child {
      margin-bottom: 0;
    }

    .key-cap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 24px;
      padding: 0 8px;
      margin-right: 12px;
      background: rgba(79, 195, 247, 0.15);
      border: 1px solid rgba(79, 195, 247, 0.3);
      border-radius: 6px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 11px;
      font-weight: 600;
      color: #4fc3f7;
    }

    .key-cap.wide {
      min-width: 60px;
    }

    .gauges-container {
      position: absolute;
      bottom: 24px;
      right: 24px;
      display: flex;
      gap: 20px;
      pointer-events: none;
    }

    .gauge {
      width: 140px;
      height: 140px;
      position: relative;
      background: rgba(30, 58, 95, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 50%;
      border: 2px solid rgba(79, 195, 247, 0.3);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                  inset 0 0 30px rgba(79, 195, 247, 0.1);
    }

    .gauge-canvas {
      width: 100%;
      height: 100%;
    }

    .gauge-label {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .gauge-value {
      position: absolute;
      top: 55%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 20px;
      font-weight: 600;
      color: #4fc3f7;
      text-shadow: 0 0 10px rgba(79, 195, 247, 0.5);
    }

    .gauge-unit {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.5);
      margin-left: 2px;
    }

    .fps-counter {
      position: absolute;
      top: 24px;
      right: 24px;
      padding: 8px 16px;
      background: rgba(30, 58, 95, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 8px;
      border: 1px solid rgba(79, 195, 247, 0.2);
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 14px;
      color: #4fc3f7;
    }

    .fps-label {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.5);
      margin-right: 6px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="hud-container">
      <div id="loading-screen">
        <div class="loading-title">TERRAIN SANDBOX</div>
        <div class="progress-container">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="loading-text" id="loading-text">正在初始化场景...</div>
      </div>
      <div id="ready-text"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
