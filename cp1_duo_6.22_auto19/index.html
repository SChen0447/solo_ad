<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>复古掌机宠物养成</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #B5B58B;
      font-family: 'Press Start 2P', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    #console {
      background: #8B8B6B;
      border: 4px solid #333;
      border-radius: 16px;
      padding: 16px;
      width: 380px;
      max-width: 95vw;
      box-shadow:
        inset 2px 2px 0 #A0A080,
        inset -2px -2px 0 #6B6B4B,
        6px 6px 0 #444,
        8px 8px 0 #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #screen-bezel {
      background: #222;
      border: 3px solid #111;
      border-radius: 8px;
      padding: 8px;
      width: 100%;
      position: relative;
    }

    #screen {
      display: block;
      width: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #333;
      background: #9BBC0F;
    }

    #state-label {
      color: #333;
      font-size: 10px;
      text-align: center;
      margin-top: 4px;
      min-height: 16px;
      transition: opacity 0.3s ease-in-out;
    }

    #button-panel {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .pet-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      padding: 10px 14px;
      border: 2px solid #555;
      border-radius: 6px;
      cursor: pointer;
      color: #222;
      background: linear-gradient(180deg, #C8C8A0 0%, #A0A078 100%);
      box-shadow:
        2px 2px 0 #555,
        -1px -1px 0 #DDD8B8,
        inset 1px 1px 0 #DDD8B8,
        inset -1px -1px 0 #777758;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      user-select: none;
      -webkit-user-select: none;
    }

    .pet-btn:hover {
      transform: scale(1.1);
    }

    .pet-btn:active {
      transform: translateY(2px);
      box-shadow:
        0px 0px 0 #555,
        -1px -1px 0 #DDD8B8,
        inset 1px 1px 0 #777758,
        inset -1px -1px 0 #DDD8B8;
    }

    @media (max-width: 768px) and (min-width: 320px) {
      #console {
        width: 95vw;
        padding: 12px;
      }

      .pet-btn {
        font-size: 8px;
        padding: 8px 10px;
      }

      #state-label {
        font-size: 8px;
      }
    }
  </style>
</head>
<body>
  <div id="console">
    <div id="screen-bezel">
      <canvas id="screen" width="320" height="288"></canvas>
    </div>
    <div id="state-label">状态: 站立中...</div>
    <div id="button-panel"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
