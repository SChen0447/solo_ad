<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>复古掌机宠物养成</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #B5B58B;
      font-family: 'Press Start 2P', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    #console {
      background: #8B8B6B;
      border: 4px solid #333;
      border-radius: 16px;
      padding: 16px;
      width: 380px;
      max-width: 95vw;
      box-shadow:
        inset 2px 2px 0 #A0A080,
        inset -2px -2px 0 #6B6B4B,
        6px 6px 0 #444,
        8px 8px 0 #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #screen-bezel {
      background: #222;
      border: 3px solid #111;
      border-radius: 8px;
      padding: 8px;
      width: 100%;
      position: relative;
    }

    #canvas-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 320 / 288;
    }

    #screen {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #333;
      background: #9BBC0F;
    }

    #stats-panel {
      position: absolute;
      top: 5%;
      left: 6%;
      display: flex;
      flex-direction: column;
      gap: 9%;
      z-index: 10;
      pointer-events: none;
      width: 26%;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-bottom: 10%;
    }

    .stat-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: #306230;
    }

    .stat-bar-container {
      width: 100%;
      height: 12px;
      background: #0F380F;
      border: 1px solid #306230;
      position: relative;
      overflow: hidden;
    }

    .stat-bar-fill {
      height: 100%;
      width: 70%;
      transition: width 0.5s ease-in-out, background-color 0.5s ease-in-out;
      background-color: #00AA00;
    }

    .stat-value {
      position: absolute;
      right: -34px;
      top: -1px;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: #306230;
    }

    #state-label {
      color: #333;
      font-size: 10px;
      text-align: center;
      margin-top: 4px;
      min-height: 16px;
      transition: opacity 0.3s ease-in-out;
    }

    #button-panel {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .pet-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: #222;
      position: relative;
      background: linear-gradient(180deg, #E8E8C8 0%, #B8B888 60%, #989868 100%);
      box-shadow:
        0 4px 0 #555,
        0 5px 0 #333,
        0 6px 2px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 #FFF,
        inset 0 -1px 0 #777758,
        inset 1px 0 0 #FFF8D0,
        inset -1px 0 0 #777758;
      border-top: 2px solid #FFF8D0;
      border-left: 2px solid #FFF8D0;
      border-right: 2px solid #777758;
      border-bottom: 2px solid #555;
      transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.15s ease,
                  margin-top 0.15s ease;
      user-select: none;
      -webkit-user-select: none;
      outline: none;
    }

    .pet-btn:hover {
      transform: scale(1.1);
    }

    .pet-btn:active,
    .pet-btn.pressed {
      transform: translateY(2px);
      box-shadow:
        0 2px 0 #555,
        0 3px 0 #333,
        0 4px 2px rgba(0, 0, 0, 0.4),
        inset 0 2px 4px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 #777758;
      border-top-color: #777758;
      border-left-color: #777758;
      margin-top: 2px;
    }

    @keyframes btnReleaseBounce {
      0% { transform: translateY(2px) scale(1); }
      50% { transform: translateY(-2px) scale(1.05); }
      75% { transform: translateY(0) scale(1.02); }
      100% { transform: translateY(0) scale(1); }
    }

    .pet-btn.releasing {
      animation: btnReleaseBounce 0.2s ease-out;
    }

    @media (max-width: 768px) and (min-width: 320px) {
      #console {
        width: 95vw;
        padding: 12px;
      }

      .pet-btn {
        font-size: 8px;
        padding: 8px 10px;
      }

      #state-label {
        font-size: 8px;
      }
    }
  </style>
</head>
<body>
  <div id="console">
    <div id="screen-bezel">
      <div id="canvas-wrapper">
        <canvas id="screen" width="320" height="288"></canvas>
        <div id="stats-panel">
          <div class="stat-item">
            <div class="stat-label">饱食</div>
            <div class="stat-bar-container">
              <div class="stat-bar-fill" data-stat="hunger"></div>
              <span class="stat-value" data-stat-value="hunger">70</span>
            </div>
          </div>
          <div class="stat-item">
            <div class="stat-label">快乐</div>
            <div class="stat-bar-container">
              <div class="stat-bar-fill" data-stat="happiness"></div>
              <span class="stat-value" data-stat-value="happiness">70</span>
            </div>
          </div>
          <div class="stat-item">
            <div class="stat-label">精力</div>
            <div class="stat-bar-container">
              <div class="stat-bar-fill" data-stat="energy"></div>
              <span class="stat-value" data-stat-value="energy">70</span>
            </div>
          </div>
          <div class="stat-item">
            <div class="stat-label">健康</div>
            <div class="stat-bar-container">
              <div class="stat-bar-fill" data-stat="health"></div>
              <span class="stat-value" data-stat-value="health">70</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="state-label">状态: 站立中...</div>
    <div id="button-panel"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
