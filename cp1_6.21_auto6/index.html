<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>协作文档 - 团队在线文档协作平台</title>
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body, #root {
        height: 100%;
        width: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      }
      .ql-container {
        font-size: 15px;
      }
      .ql-editor {
        min-height: 500px;
        line-height: 1.8;
      }
      .ql-editor h1 {
        font-size: 2em;
        font-weight: 700;
        margin-bottom: 16px;
      }
      .ql-editor h2 {
        font-size: 1.5em;
        font-weight: 600;
        margin-bottom: 12px;
      }
      .ql-editor h3 {
        font-size: 1.25em;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .ql-editor p {
        margin-bottom: 8px;
      }
      .virtual-scroll-container {
        position: relative;
        overflow-y: auto;
      }
      .virtual-scroll-phantom {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        z-index: -1;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/client/app.tsx"></script>
  </body>
</html>
