<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💭</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>思维回响 - 匿名情绪共鸣板</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body, #root {
        width: 100%;
        height: 100%;
        overflow-x: hidden;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 35%, #3b2d5a 70%, #4a4458 100%);
        background-attachment: fixed;
        min-height: 100vh;
        color: #fff;
      }
      .loading-logo {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 2.5rem;
        font-weight: 300;
        letter-spacing: 0.5em;
        color: rgba(255, 255, 255, 0.9);
        opacity: 0;
        animation: logoFadeIn 1.2s ease-out forwards;
        text-shadow: 0 0 40px rgba(168, 139, 250, 0.5);
      }
      .loading-logo span {
        display: inline-block;
        opacity: 0;
        animation: charFadeIn 0.6s ease-out forwards;
      }
      .loading-logo span:nth-child(1) { animation-delay: 0.1s; }
      .loading-logo span:nth-child(2) { animation-delay: 0.25s; }
      .loading-logo span:nth-child(3) { animation-delay: 0.4s; }
      .loading-logo span:nth-child(4) { animation-delay: 0.55s; }
      @keyframes logoFadeIn {
        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.95); }
        100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      }
      @keyframes charFadeIn {
        0% { opacity: 0; transform: translateY(10px); }
        100% { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div class="loading-logo">
      <span>思</span><span>维</span><span>回</span><span>响</span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const logo = document.querySelector('.loading-logo');
          if (logo) {
            logo.style.transition = 'opacity 0.6s ease-out';
            logo.style.opacity = '0';
            setTimeout(() => logo.remove(), 600);
          }
        }, 1200);
      });
    </script>
  </body>
</html>
