<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>协作文档编辑器</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        height: 100%;
        width: 100%;
      }
      body {
        background: linear-gradient(135deg, #fafafa 0%, #f0f0f0 100%);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      }
      #root {
        height: 100%;
        width: 100%;
      }
      .home-container {
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
      }
      .home-title {
        font-size: 48px;
        font-weight: 700;
        color: #1e1e1e;
        text-align: center;
      }
      .home-subtitle {
        font-size: 18px;
        color: #666;
        text-align: center;
        max-width: 500px;
        line-height: 1.6;
      }
      .create-btn {
        padding: 16px 48px;
        font-size: 18px;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #007acc 0%, #005a99 100%);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: filter 0.3s ease;
      }
      .create-btn:hover {
        filter: brightness(1.1);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
