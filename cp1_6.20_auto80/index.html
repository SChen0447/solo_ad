<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Music Visualizer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000000;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #ffffff;
      }

      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }

      #canvas-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      #sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: 200px;
        height: 100%;
        background: rgba(20, 20, 20, 0.7);
        backdrop-filter: blur(10px);
        padding: 20px 16px;
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 16px;
        transform: translateX(-100%);
        animation: slideIn 0.3s ease-out forwards;
        border-right: 1px solid rgba(255, 255, 255, 0.08);
      }

      @keyframes slideIn {
        to {
          transform: translateX(0);
        }
      }

      .sidebar-title {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
        color: #ff3366;
        text-transform: uppercase;
      }

      .file-btn,
      .layout-btn,
      .play-btn-sidebar {
        width: 100%;
        height: 32px;
        border: none;
        border-radius: 4px;
        background: rgba(30, 30, 30, 0.8);
        color: #ffffff;
        font-size: 12px;
        cursor: pointer;
        transition: background-color 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      .file-btn:hover,
      .layout-btn:hover,
      .play-btn-sidebar:hover {
        background: rgba(102, 102, 102, 0.8);
      }

      .layout-btn.active {
        background: #ff3366;
      }

      .layout-btn.active:hover {
        background: #ff4d7a;
      }

      .play-btn-sidebar {
        height: 36px;
        font-size: 13px;
        font-weight: 500;
      }

      .layout-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .info-panel {
        background: rgba(0, 0, 0, 0.4);
        border-radius: 4px;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12px;
      }

      .info-label {
        color: rgba(255, 255, 255, 0.6);
      }

      .info-value {
        color: #ffffff;
        font-weight: 500;
        font-variant-numeric: tabular-nums;
      }

      #top-bar {
        position: fixed;
        top: 16px;
        left: 216px;
        right: 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        z-index: 10;
      }

      .play-btn-circle {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: #4a4a4a;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background-color 0.15s ease;
        flex-shrink: 0;
      }

      .play-btn-circle:hover {
        background: #666666;
      }

      .play-btn-circle svg {
        width: 14px;
        height: 14px;
        fill: #ffffff;
      }

      .progress-container {
        flex: 1;
        height: 6px;
        background: #333333;
        border-radius: 3px;
        overflow: hidden;
        position: relative;
      }

      .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #ff3366, #3366ff);
        border-radius: 3px;
        width: 0%;
        transition: width 0.2s ease;
      }

      #speed-label {
        position: fixed;
        top: 16px;
        right: 16px;
        background: rgba(0, 0, 0, 0.6);
        color: #ffffff;
        font-size: 14px;
        padding: 6px 12px;
        border-radius: 4px;
        z-index: 10;
        font-variant-numeric: tabular-nums;
      }

      .divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.08);
        margin: 4px 0;
      }

      .hint-text {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.4);
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="canvas-container"></div>

      <div id="sidebar">
        <div>
          <div class="sidebar-title">Music Viz</div>
          <div class="hint-text">三维音乐可视化系统</div>
        </div>

        <div class="divider"></div>

        <button id="file-btn" class="file-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          选择文件
        </button>
        <input type="file" id="file-input" accept=".wav,.mp3,audio/wav,audio/mpeg" style="display: none" />

        <button id="play-sidebar" class="play-btn-sidebar" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
          <span id="play-sidebar-text">播放</span>
        </button>

        <div class="divider"></div>

        <div>
          <div class="sidebar-title" style="font-size: 12px; margin-bottom: 8px;">布局模式</div>
          <div class="layout-group">
            <button class="layout-btn active" data-layout="sphere">球壳分布 (1)</button>
            <button class="layout-btn" data-layout="spiral">螺旋分布 (2)</button>
            <button class="layout-btn" data-layout="waterfall">瀑布分布 (3)</button>
          </div>
        </div>

        <div class="divider"></div>

        <div>
          <div class="sidebar-title" style="font-size: 12px; margin-bottom: 8px;">音频分析</div>
          <div class="info-panel">
            <div class="info-row">
              <span class="info-label">频率峰值</span>
              <span class="info-value" id="peak-freq">-- Hz</span>
            </div>
            <div class="info-row">
              <span class="info-label">平均振幅</span>
              <span class="info-value" id="avg-amp">--</span>
            </div>
            <div class="info-row">
              <span class="info-label">RMS</span>
              <span class="info-value" id="rms-val">--</span>
            </div>
          </div>
        </div>

        <div style="margin-top: auto;">
          <div class="hint-text">
            快捷键:<br/>
            1/2/3 切换布局<br/>
            +/- 调节速度
          </div>
        </div>
      </div>

      <div id="top-bar">
        <button id="play-top" class="play-btn-circle" disabled>
          <svg id="play-icon-top" viewBox="0 0 24 24">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
        </button>
        <div class="progress-container">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
      </div>

      <div id="speed-label">1.0x</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
