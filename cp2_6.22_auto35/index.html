<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>三维雕塑展示台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0A0A23;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 80px;
      background: rgba(26, 26, 46, 0.85);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .nav-content {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .nav-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #16213E;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .nav-btn:hover {
      filter: brightness(1.1);
    }

    .nav-btn:active {
      transform: scale(0.95);
      transition: transform 0.1s;
    }

    .nav-btn svg {
      width: 16px;
      height: 16px;
      fill: #E0E0E0;
    }

    .sculpture-name {
      font-size: 18px;
      color: #E0E0E0;
      min-width: 200px;
      text-align: center;
      font-weight: 500;
    }

    .control-panel {
      position: absolute;
      top: 50%;
      right: 20px;
      transform: translateY(-50%) translateX(100%);
      width: 280px;
      background: rgba(22, 33, 62, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 16px;
      z-index: 20;
      transition: transform 0.3s ease-out;
      border: 1px solid rgba(74, 0, 224, 0.5);
      box-shadow: 0 0 20px rgba(74, 0, 224, 0.2);
    }

    .control-panel.open {
      transform: translateY(-50%) translateX(0);
    }

    .panel-title {
      font-size: 16px;
      font-weight: bold;
      color: #FFFFFF;
      margin-bottom: 20px;
    }

    .control-group {
      margin-bottom: 20px;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .control-label span:first-child {
      font-size: 12px;
      color: #9CA3AF;
    }

    .control-value {
      font-size: 16px;
      font-weight: bold;
      color: #FFFFFF;
    }

    .slider {
      --fill: 50%;
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right, #4A00E0 0%, #7C3AED var(--fill), #2D3748 var(--fill), #2D3748 100%);
      outline: none;
      cursor: pointer;
      transition: filter 0.2s, background 0.15s;
    }

    .slider:hover {
      background: linear-gradient(to right, #4A00E0 0%, #7C3AED var(--fill), #6B21E6 var(--fill), #6B21E6 100%);
      filter: brightness(1.05);
    }

    .slider::-webkit-slider-runnable-track {
      height: 6px;
      border-radius: 3px;
      background: transparent;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #FFFFFF;
      cursor: pointer;
      border: none;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
      margin-top: -7px;
      transition: transform 0.1s ease, box-shadow 0.2s ease, width 0.1s ease, height 0.1s ease;
    }

    .slider:hover::-webkit-slider-thumb {
      width: 24px;
      height: 24px;
      margin-top: -9px;
      box-shadow: 0 0 8px rgba(123, 58, 237, 0.6), 0 0 20px rgba(74, 0, 224, 0.3), 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    .slider::-webkit-slider-thumb:active {
      transform: scale(0.92);
      box-shadow: 0 0 12px rgba(123, 58, 237, 0.8), 0 0 24px rgba(74, 0, 224, 0.4), 0 2px 8px rgba(0, 0, 0, 0.4);
    }

    .slider::-moz-range-track {
      height: 6px;
      border-radius: 3px;
      background: #2D3748;
      border: none;
    }

    .slider::-moz-range-progress {
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right, #4A00E0, #7C3AED);
      border: none;
    }

    .slider:hover::-moz-range-track {
      background: #6B21E6;
    }

    .slider:hover::-moz-range-progress {
      background: linear-gradient(to right, #4A00E0, #7C3AED);
      filter: brightness(1.05);
    }

    .slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #FFFFFF;
      cursor: pointer;
      border: none;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
      transition: transform 0.1s ease, box-shadow 0.2s ease, width 0.1s ease, height 0.1s ease;
    }

    .slider:hover::-moz-range-thumb {
      width: 24px;
      height: 24px;
      box-shadow: 0 0 8px rgba(123, 58, 237, 0.6), 0 0 20px rgba(74, 0, 224, 0.3), 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    .slider::-moz-range-thumb:active {
      transform: scale(0.92);
      box-shadow: 0 0 12px rgba(123, 58, 237, 0.8), 0 0 24px rgba(74, 0, 224, 0.4), 0 2px 8px rgba(0, 0, 0, 0.4);
    }

    .panel-toggle {
      position: absolute;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      width: 40px;
      height: 80px;
      background: rgba(22, 33, 62, 0.95);
      border: 1px solid rgba(74, 0, 224, 0.5);
      border-right: none;
      border-radius: 20px 0 0 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 15;
      transition: all 0.3s ease;
    }

    .panel-toggle:hover {
      filter: brightness(1.1);
    }

    .panel-toggle:active {
      transform: translateY(-50%) scale(0.95);
    }

    .panel-toggle svg {
      width: 20px;
      height: 20px;
      fill: #E0E0E0;
      transition: transform 0.3s ease;
    }

    .panel-toggle.open svg {
      transform: rotate(180deg);
    }

    .magnifier {
      position: absolute;
      width: 200px;
      height: 200px;
      border: 2px solid #FFFFFF;
      border-radius: 50%;
      pointer-events: none;
      z-index: 30;
      overflow: hidden;
      display: none;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
    }

    .magnifier.active {
      display: block;
    }

    .magnifier-canvas {
      width: 100%;
      height: 100%;
    }

    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #E0E0E0;
      font-size: 18px;
      z-index: 100;
    }

    .hint {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #9CA3AF;
      font-size: 12px;
      z-index: 10;
      background: rgba(22, 33, 62, 0.8);
      padding: 8px 16px;
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    
    <div class="loading" id="loading">加载中...</div>
    
    <div class="hint">拖拽旋转 · 滚轮缩放 · 按 Z 键放大镜</div>
    
    <div class="bottom-nav">
      <div class="nav-content">
        <button class="nav-btn" id="prev-btn">
          <svg viewBox="0 0 24 24">
            <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
          </svg>
        </button>
        <div class="sculpture-name" id="sculpture-name">几何抽象</div>
        <button class="nav-btn" id="next-btn">
          <svg viewBox="0 0 24 24">
            <path d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="panel-toggle" id="panel-toggle">
      <svg viewBox="0 0 24 24">
        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
      </svg>
    </button>

    <div class="control-panel" id="control-panel">
      <div class="panel-title">材质与光照</div>
      
      <div class="control-group">
        <div class="control-label">
          <span>金属度</span>
          <span class="control-value" id="metalness-value">0.50</span>
        </div>
        <input type="range" class="slider" id="metalness-slider" min="0" max="1" step="0.01" value="0.5">
      </div>
      
      <div class="control-group">
        <div class="control-label">
          <span>粗糙度</span>
          <span class="control-value" id="roughness-value">0.50</span>
        </div>
        <input type="range" class="slider" id="roughness-slider" min="0" max="1" step="0.01" value="0.5">
      </div>
      
      <div class="control-group">
        <div class="control-label">
          <span>环境光强度</span>
          <span class="control-value" id="ambient-value">1.0</span>
        </div>
        <input type="range" class="slider" id="ambient-slider" min="0.5" max="2" step="0.1" value="1">
      </div>
    </div>

    <div class="magnifier" id="magnifier">
      <canvas class="magnifier-canvas" id="magnifier-canvas"></canvas>
    </div>
  </div>

  <script>
    (function() {
      function updateSliderFill(slider) {
        var pct = ((slider.value - slider.min) / (slider.max - slider.min)) * 100;
        slider.style.setProperty('--fill', pct + '%');
      }
      document.querySelectorAll('.slider').forEach(function(slider) {
        updateSliderFill(slider);
        slider.addEventListener('input', function() { updateSliderFill(slider); });
      });
    })();
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
