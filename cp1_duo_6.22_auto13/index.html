<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>城市交通3D可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #stats-panel {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(22, 33, 62, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(15, 52, 96, 0.5);
      border-radius: 12px;
      padding: 16px;
      color: #e0e0e0;
      font-size: 14px;
      z-index: 100;
      min-width: 220px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease, opacity 0.3s ease;
      cursor: move;
      user-select: none;
      -webkit-user-select: none;
    }
    #stats-panel.collapsed .stats-content {
      display: none;
    }
    #stats-panel.collapsed {
      padding: 8px 12px;
    }
    .stats-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-weight: 600;
      font-size: 15px;
      color: #fff;
    }
    .stats-toggle {
      background: none;
      border: none;
      color: #e0e0e0;
      cursor: pointer;
      font-size: 18px;
      padding: 2px 6px;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .stats-toggle:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    .stats-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .stats-item:last-child {
      border-bottom: none;
    }
    .stats-label {
      color: #a0a0b0;
    }
    .stats-value {
      font-weight: 600;
      color: #4fc3f7;
    }
    #time-slider-container {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(22, 33, 62, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(15, 52, 96, 0.5);
      border-radius: 12px;
      padding: 14px 18px;
      color: #e0e0e0;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease;
    }
    .time-label {
      font-size: 13px;
      color: #a0a0b0;
      margin-bottom: 8px;
    }
    .time-display {
      font-size: 24px;
      font-weight: 700;
      color: #4fc3f7;
      margin-bottom: 8px;
      text-align: center;
    }
    #time-slider {
      width: 200px;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: #0f3460;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }
    #time-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      background: #4fc3f7;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 8px rgba(79, 195, 247, 0.4);
    }
    #time-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 4px 12px rgba(79, 195, 247, 0.6);
    }
    #time-slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      background: #4fc3f7;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 8px rgba(79, 195, 247, 0.4);
    }
    #mobile-drawer-toggle {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 101;
      background: #0f3460;
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }
    #mobile-drawer {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(22, 33, 62, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      padding: 20px;
      z-index: 102;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      max-height: 70vh;
      overflow-y: auto;
    }
    #mobile-drawer.open {
      transform: translateY(0);
    }
    .drawer-handle {
      width: 40px;
      height: 4px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 2px;
      margin: 0 auto 16px;
    }
    @media (max-width: 768px) {
      #stats-panel {
        top: 12px;
        left: 12px;
        right: 12px;
        min-width: auto;
        font-size: 13px;
      }
      #time-slider-container {
        display: none;
      }
      #mobile-drawer-toggle {
        display: block;
      }
      #mobile-drawer {
        display: block;
      }
    }
    .lil-gui {
      --width: 300px;
    }
    @media (max-width: 768px) {
      .lil-gui {
        --width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="scene-canvas"></canvas>
    
    <div id="stats-panel">
      <div class="stats-header">
        <span>交通统计</span>
        <button class="stats-toggle" id="stats-toggle">−</button>
      </div>
      <div class="stats-content">
        <div class="stats-item">
          <span class="stats-label">总车辆数</span>
          <span class="stats-value" id="stat-vehicles">0</span>
        </div>
        <div class="stats-item">
          <span class="stats-label">平均速度</span>
          <span class="stats-value" id="stat-speed">0 km/h</span>
        </div>
        <div class="stats-item">
          <span class="stats-label">拥堵路段</span>
          <span class="stats-value" id="stat-congested">0</span>
        </div>
        <div class="stats-item">
          <span class="stats-label">FPS</span>
          <span class="stats-value" id="stat-fps">0</span>
        </div>
      </div>
    </div>
    
    <div id="time-slider-container">
      <div class="time-label">时段控制</div>
      <div class="time-display" id="time-display">08:00</div>
      <input type="range" id="time-slider" min="0" max="24" step="0.1" value="8" />
    </div>
    
    <button id="mobile-drawer-toggle">控制面板</button>
    
    <div id="mobile-drawer">
      <div class="drawer-handle"></div>
      <div id="mobile-time-control" style="margin-bottom: 16px;">
        <div class="time-label" style="color:#a0a0b0; font-size:13px; margin-bottom:8px;">时段控制</div>
        <div class="time-display" id="mobile-time-display" style="font-size:20px; font-weight:700; color:#4fc3f7; text-align:center; margin-bottom:8px;">08:00</div>
        <input type="range" id="mobile-time-slider" min="0" max="24" step="0.1" value="8" style="width:100%; height:6px; -webkit-appearance:none; appearance:none; background:#0f3460; border-radius:3px; outline:none; cursor:pointer;" />
      </div>
      <div id="mobile-gui-container"></div>
    </div>
    
    <div id="gui-container"></div>
  </div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
