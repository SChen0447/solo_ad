<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>知识图谱构建工具</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body, #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      }
      button {
        transition: transform 150ms ease-in-out, background-color 300ms ease-in-out,
          border-color 300ms ease-in-out, color 300ms ease-in-out,
          box-shadow 300ms ease-in-out, opacity 300ms ease-in-out;
      }
      button:active {
        transform: scale(0.95) !important;
      }
      input, textarea {
        transition: border-color 300ms ease-in-out, box-shadow 300ms ease-in-out;
      }
      input:focus, textarea:focus {
        border-color: #4a6fa5 !important;
        box-shadow: 0 0 0 3px rgba(74, 111, 165, 0.12);
      }
      canvas {
        user-select: none;
        -webkit-user-select: none;
      }
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.25);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
