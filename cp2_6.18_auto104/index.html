<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>城市道路车流热力可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    #scene-container {
      width: 100vw;
      height: 100vh;
      display: block;
      background-color: #000000;
    }

    #tooltip {
      position: absolute;
      pointer-events: none;
      background-color: rgba(0, 0, 0, 0.8);
      color: #ffffff;
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 4px;
      z-index: 1000;
      display: none;
      white-space: nowrap;
      line-height: 1.5;
    }

    #tooltip .density {
      font-weight: bold;
      font-size: 14px;
    }

    #tooltip .time {
      color: rgba(255, 255, 255, 0.7);
    }

    #fps-warning {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      z-index: 999;
      display: none;
    }

    #fps-warning svg {
      width: 100%;
      height: 100%;
      animation: pulse 0.5s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from {
        transform: scale(1);
        opacity: 0.8;
      }
      to {
        transform: scale(1.3);
        opacity: 1;
      }
    }

    .dg.ac {
      z-index: 100 !important;
    }
  </style>
</head>
<body>
  <div id="scene-container"></div>
  <div id="tooltip">
    <div class="density">-- 辆/分钟</div>
    <div class="time">--:--:--</div>
  </div>
  <div id="fps-warning">
    <svg viewBox="0 0 24 24" fill="#ef4444">
      <path d="M12 2L1 21h22L12 2zm0 4l7.53 13H4.47L12 6zm-1 5v4h2v-4h-2zm0 6v2h2v-2h-2z"/>
    </svg>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
