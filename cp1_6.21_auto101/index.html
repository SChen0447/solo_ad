<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>像素风叙事游戏 - CRT复古效果演示</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a1a;
      font-family: 'Press Start 2P', monospace;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .crt-tv-frame {
      position: relative;
      padding: 30px;
      background: linear-gradient(145deg, #4a4a4a, #2a2a2a);
      border-radius: 24px;
      box-shadow:
        inset 0 2px 8px rgba(255, 255, 255, 0.1),
        inset 0 -4px 12px rgba(0, 0, 0, 0.6),
        0 8px 32px rgba(0, 0, 0, 0.8),
        0 0 0 4px #333;
    }

    .crt-tv-frame::before {
      content: '';
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 6px;
      background: repeating-linear-gradient(
        90deg,
        transparent 0,
        transparent 4px,
        rgba(0, 0, 0, 0.4) 4px,
        rgba(0, 0, 0, 0.4) 6px
      );
      border-radius: 3px;
      opacity: 0.8;
    }

    .crt-tv-frame::after {
      content: '';
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 8px;
      background: repeating-linear-gradient(
        90deg,
        transparent 0,
        transparent 6px,
        rgba(0, 0, 0, 0.5) 6px,
        rgba(0, 0, 0, 0.5) 10px
      );
      border-radius: 4px;
      opacity: 0.9;
    }

    .vent-pattern-top,
    .vent-pattern-bottom {
      position: absolute;
      width: 100%;
      height: 20px;
      background-image: radial-gradient(circle, rgba(0,0,0,0.5) 1.5px, transparent 1.5px);
      background-size: 8px 8px;
      opacity: 0.6;
    }

    .vent-pattern-top {
      top: 4px;
      left: 0;
    }

    .vent-pattern-bottom {
      bottom: 4px;
      left: 0;
    }

    .screen-container {
      position: relative;
      border: 4px solid #1a1a1a;
      border-radius: 8px;
      overflow: hidden;
      box-shadow:
        inset 0 0 20px rgba(0, 0, 0, 0.9),
        0 0 40px rgba(0, 0, 0, 0.6);
      background: #000;
    }

    #game-container {
      display: block;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }

    .screen-glare {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.08) 0%,
        transparent 40%,
        transparent 60%,
        rgba(0, 0, 0, 0.15) 100%
      );
      z-index: 100;
    }

    .tv-brand {
      position: absolute;
      bottom: -22px;
      left: 50%;
      transform: translateX(-50%);
      color: #888;
      font-size: 8px;
      letter-spacing: 2px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="crt-tv-frame">
    <div class="vent-pattern-top"></div>
    <div class="vent-pattern-bottom"></div>
    <div class="screen-container">
      <div id="game-container"></div>
      <div class="screen-glare"></div>
    </div>
    <div class="tv-brand">PIXEL-VISION 2000</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
