<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>符文炼金术 - 回合制卡牌对战</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body, #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      body {
        background: linear-gradient(135deg, #1a0f1e 0%, #0d0814 100%);
        font-family: 'Georgia', 'Times New Roman', serif;
        color: #e8d5b7;
      }
      .loading-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #1a0f1e 0%, #0d0814 100%);
        z-index: 9999;
      }
      .rune-loader {
        width: 80px;
        height: 80px;
        border: 3px solid transparent;
        border-top-color: #c9a847;
        border-radius: 50%;
        animation: spin 1.5s linear infinite;
        position: relative;
      }
      .rune-loader::before {
        content: '';
        position: absolute;
        top: 10px;
        left: 10px;
        right: 10px;
        bottom: 10px;
        border: 2px solid transparent;
        border-top-color: #9b59b6;
        border-radius: 50%;
        animation: spin 1s linear infinite reverse;
      }
      .rune-loader::after {
        content: '✦';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 24px;
        color: #c9a847;
        text-shadow: 0 0 10px #c9a847;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .loading-text {
        margin-top: 20px;
        font-size: 18px;
        color: #e8d5b7;
        letter-spacing: 3px;
        text-shadow: 0 0 10px rgba(201, 168, 71, 0.5);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-container">
        <div class="rune-loader"></div>
        <div class="loading-text">符文炼金术</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
