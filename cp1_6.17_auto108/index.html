<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>3D大气层切片可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0a0a1f 0%, #1a1a3e 50%, #0d1b2a 100%);
      color: #e0e0ff;
    }

    #app {
      display: flex;
      width: 100%;
      height: 100%;
    }

    #canvas-container {
      flex: 1 1 70%;
      position: relative;
      min-width: 0;
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #control-panel {
      flex: 0 0 320px;
      background: rgba(26, 26, 46, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-left: 1px solid rgba(100, 200, 255, 0.2);
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow-y: auto;
    }

    .panel-header {
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(100, 200, 255, 0.15);
    }

    .panel-title {
      font-size: 18px;
      font-weight: 600;
      color: #64d8ff;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }

    .panel-subtitle {
      font-size: 12px;
      color: rgba(224, 224, 255, 0.5);
    }

    .info-card {
      background: rgba(100, 200, 255, 0.08);
      border: 1px solid rgba(100, 200, 255, 0.15);
      border-radius: 12px;
      padding: 16px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .info-row:last-child {
      margin-bottom: 0;
    }

    .info-label {
      font-size: 13px;
      color: rgba(224, 224, 255, 0.6);
    }

    .info-value {
      font-size: 16px;
      font-weight: 600;
      color: #64d8ff;
    }

    .control-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 500;
      color: rgba(224, 224, 255, 0.7);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .altitude-slider-container {
      display: flex;
      align-items: stretch;
      gap: 12px;
    }

    .altitude-ticks {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 4px 0;
    }

    .altitude-tick {
      font-size: 10px;
      color: rgba(224, 224, 255, 0.5);
      white-space: nowrap;
    }

    .vertical-slider-wrapper {
      flex: 1;
      height: 180px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      padding: 10px 0;
    }

    input[type="range"].vertical-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 180px;
      height: 6px;
      background: #2a2a4e;
      border-radius: 3px;
      outline: none;
      transform: rotate(-90deg);
      transform-origin: center center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    input[type="range"].vertical-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      background: #00e5ff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.4);
      transition: all 0.3s ease;
    }

    input[type="range"].vertical-slider::-webkit-slider-thumb:hover {
      box-shadow: 0 0 16px 4px rgba(0, 229, 255, 0.5);
      transform: scale(1.1);
    }

    input[type="range"].vertical-slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      background: #00e5ff;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.4);
      transition: all 0.3s ease;
    }

    input[type="range"].vertical-slider::-moz-range-thumb:hover {
      box-shadow: 0 0 16px 4px rgba(0, 229, 255, 0.5);
      transform: scale(1.1);
    }

    .playback-controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .playback-buttons {
      display: flex;
      gap: 8px;
    }

    .btn {
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.3s ease;
      border-radius: 8px;
    }

    .btn-primary {
      flex: 1;
      padding: 12px 16px;
      background: linear-gradient(135deg, #00e5ff 0%, #0066ff 100%);
      color: #fff;
      box-shadow: 0 4px 12px rgba(0, 102, 255, 0.3);
    }

    .btn-primary:hover {
      box-shadow: 0 6px 20px rgba(0, 229, 255, 0.5);
      transform: translateY(-1px);
    }

    .btn-secondary {
      padding: 12px 14px;
      background: rgba(100, 200, 255, 0.1);
      color: #64d8ff;
      border: 1px solid rgba(100, 200, 255, 0.3);
    }

    .btn-secondary:hover {
      background: rgba(100, 200, 255, 0.2);
      border-color: rgba(0, 229, 255, 0.6);
      box-shadow: 0 0 12px rgba(0, 229, 255, 0.3);
    }

    .progress-container {
      width: 100%;
    }

    input[type="range"].horizontal-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: #2a2a4e;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    input[type="range"].horizontal-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #00e5ff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.4);
      transition: all 0.3s ease;
    }

    input[type="range"].horizontal-slider::-webkit-slider-thumb:hover {
      box-shadow: 0 0 12px 3px rgba(0, 229, 255, 0.5);
      transform: scale(1.1);
    }

    input[type="range"].horizontal-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #00e5ff;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.4);
      transition: all 0.3s ease;
    }

    input[type="range"].horizontal-slider::-moz-range-thumb:hover {
      box-shadow: 0 0 12px 3px rgba(0, 229, 255, 0.5);
      transform: scale(1.1);
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: rgba(224, 224, 255, 0.5);
      margin-top: 6px;
    }

    .legend-section {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 12px;
      padding: 16px;
    }

    .legend-title {
      font-size: 12px;
      color: rgba(224, 224, 255, 0.7);
      margin-bottom: 10px;
    }

    .color-bar {
      width: 100%;
      height: 12px;
      border-radius: 6px;
      background: linear-gradient(to right, 
        #7b1fa2 0%, 
        #512da8 20%, 
        #1976d2 40%, 
        #00bcd4 60%, 
        #ffc107 80%, 
        #f44336 100%
      );
      margin-bottom: 6px;
    }

    .color-bar-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: rgba(224, 224, 255, 0.5);
    }

    .timestamp-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .timestamp-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: rgba(224, 224, 255, 0.6);
      padding: 6px 10px;
      background: rgba(100, 200, 255, 0.05);
      border-radius: 6px;
      border-left: 3px solid transparent;
      transition: all 0.3s ease;
    }

    .timestamp-item.active {
      border-left-color: #00e5ff;
      background: rgba(0, 229, 255, 0.1);
      color: #64d8ff;
    }

    .timestamp-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(224, 224, 255, 0.3);
    }

    .timestamp-item.active .timestamp-dot {
      background: #00e5ff;
      box-shadow: 0 0 8px rgba(0, 229, 255, 0.6);
    }

    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(10, 10, 31, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      z-index: 100;
    }

    .loading-overlay.hidden {
      display: none;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(100, 200, 255, 0.2);
      border-top-color: #00e5ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 14px;
      color: rgba(224, 224, 255, 0.8);
      letter-spacing: 1px;
    }

    @media (max-width: 768px) {
      #app {
        flex-direction: column;
      }

      #canvas-container {
        flex: 1 1 auto;
        height: calc(100% - 200px);
      }

      #control-panel {
        flex: 0 0 200px;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 12px;
        padding: 12px;
        border-left: none;
        border-top: 1px solid rgba(100, 200, 255, 0.2);
      }

      .panel-header {
        flex: 1 1 100%;
        padding-bottom: 8px;
        margin-bottom: 4px;
      }

      .info-card {
        flex: 1 1 calc(50% - 6px);
        padding: 10px;
      }

      .altitude-slider-container {
        flex: 1 1 calc(50% - 6px);
      }

      .vertical-slider-wrapper {
        height: 120px;
      }

      input[type="range"].vertical-slider {
        width: 120px;
      }

      .playback-controls {
        flex: 1 1 100%;
      }

      .legend-section {
        flex: 1 1 calc(50% - 6px);
        padding: 10px;
      }

      .timestamp-list {
        flex: 1 1 calc(50% - 6px);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container">
      <div id="loading-overlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在加载气象数据...</div>
      </div>
    </div>
    <div id="control-panel">
      <div class="panel-header">
        <div class="panel-title">大气层可视化</div>
        <div class="panel-subtitle">Atmosphere Slice Visualizer</div>
      </div>

      <div class="info-card">
        <div class="info-row">
          <span class="info-label">当前海拔</span>
          <span id="altitude-value" class="info-value">5000 m</span>
        </div>
        <div class="info-row">
          <span class="info-label">时间快照</span>
          <span id="current-time" class="info-value">T+0h</span>
        </div>
        <div class="info-row">
          <span class="info-label">平均温度</span>
          <span id="avg-temp" class="info-value">--°C</span>
        </div>
      </div>

      <div class="control-section">
        <div class="section-title">海拔高度</div>
        <div class="altitude-slider-container">
          <div class="altitude-ticks">
            <span class="altitude-tick">10000m</span>
            <span class="altitude-tick">8000m</span>
            <span class="altitude-tick">5000m</span>
            <span class="altitude-tick">3000m</span>
            <span class="altitude-tick">1000m</span>
          </div>
          <div class="vertical-slider-wrapper">
            <input
              type="range"
              id="altitude-slider"
              class="vertical-slider"
              min="0"
              max="4"
              value="2"
              step="1"
            />
          </div>
        </div>
      </div>

      <div class="control-section">
        <div class="section-title">时间轴播放</div>
        <div class="playback-controls">
          <div class="playback-buttons">
            <button id="play-pause-btn" class="btn btn-primary">
              <span id="play-icon">▶ 播放</span>
            </button>
            <button id="reset-btn" class="btn btn-secondary" title="重置">⟲</button>
          </div>
          <div class="progress-container">
            <input
              type="range"
              id="progress-slider"
              class="horizontal-slider"
              min="0"
              max="4"
              value="0"
              step="1"
            />
            <div class="progress-info">
              <span>T+0h</span>
              <span>T+8h</span>
            </div>
          </div>
        </div>
      </div>

      <div class="legend-section">
        <div class="legend-title">温度色阶 (°C)</div>
        <div class="color-bar"></div>
        <div class="color-bar-labels">
          <span>-40°</span>
          <span>-10°</span>
          <span>20°</span>
          <span>40°</span>
        </div>
      </div>

      <div class="control-section">
        <div class="section-title">数据快照</div>
        <div id="timestamp-list" class="timestamp-list">
          <div class="timestamp-item active" data-index="0">
            <span class="timestamp-dot"></span>
            <span>T+0h - 初始状态</span>
          </div>
          <div class="timestamp-item" data-index="1">
            <span class="timestamp-dot"></span>
            <span>T+2h - 低压形成</span>
          </div>
          <div class="timestamp-item" data-index="2">
            <span class="timestamp-dot"></span>
            <span>T+4h - 气流汇聚</span>
          </div>
          <div class="timestamp-item" data-index="3">
            <span class="timestamp-dot"></span>
            <span>T+6h - 锋面过境</span>
          </div>
          <div class="timestamp-item" data-index="4">
            <span class="timestamp-dot"></span>
            <span>T+8h - 高压过境</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
