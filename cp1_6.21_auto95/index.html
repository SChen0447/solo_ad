<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人作品展示</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&family=Lora:ital,wght@0,500;0,600;1,400&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #6366f1;
      --primary-rgb: 99, 102, 241;
      --font-heading: 'Playfair Display', serif;
      --font-body: 'DM Sans', sans-serif;
      --card-gap: 24px;
      --bg-pattern: 0;

      --bg: #fafaf7;
      --bg-secondary: #f1f1ec;
      --surface: #ffffff;
      --text-primary: #1a1a1f;
      --text-secondary: #5c5c66;
      --text-muted: #8a8a94;
      --border: rgba(26, 26, 31, 0.08);
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.06);
      --shadow-md: 0 4px 8px rgba(0, 0, 0, 0.06), 0 8px 24px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 12px 24px rgba(0, 0, 0, 0.08), 0 24px 48px rgba(0, 0, 0, 0.12);
      --shadow-hover: 0 16px 32px rgba(0, 0, 0, 0.1), 0 32px 64px rgba(0, 0, 0, 0.14);
      --nav-height: 80px;
      --nav-height-collapsed: 56px;
      --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --transition-fast: 200ms var(--ease-standard);
      --transition-standard: 300ms var(--ease-standard);
    }

    [data-theme="dark"] {
      --bg: #0f0f14;
      --bg-secondary: #181820;
      --surface: #1f1f28;
      --text-primary: #f0f0f4;
      --text-secondary: #a0a0b0;
      --text-muted: #6c6c7a;
      --border: rgba(240, 240, 244, 0.08);
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3), 0 1px 3px rgba(0, 0, 0, 0.4);
      --shadow-md: 0 4px 8px rgba(0, 0, 0, 0.4), 0 8px 24px rgba(0, 0, 0, 0.5);
      --shadow-lg: 0 12px 24px rgba(0, 0, 0, 0.5), 0 24px 48px rgba(0, 0, 0, 0.6);
      --shadow-hover: 0 16px 32px rgba(0, 0, 0, 0.5), 0 32px 64px rgba(0, 0, 0, 0.7);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      transition: background-color var(--transition-standard), color var(--transition-standard);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .bg-pattern {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      opacity: 0.4;
      transition: opacity var(--transition-standard);
    }

    [data-theme="dark"] .bg-pattern {
      opacity: 0.15;
    }

    #app {
      min-height: 100vh;
    }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: calc(var(--nav-height) + 48px) 32px 120px;
    }

    .section {
      animation: fadeInUp 600ms var(--ease-standard) both;
    }

    .section-header {
      margin-bottom: 48px;
    }

    .section-label {
      display: inline-block;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .section-title {
      font-family: var(--font-heading);
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 16px;
    }

    .section-subtitle {
      font-size: 18px;
      color: var(--text-secondary);
      max-width: 640px;
      line-height: 1.7;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      main {
        padding: calc(var(--nav-height-collapsed) + 32px) 20px 100px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
