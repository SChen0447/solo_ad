<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星际矿井 - Interstellar Mine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #050510 0%, #0a0a2a 100%);
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }
    #game-container {
      width: 100%; height: 100%;
      position: relative;
    }
    #start-screen {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100;
      background: linear-gradient(180deg, #050510 0%, #0a0a2a 100%);
    }
    #start-screen.hidden { display: none; }
    #start-title {
      font-size: 64px;
      font-weight: 900;
      color: #00d4ff;
      text-shadow:
        0 0 20px rgba(0,212,255,0.6),
        0 0 40px rgba(0,212,255,0.3),
        0 0 80px rgba(0,212,255,0.15);
      letter-spacing: 8px;
      margin-bottom: 16px;
      animation: titlePulse 2s ease-in-out infinite;
    }
    #start-subtitle {
      font-size: 18px;
      color: rgba(0,212,255,0.5);
      letter-spacing: 4px;
      margin-bottom: 48px;
    }
    #start-btn {
      padding: 16px 64px;
      font-size: 20px;
      font-weight: 700;
      color: #050510;
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 4px;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(0,212,255,0.3);
    }
    #start-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 40px rgba(0,212,255,0.6), 0 0 80px rgba(0,212,255,0.2);
    }
    @keyframes titlePulse {
      0%, 100% { text-shadow: 0 0 20px rgba(0,212,255,0.6), 0 0 40px rgba(0,212,255,0.3); }
      50% { text-shadow: 0 0 30px rgba(0,212,255,0.8), 0 0 60px rgba(0,212,255,0.5), 0 0 100px rgba(0,212,255,0.2); }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="start-screen">
      <div id="start-title">星际矿井</div>
      <div id="start-subtitle">INTERSTELLAR MINE</div>
      <button id="start-btn">开 始 探 索</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
