<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>跨平台内容排期与素材管理</title>
    <style>
      #root-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #F5F7FA;
        z-index: 9999;
      }
      #root-loader h1 {
        color: #2C3E50;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 28px;
        opacity: 0;
        animation: fadeIn 1.2s ease-out forwards;
      }
      #root-loader .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #E0E6ED;
        border-top-color: #3498DB;
        border-radius: 50%;
        margin-right: 16px;
        opacity: 0;
        animation: fadeIn 1.2s ease-out forwards, spin 1s linear infinite 0.3s;
      }
      #root-loader.hidden {
        display: none;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root-loader">
      <div class="spinner"></div>
      <h1>跨平台内容管理系统</h1>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loader = document.getElementById('root-loader');
          if (loader) loader.classList.add('hidden');
        }, 800);
      });
    </script>
  </body>
</html>
