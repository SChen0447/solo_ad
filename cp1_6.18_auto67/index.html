<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Combo Space - 连击星际</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; margin: auto; }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="400" height="600"></canvas>
  <script>
    window.__audioCtx = null;
    function initAudio() {
      if (!window.__audioCtx) {
        window.__audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (window.__audioCtx.state === 'suspended') {
        window.__audioCtx.resume();
      }
      document.removeEventListener('click', initAudio);
      document.removeEventListener('keydown', initAudio);
    }
    document.addEventListener('click', initAudio);
    document.addEventListener('keydown', initAudio);
  </script>
  <script type="module" src="/src/game/main.ts"></script>
</body>
</html>
