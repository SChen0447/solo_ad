<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 流量监控看板</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: 'Courier New', 'Consolas', monospace;
      color: #ffffff;
      min-width: 768px;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    canvas {
      display: block;
    }
    .monitor-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 12px;
      padding: 18px 24px;
      z-index: 10;
      min-width: 220px;
      pointer-events: none;
    }
    .monitor-panel h3 {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(0, 212, 255, 0.7);
      margin-bottom: 12px;
      font-weight: 400;
    }
    .monitor-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
    }
    .monitor-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }
    .monitor-value {
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
    }
    .monitor-value.fps {
      color: #00d4ff;
    }
    .monitor-value.peak {
      color: #ff0055;
    }
    .control-bar {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      gap: 10px;
      z-index: 10;
    }
    .control-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(0, 212, 255, 0.25);
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #ffffff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s ease;
    }
    .control-btn:hover {
      background: rgba(0, 212, 255, 0.15);
      border-color: rgba(0, 212, 255, 0.6);
      filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.5)) drop-shadow(0 0 20px rgba(0, 212, 255, 0.25));
    }
    .control-btn:active {
      transform: scale(0.92);
    }
    .control-btn .icon {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="monitor-panel">
      <h3>System Monitor</h3>
      <div class="monitor-row">
        <span class="monitor-label">FPS</span>
        <span class="monitor-value fps" id="fps-value">0</span>
      </div>
      <div class="monitor-row">
        <span class="monitor-label">Particles</span>
        <span class="monitor-value" id="particle-count">0</span>
      </div>
      <div class="monitor-row">
        <span class="monitor-label">Peak Flow</span>
        <span class="monitor-value peak" id="peak-value">0.00</span>
      </div>
    </div>
    <div class="control-bar">
      <button class="control-btn" id="btn-toggle" title="Play / Pause">
        <svg class="icon" id="icon-pause" viewBox="0 0 24 24" style="display:none">
          <rect x="6" y="4" width="4" height="16" rx="1"/>
          <rect x="14" y="4" width="4" height="16" rx="1"/>
        </svg>
        <svg class="icon" id="icon-play" viewBox="0 0 24 24">
          <polygon points="6,4 20,12 6,20"/>
        </svg>
      </button>
      <button class="control-btn" id="btn-reset" title="Reset">
        <svg class="icon" viewBox="0 0 24 24">
          <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
        </svg>
      </button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
