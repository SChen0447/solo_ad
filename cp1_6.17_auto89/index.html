<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 星云形态生成器</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <div class="top-bar">
      <div class="preset-selector">
        <label for="presetSelect">预设：</label>
        <select id="presetSelect">
          <option value="spiral">🌀 螺旋星云</option>
          <option value="ring">💫 环状星云</option>
          <option value="diffuse">🌌 弥漫星云</option>
        </select>
      </div>
      <button id="saveBtn" class="save-btn">💾 保存预设</button>
    </div>
    <div class="main-content">
      <div id="scene-container" class="scene-container"></div>
      <div id="panel-container" class="panel-container"></div>
    </div>
  </div>
  <div id="save-modal" class="modal-overlay">
    <div class="modal-content">
      <h3>保存预设</h3>
      <input type="text" id="presetNameInput" placeholder="输入预设名称..." />
      <div class="modal-buttons">
        <button id="cancelSaveBtn" class="btn-secondary">取消</button>
        <button id="confirmSaveBtn" class="btn-primary">保存</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
