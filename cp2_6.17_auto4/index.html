<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roguelike迷宫探索</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #1a1a2e;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      color: #e0e0e0;
    }

    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: opacity 0.3s ease;
    }

    #status-bar {
      width: 100%;
      height: 40px;
      background: #2c2c2c;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 2px solid #444;
      flex-shrink: 0;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .hp-bar-container {
      width: 100px;
      height: 10px;
      background: #333;
      border-radius: 5px;
      overflow: hidden;
      position: relative;
    }

    .hp-bar {
      height: 100%;
      background: linear-gradient(to right, #4caf50, #ff5722);
      transition: width 0.3s ease, background 0.3s ease;
    }

    #maze-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      min-width: 600px;
    }

    #maze-container {
      display: grid;
      border: 4px solid #333;
      border-radius: 8px;
      background: #0f0f1a;
      padding: 10px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    .cell {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: opacity 0.2s ease, filter 0.3s ease;
      opacity: 0;
      overflow: hidden;
    }

    .cell.visible {
      opacity: 1;
    }

    .cell.fog {
      filter: brightness(15%);
    }

    .cell.partial-fog {
      filter: brightness(55%);
    }

    .cell.wall {
      background: #4a4a4a;
    }

    .cell.corridor {
      background: #f5f0e1;
    }

    .cell.start {
      background: #4caf50 !important;
      box-shadow: inset 0 0 15px rgba(76, 175, 80, 0.6);
    }

    .cell.end {
      background: #f44336 !important;
      box-shadow: inset 0 0 15px rgba(244, 67, 54, 0.6);
    }

    #player {
      position: absolute;
      width: 20px;
      height: 20px;
      background: radial-gradient(circle, #64b5f6 0%, #1976d2 100%);
      border-radius: 50%;
      z-index: 10;
      transition: left 0.15s ease, top 0.15s ease;
      box-shadow: 0 0 10px rgba(100, 181, 246, 0.8);
    }

    .monster {
      width: 28px;
      height: 28px;
      background: radial-gradient(circle, #9c27b0 0%, #6a1b9a 100%);
      border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
      position: relative;
      z-index: 5;
      box-shadow: 0 0 8px rgba(156, 39, 176, 0.6);
      animation: monsterFloat 2s ease-in-out infinite;
    }

    @keyframes monsterFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    .item {
      font-size: 20px;
      z-index: 4;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .item.picked-up {
      transform: scale(0) rotate(360deg);
      opacity: 0;
    }

    .item.potion-heal { color: #e53935; }
    .item.potion-power { color: #8e24aa; }
    .item.key { color: #ffd700; }

    .chest {
      width: 26px;
      height: 22px;
      background: linear-gradient(180deg, #8d6e63 0%, #5d4037 100%);
      border: 2px solid #3e2723;
      border-radius: 3px 3px 2px 2px;
      position: relative;
      z-index: 5;
    }

    .chest::before {
      content: '';
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 6px;
      background: #ffd700;
      border-radius: 50%;
    }

    .chest.locked::after {
      content: '🔒';
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
    }

    #battle-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #battle-modal.active {
      display: flex;
      opacity: 1;
    }

    .battle-card {
      width: 320px;
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      color: #333;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    .battle-title {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #d32f2f;
    }

    .combatant {
      margin-bottom: 20px;
    }

    .combatant-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .combatant.player .combatant-name { color: #1976d2; }
    .combatant.monster .combatant-name { color: #9c27b0; }

    .stat-bars {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .stat-bar-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-label {
      font-size: 12px;
      width: 40px;
      flex-shrink: 0;
    }

    .stat-bar-bg {
      flex: 1;
      height: 14px;
      background: #e0e0e0;
      border-radius: 7px;
      overflow: hidden;
      position: relative;
    }

    .stat-bar {
      height: 100%;
      transition: width 0.3s ease, background 0.3s ease;
      border-radius: 7px;
    }

    .stat-bar.hp {
      background: linear-gradient(to right, #4caf50, #8bc34a);
    }

    .stat-bar.hp.low {
      background: linear-gradient(to right, #f44336, #ff9800);
    }

    .stat-bar.atk {
      background: linear-gradient(to right, #ff9800, #ffc107);
    }

    .stat-bar.def {
      background: linear-gradient(to right, #2196f3, #03a9f4);
    }

    .stat-value {
      font-size: 11px;
      width: 50px;
      text-align: right;
      flex-shrink: 0;
    }

    #attack-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.2s ease;
    }

    #attack-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    #attack-btn:active {
      transform: translateY(0);
    }

    #attack-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .battle-log {
      margin-top: 16px;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 8px;
      font-size: 13px;
      min-height: 60px;
      max-height: 100px;
      overflow-y: auto;
    }

    .battle-log p {
      margin-bottom: 4px;
    }

    .shake {
      animation: shake 0.2s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .flash {
      animation: flash 0.1s ease;
    }

    @keyframes flash {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(2); }
    }

    #result-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 200;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #result-modal.active {
      display: flex;
      opacity: 1;
    }

    .result-card {
      width: 380px;
      background: linear-gradient(135deg, #2c2c2c 0%, #1a1a2e 100%);
      border: 2px solid #444;
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      color: #e0e0e0;
    }

    .result-title {
      font-size: 28px;
      margin-bottom: 20px;
    }

    .result-title.victory { color: #4caf50; }
    .result-title.defeat { color: #f44336; }

    .result-stats {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .result-stat {
      display: flex;
      justify-content: space-between;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
    }

    .result-score {
      font-size: 36px;
      font-weight: bold;
      color: #ffd700;
      margin-bottom: 24px;
    }

    #restart-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #4caf50 0%, #8bc34a 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.2s ease;
    }

    #restart-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
    }

    #restart-btn:active {
      transform: translateY(0);
    }

    #inventory-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: rgba(44, 44, 44, 0.95);
      border-top: 2px solid #444;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 50;
      padding: 0 20px;
    }

    .inventory-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .slot-key {
      font-size: 11px;
      color: #888;
      background: #222;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .slot-icon {
      font-size: 24px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #444;
      border-radius: 6px;
      position: relative;
    }

    .slot-count {
      position: absolute;
      bottom: -4px;
      right: -4px;
      background: #ff5722;
      color: white;
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 8px;
      font-weight: bold;
    }

    .toast {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(44, 44, 44, 0.95);
      color: #fff;
      padding: 10px 24px;
      border-radius: 8px;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      font-size: 14px;
      border: 1px solid #444;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 1024px) {
      #maze-wrapper {
        min-width: auto;
        padding: 10px;
        overflow: auto;
      }

      .battle-card {
        width: 90%;
        max-width: 360px;
      }

      .result-card {
        width: 90%;
        max-width: 380px;
      }
    }

    @media (max-width: 600px) {
      #battle-modal .battle-card {
        width: 100%;
        height: 100%;
        border-radius: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      #status-bar {
        flex-wrap: wrap;
        height: auto;
        padding: 8px;
        gap: 8px;
      }

      .status-item {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="status-bar">
      <div class="status-item">
        <span>🏰 层数:</span>
        <span id="floor-display">1</span>
      </div>
      <div class="status-item">
        <span>❤️ 生命:</span>
        <div class="hp-bar-container">
          <div class="hp-bar" id="hp-bar" style="width: 100%;"></div>
        </div>
        <span id="hp-text">20/20</span>
      </div>
      <div class="status-item">
        <span>🗺️ 探索:</span>
        <span id="explored-count">0</span>
      </div>
      <div class="status-item">
        <span>⚔️ 击败:</span>
        <span id="killed-count">0</span>
      </div>
      <div class="status-item">
        <span>🛡️ 攻击/防御:</span>
        <span id="stats-display">3/1</span>
      </div>
    </div>

    <div id="maze-wrapper">
      <div id="maze-container"></div>
    </div>
  </div>

  <div id="inventory-bar">
    <div class="inventory-slot">
      <div class="slot-key">1</div>
      <div class="slot-icon" id="slot-1">
        <span>🧪</span>
        <span class="slot-count" id="count-potion-heal" style="display:none;">0</span>
      </div>
    </div>
    <div class="inventory-slot">
      <div class="slot-key">2</div>
      <div class="slot-icon" id="slot-2">
        <span>💜</span>
        <span class="slot-count" id="count-potion-power" style="display:none;">0</span>
      </div>
    </div>
    <div class="inventory-slot">
      <div class="slot-key">3</div>
      <div class="slot-icon" id="slot-3">
        <span>🔑</span>
        <span class="slot-count" id="count-key" style="display:none;">0</span>
      </div>
    </div>
    <div class="status-item" style="margin-left: 20px; font-size: 12px; color: #888;">
      WASD移动 | 1-3使用物品
    </div>
  </div>

  <div id="battle-modal">
    <div class="battle-card">
      <div class="battle-title">⚔️ 战斗！</div>
      <div class="combatant player">
        <div class="combatant-header">
          <span class="combatant-name">🧙 玩家</span>
        </div>
        <div class="stat-bars">
          <div class="stat-bar-wrapper">
            <span class="stat-label">HP</span>
            <div class="stat-bar-bg">
              <div class="stat-bar hp" id="player-hp-bar" style="width: 100%;"></div>
            </div>
            <span class="stat-value" id="player-hp-value">20/20</span>
          </div>
          <div class="stat-bar-wrapper">
            <span class="stat-label">ATK</span>
            <div class="stat-bar-bg">
              <div class="stat-bar atk" id="player-atk-bar" style="width: 30%;"></div>
            </div>
            <span class="stat-value" id="player-atk-value">3</span>
          </div>
          <div class="stat-bar-wrapper">
            <span class="stat-label">DEF</span>
            <div class="stat-bar-bg">
              <div class="stat-bar def" id="player-def-bar" style="width: 10%;"></div>
            </div>
            <span class="stat-value" id="player-def-value">1</span>
          </div>
        </div>
      </div>
      <div class="combatant monster">
        <div class="combatant-header">
          <span class="combatant-name" id="monster-name">👹 怪物</span>
        </div>
        <div class="stat-bars">
          <div class="stat-bar-wrapper">
            <span class="stat-label">HP</span>
            <div class="stat-bar-bg">
              <div class="stat-bar hp" id="monster-hp-bar" style="width: 100%;"></div>
            </div>
            <span class="stat-value" id="monster-hp-value">10/10</span>
          </div>
          <div class="stat-bar-wrapper">
            <span class="stat-label">ATK</span>
            <div class="stat-bar-bg">
              <div class="stat-bar atk" id="monster-atk-bar" style="width: 30%;"></div>
            </div>
            <span class="stat-value" id="monster-atk-value">3</span>
          </div>
          <div class="stat-bar-wrapper">
            <span class="stat-label">DEF</span>
            <div class="stat-bar-bg">
              <div class="stat-bar def" id="monster-def-bar" style="width: 5%;"></div>
            </div>
            <span class="stat-value" id="monster-def-value">0</span>
          </div>
        </div>
      </div>
      <button id="attack-btn">⚔️ 攻击</button>
      <div class="battle-log" id="battle-log"></div>
    </div>
  </div>

  <div id="result-modal">
    <div class="result-card">
      <div class="result-title" id="result-title">游戏结束</div>
      <div class="result-stats">
        <div class="result-stat">
          <span>到达层数</span>
          <span id="final-floor">1</span>
        </div>
        <div class="result-stat">
          <span>探索格子</span>
          <span id="final-explored">0</span>
        </div>
        <div class="result-stat">
          <span>击败怪物</span>
          <span id="final-killed">0</span>
        </div>
      </div>
      <div class="result-score" id="final-score">0</div>
      <button id="restart-btn">🔄 重新开始</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
