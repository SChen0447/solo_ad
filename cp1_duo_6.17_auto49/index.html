<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>音律实验台 - Audio Visualizer Lab</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body, #root {
        width: 100%;
        height: 100%;
        background: #121220;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .loading-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #121220;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      .loading-title {
        color: #00ccff;
        font-size: 32px;
        font-weight: 600;
        margin-bottom: 30px;
        letter-spacing: 4px;
      }
      .loading-subtitle {
        color: #8080a0;
        font-size: 14px;
        margin-bottom: 40px;
        letter-spacing: 2px;
      }
      .loading-spinner {
        width: 60px;
        height: 60px;
        border: 3px solid #2a2a3d;
        border-top-color: #00ccff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="loading-container" id="loading">
      <h1 class="loading-title">音律实验台</h1>
      <p class="loading-subtitle">AUDIO VISUALIZER LAB</p>
      <div class="loading-spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loading = document.getElementById('loading');
          if (loading) {
            loading.style.opacity = '0';
            setTimeout(() => loading.remove(), 500);
          }
        }, 1000);
      });
    </script>
  </body>
</html>
