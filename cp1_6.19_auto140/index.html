<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <title>星际贸易商 - Stellar Trader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      min-width: 1024px;
      min-height: 768px;
      font-family: 'Noto Sans SC', sans-serif;
      background: linear-gradient(135deg, #1a0a2e 0%, #0d1b2a 50%, #1a0a2e 100%);
      color: #ffffff;
    }

    #app {
      width: 100%;
      height: 100%;
    }

    :root {
      --color-faction-federation: #4ea8de;
      --color-faction-empire: #e63946;
      --color-faction-guild: #ffd166;
      --color-faction-freeport: #06d6a0;
      --color-faction-tech: #9d4edd;
      --color-neon-start: #00f5d4;
      --color-neon-end: #00bbf9;
      --color-bg-dark: #1a0a2e;
      --color-bg-mid: #0d1b2a;
      --color-glass: rgba(255, 255, 255, 0.1);
      --color-glass-border: rgba(255, 255, 255, 0.2);
      --color-text-primary: #ffffff;
      --color-text-secondary: rgba(255, 255, 255, 0.7);
      --color-text-muted: rgba(255, 255, 255, 0.5);
    }

    .pixel-font {
      font-family: 'Press Start 2P', cursive;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.1); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }

    @keyframes blink {
      0%, 100% { border-color: transparent; }
      50% { border-color: var(--color-neon-start); }
    }

    .glass-panel {
      background: var(--color-glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--color-glass-border);
      border-radius: 12px;
    }

    .neon-btn {
      background: linear-gradient(135deg, var(--color-neon-start) 0%, var(--color-neon-end) 100%);
      border: none;
      border-radius: 8px;
      color: #0d1b2a;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 0 10px rgba(0, 245, 212, 0.3);
    }

    .neon-btn:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(0, 245, 212, 0.6), 0 0 40px rgba(0, 187, 249, 0.3);
    }

    .neon-btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    .neon-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .station-dot {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.3s ease;
      animation: pulse 2s ease-in-out infinite;
    }

    .station-dot:hover {
      transform: scale(1.3);
      filter: brightness(1.3);
    }

    .ship-icon {
      position: absolute;
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-bottom: 16px solid #ffffff;
      filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.8));
      transition: all 0.05s linear;
      z-index: 10;
    }

    .tooltip {
      position: absolute;
      background: rgba(13, 27, 42, 0.95);
      border: 1px solid var(--color-glass-border);
      border-radius: 8px;
      padding: 12px;
      pointer-events: none;
      z-index: 100;
      min-width: 180px;
      animation: fadeIn 0.2s ease;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.3s ease;
    }

    .modal-content {
      background: linear-gradient(135deg, rgba(26, 10, 46, 0.95) 0%, rgba(13, 27, 42, 0.95) 100%);
      border: 1px solid var(--color-glass-border);
      border-radius: 16px;
      padding: 32px;
      max-width: 500px;
      width: 90%;
      animation: slideIn 0.3s ease;
      box-shadow: 0 0 40px rgba(0, 245, 212, 0.2);
    }

    .typewriter-text {
      overflow: hidden;
      white-space: nowrap;
      border-right: 3px solid var(--color-neon-start);
      animation: typing 2s steps(40, end), blink 0.75s step-end infinite;
    }

    .scroll-number {
      display: inline-flex;
      overflow: hidden;
    }

    .scroll-digit {
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
    }

    .cargo-slot {
      width: 70px;
      height: 70px;
      border: 2px dashed var(--color-glass-border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.05);
      transition: all 0.2s ease;
    }

    .cargo-slot.filled {
      border-style: solid;
      border-color: var(--color-neon-start);
      background: rgba(0, 245, 212, 0.1);
    }

    .cargo-slot:hover {
      transform: scale(1.05);
      border-color: var(--color-neon-end);
    }

    .goods-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--color-glass-border);
      border-radius: 8px;
      padding: 12px;
      transition: all 0.2s ease;
    }

    .goods-card:hover {
      background: rgba(0, 245, 212, 0.1);
      border-color: var(--color-neon-start);
      transform: translateX(4px);
    }

    .price-up {
      color: #06d6a0;
      animation: fadeIn 0.3s ease;
    }

    .price-down {
      color: #e63946;
      animation: fadeIn 0.3s ease;
    }

    .fuel-bar {
      height: 8px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      overflow: hidden;
    }

    .fuel-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--color-neon-start) 0%, var(--color-neon-end) 100%);
      transition: width 0.3s ease;
    }

    .fuel-fill.low {
      background: linear-gradient(90deg, #e63946 0%, #ff6b6b 100%);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
