<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>室内植物光照模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    #app {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(to bottom, #e8eee8 0%, #c8e0c8 70%, #a8d0a8 100%);
    }
    #info-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      color: rgba(255, 255, 255, 0.9);
      font-family: 'Courier New', monospace;
      font-size: 14px;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
      background: rgba(0, 0, 0, 0.2);
      padding: 12px 16px;
      border-radius: 8px;
      line-height: 1.8;
      z-index: 10;
    }
    #info-panel .clock {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .lil-gui {
      --background-color: rgba(20, 20, 20, 0.8) !important;
      --widget-color: rgba(60, 60, 60, 0.8) !important;
      --focus-color: rgba(100, 100, 100, 0.8) !important;
      --hover-color: rgba(80, 80, 80, 0.8) !important;
      --font-color: #ffffff !important;
      --font-family: 'Courier New', monospace !important;
      padding: 8px !important;
    }
    .lil-gui.flash {
      animation: flashBg 0.2s ease;
    }
    @keyframes flashBg {
      0% { --background-color: rgba(20, 20, 20, 0.8); }
      50% { --background-color: rgba(120, 120, 120, 0.8); }
      100% { --background-color: rgba(20, 20, 20, 0.8); }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="info-panel">
    <div class="clock" id="clock">06:00:00</div>
    <div>光照积分: <span id="light-integral">0</span></div>
    <div>植物高度: <span id="plant-height">100</span>%</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
