<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bullet Hell Simulator - 弹幕模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at center, #1a1a2e 0%, #16213e 100%);
      font-family: 'Orbitron', 'Segoe UI', sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    #game-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    #left-panel, #right-panel {
      width: 240px;
      flex-shrink: 0;
    }
    canvas {
      display: block;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(0, 210, 255, 0.2);
    }
    @media (max-width: 900px) {
      #game-container {
        flex-direction: column;
        gap: 12px;
      }
      #left-panel, #right-panel {
        width: 90%;
        max-width: 400px;
      }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <div id="game-container">
      <div id="left-panel"></div>
      <div id="canvas-wrapper"></div>
      <div id="right-panel"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
