<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分形森林漫游探索</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
      position: relative;
    }
    canvas {
      display: block;
    }
    #status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 30px;
      color: #fff;
      font-size: 14px;
      z-index: 100;
      pointer-events: none;
    }
    #status-bar .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #status-bar .status-label {
      color: #9e9e9e;
    }
    #status-bar .status-value {
      color: #8BC34A;
      font-weight: bold;
      min-width: 50px;
    }
    #rule-selector {
      position: absolute;
      top: 60px;
      left: 20px;
      z-index: 100;
    }
    #rule-selector select {
      padding: 10px 16px;
      border-radius: 6px;
      border: none;
      background: #2C2C2C;
      color: #E0E0E0;
      font-size: 14px;
      cursor: pointer;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      min-width: 180px;
    }
    #rule-selector::after {
      content: '▼';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #E0E0E0;
      font-size: 10px;
      pointer-events: none;
    }
    #control-panel {
      position: absolute;
      top: 60px;
      right: 20px;
      width: 260px;
      background: rgba(26, 26, 26, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 20px;
      z-index: 100;
      color: #fff;
    }
    #control-panel h3 {
      margin-bottom: 16px;
      font-size: 16px;
      color: #8BC34A;
    }
    .control-group {
      margin-bottom: 18px;
    }
    .control-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: #E0E0E0;
      display: flex;
      justify-content: space-between;
    }
    .control-group label .value {
      color: #8BC34A;
      font-weight: bold;
    }
    .control-group input[type="range"] {
      width: 100%;
      height: 8px;
      border-radius: 4px;
      background: linear-gradient(to right, #2E7D32, #8BC34A);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
    }
    .control-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    .control-group input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    #vignette {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      z-index: 50;
      box-shadow: inset 0 0 150px rgba(0,0,0,0);
      transition: box-shadow 0.1s ease;
    }
    #instructions {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      z-index: 100;
      line-height: 1.6;
    }
    #instructions kbd {
      background: rgba(255,255,255,0.1);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      margin: 0 2px;
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <div id="vignette"></div>
    <div id="status-bar">
      <div class="status-item">
        <span class="status-label">帧率:</span>
        <span class="status-value" id="fps-value">--</span>
      </div>
      <div class="status-item">
        <span class="status-label">树木总数:</span>
        <span class="status-value" id="tree-count">--</span>
      </div>
      <div class="status-item">
        <span class="status-label">漫游速度:</span>
        <span class="status-value" id="speed-value">1.0x</span>
      </div>
    </div>
    <div id="rule-selector">
      <select id="rule-select">
        <option value="l-system">L-System 分形树</option>
        <option value="recursive">递归分形树</option>
        <option value="random">随机分支树</option>
      </select>
    </div>
    <div id="control-panel">
      <h3>参数控制</h3>
      <div class="control-group">
        <label>
          <span>树冠密度</span>
          <span class="value" id="density-value">60</span>
        </label>
        <input type="range" id="density-slider" min="20" max="100" value="60" step="1" />
      </div>
      <div class="control-group">
        <label>
          <span>分支层数</span>
          <span class="value" id="layers-value">5</span>
        </label>
        <input type="range" id="layers-slider" min="3" max="8" value="5" step="1" />
      </div>
      <div class="control-group">
        <label>
          <span>随机变异度</span>
          <span class="value" id="variation-value">0.3</span>
        </label>
        <input type="range" id="variation-slider" min="0" max="1" value="0.3" step="0.01" />
      </div>
    </div>
    <div id="instructions">
      <div><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 移动</div>
      <div>鼠标拖拽 旋转视角</div>
      <div>滚轮 调节速度 (0.5x - 3x)</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
