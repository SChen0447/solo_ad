<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galaxy Explorer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000011;
    }
    canvas {
      display: block;
      cursor: crosshair;
    }
    #fps-counter {
      position: fixed;
      top: 10px;
      right: 10px;
      font-size: 14px;
      color: #00FF00;
      font-family: monospace;
      z-index: 100;
      pointer-events: none;
      user-select: none;
    }
    #perf-mode {
      position: fixed;
      top: 30px;
      right: 10px;
      font-size: 12px;
      color: #FF6600;
      font-family: monospace;
      z-index: 100;
      pointer-events: none;
      user-select: none;
      display: none;
    }
    #twinkle-status {
      position: fixed;
      top: 50px;
      right: 10px;
      font-size: 12px;
      color: #00BFFF;
      font-family: monospace;
      z-index: 100;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="fps-counter">FPS: --</div>
  <div id="perf-mode">Performance Mode</div>
  <div id="twinkle-status">Twinkle: ON</div>
  <script type="module" src="/src/render.ts"></script>
</body>
</html>
