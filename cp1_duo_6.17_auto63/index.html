<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>迷宫逃脱 · Maze Escape</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      position: relative;
    }

    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    #start-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: linear-gradient(135deg, rgba(15, 12, 41, 0.95) 0%, rgba(48, 43, 99, 0.95) 100%);
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    #start-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .game-title {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 900;
      color: #fff;
      text-align: center;
      margin-bottom: 1rem;
      text-shadow:
        0 0 10px #8a2be2,
        0 0 20px #8a2be2,
        0 0 40px #8a2be2,
        0 0 80px #4b0082;
      letter-spacing: 0.1em;
      animation: glow 2s ease-in-out infinite alternate;
    }

    .game-subtitle {
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 3rem;
      text-align: center;
      text-shadow: 0 0 10px rgba(138, 43, 226, 0.5);
    }

    @keyframes glow {
      from {
        text-shadow:
          0 0 10px #8a2be2,
          0 0 20px #8a2be2,
          0 0 30px #8a2be2;
      }
      to {
        text-shadow:
          0 0 20px #8a2be2,
          0 0 40px #8a2be2,
          0 0 60px #8a2be2,
          0 0 100px #4b0082;
      }
    }

    .start-btn {
      padding: 1rem 3rem;
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #8a2be2, #4b0082);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow:
        0 0 20px rgba(138, 43, 226, 0.5),
        0 4px 15px rgba(0, 0, 0, 0.3);
      letter-spacing: 0.1em;
    }

    .start-btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow:
        0 0 40px rgba(138, 43, 226, 0.8),
        0 6px 25px rgba(0, 0, 0, 0.4);
    }

    .start-btn:active {
      transform: translateY(-1px) scale(1.02);
    }

    .name-input {
      padding: 0.875rem 1.5rem;
      font-size: 1.1rem;
      border: 2px solid rgba(138, 43, 226, 0.5);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      outline: none;
      transition: all 0.3s ease;
      margin-bottom: 1.5rem;
      width: clamp(250px, 50vw, 350px);
      text-align: center;
    }

    .name-input:focus {
      border-color: #8a2be2;
      box-shadow: 0 0 20px rgba(138, 43, 226, 0.4);
      background: rgba(255, 255, 255, 0.12);
    }

    .name-input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .hud-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 16px 24px;
      color: #fff;
      font-weight: 700;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 180px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .hud-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .hud-label {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.75);
      font-weight: 600;
    }

    .hud-value {
      font-size: 1.1rem;
      font-weight: 800;
      text-shadow: 0 0 8px currentColor;
    }

    .hud-value.time { color: #00d4ff; }
    .hud-value.coins { color: #ffd700; }
    .hud-value.rank { color: #ff6b9d; }
    .hud-value.players { color: #7fff7f; }

    .result-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.5);
      background: rgba(30, 30, 60, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 40px 48px;
      color: #fff;
      z-index: 200;
      min-width: 360px;
      max-width: 92vw;
      max-height: 88vh;
      overflow-y: auto;
      opacity: 0;
      visibility: hidden;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .result-panel.visible {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) scale(1);
    }

    .result-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 1.25rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .result-close:hover {
      background: #ff4757;
      transform: rotate(90deg) scale(1.1);
    }

    .result-title {
      font-size: 2rem;
      font-weight: 900;
      text-align: center;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #8a2be2, #ff6b9d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .result-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 16px 12px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .stat-label {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 6px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 900;
    }

    .leaderboard-title {
      font-size: 1.1rem;
      font-weight: 800;
      margin-bottom: 14px;
      color: rgba(255, 255, 255, 0.9);
      padding-left: 4px;
    }

    .leaderboard-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .leaderboard-item {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      border-radius: 10px;
      gap: 14px;
      font-weight: 600;
      transition: transform 0.2s ease;
    }

    .leaderboard-item:hover {
      transform: translateX(4px);
    }

    .leaderboard-item.rank-1 {
      background: linear-gradient(135deg, #ffd700, #ffaa00, #ffd700);
      color: #5a3d00;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
    }

    .leaderboard-item.rank-2 {
      background: linear-gradient(135deg, #c0c0c0, #e8e8e8, #c0c0c0);
      color: #444;
      box-shadow: 0 0 15px rgba(192, 192, 192, 0.3);
    }

    .leaderboard-item.rank-3 {
      background: linear-gradient(135deg, #cd7f32, #e8a860, #cd7f32);
      color: #4a2500;
      box-shadow: 0 0 15px rgba(205, 127, 50, 0.3);
    }

    .leaderboard-item:not(.rank-1):not(.rank-2):not(.rank-3) {
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .lb-rank {
      font-size: 1.1rem;
      font-weight: 900;
      min-width: 28px;
    }

    .lb-name {
      flex: 1;
      font-size: 0.95rem;
    }

    .lb-time {
      font-size: 0.9rem;
      font-family: 'Courier New', monospace;
    }

    .mobile-controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      display: none;
      gap: 60px;
      align-items: center;
    }

    .d-pad {
      position: relative;
      width: 150px;
      height: 150px;
    }

    .d-pad button {
      position: absolute;
      width: 50px;
      height: 50px;
      border: none;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(6px);
      color: #fff;
      font-size: 1.5rem;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      transition: all 0.15s ease;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .d-pad button:active {
      background: rgba(138, 43, 226, 0.7);
      transform: scale(0.92);
    }

    .d-pad .up { top: 0; left: 50px; }
    .d-pad .down { bottom: 0; left: 50px; }
    .d-pad .left { top: 50px; left: 0; }
    .d-pad .right { top: 50px; right: 0; }

    @media (max-width: 768px) {
      .hud-panel {
        top: 12px;
        left: 12px;
        padding: 10px 14px;
        min-width: 140px;
        gap: 5px;
        border-radius: 12px;
      }

      .hud-label { font-size: 0.7rem; }
      .hud-value { font-size: 0.85rem; }

      .result-panel {
        padding: 28px 22px;
        min-width: 90vw;
      }

      .result-stats {
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .stat-card { padding: 10px 6px; }
      .stat-value { font-size: 1.1rem; }

      .mobile-controls {
        display: flex;
      }

      .game-title { font-size: 2.2rem; }
      .game-subtitle { font-size: 0.95rem; margin-bottom: 2rem; }
    }

    canvas {
      display: block;
      position: fixed !important;
      top: 0;
      left: 0;
      z-index: 2;
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>

  <div id="start-screen">
    <h1 class="game-title">迷宫逃脱</h1>
    <p class="game-subtitle">MAZE ESCAPE · 多人竞速版</p>
    <input type="text" id="player-name" class="name-input" placeholder="输入你的昵称" maxlength="12" />
    <button class="start-btn" id="start-btn">开 始 游 戏</button>
  </div>

  <div class="hud-panel" id="hud-panel" style="display:none;">
    <div class="hud-row">
      <span class="hud-label">⏱ 时间</span>
      <span class="hud-value time" id="hud-time">00:00</span>
    </div>
    <div class="hud-row">
      <span class="hud-label">⭐ 金币</span>
      <span class="hud-value coins" id="hud-coins">0 / 0</span>
    </div>
    <div class="hud-row">
      <span class="hud-label">🏆 名次</span>
      <span class="hud-value rank" id="hud-rank">-</span>
    </div>
    <div class="hud-row">
      <span class="hud-label">👥 在线</span>
      <span class="hud-value players" id="hud-players">1</span>
    </div>
  </div>

  <div class="result-panel" id="result-panel">
    <button class="result-close" id="result-close">✕</button>
    <h2 class="result-title" id="result-title">游戏结束</h2>
    <div class="result-stats">
      <div class="stat-card">
        <div class="stat-label">名次</div>
        <div class="stat-value" id="result-rank">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">用时</div>
        <div class="stat-value" id="result-time">00:00</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">金币</div>
        <div class="stat-value" id="result-coins">0</div>
      </div>
    </div>
    <div class="leaderboard-title">🏆 全球排行榜 Top 10</div>
    <div class="leaderboard-list" id="leaderboard-list"></div>
    <div style="text-align:center; margin-top:24px;">
      <button class="start-btn" id="restart-btn" style="padding:0.75rem 2rem; font-size:1rem;">再 玩 一 次</button>
    </div>
  </div>

  <div class="mobile-controls" id="mobile-controls">
    <div class="d-pad">
      <button class="up" data-dir="up">▲</button>
      <button class="down" data-dir="down">▼</button>
      <button class="left" data-dir="left">◀</button>
      <button class="right" data-dir="right">▶</button>
    </div>
  </div>

  <script>
    (function() {
      const canvas = document.getElementById('particles');
      const ctx = canvas.getContext('2d');
      let particles = [];
      let w, h;

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      class Particle {
        constructor() {
          this.reset();
        }
        reset() {
          this.x = Math.random() * w;
          this.y = Math.random() * h;
          this.size = Math.random() * 2.5 + 0.5;
          this.speedX = (Math.random() - 0.5) * 0.4;
          this.speedY = (Math.random() - 0.5) * 0.4;
          this.opacity = Math.random() * 0.6 + 0.2;
          const colors = ['#8a2be2', '#4b0082', '#ff6b9d', '#00d4ff'];
          this.color = colors[Math.floor(Math.random() * colors.length)];
        }
        update() {
          this.x += this.speedX;
          this.y += this.speedY;
          if (this.x < 0 || this.x > w || this.y < 0 || this.y > h) this.reset();
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.globalAlpha = this.opacity;
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      for (let i = 0; i < 120; i++) particles.push(new Particle());

      function animate() {
        ctx.clearRect(0, 0, w, h);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
      }
      animate();
    })();
  </script>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
