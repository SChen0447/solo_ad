<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>太阳系 3D 模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #000510 0%, #0a0a2e 50%, #000814 100%);
      color: #ffffff;
      user-select: none;
      -webkit-user-select: none;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }

    .title {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #ffd700, #ff8c00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(255, 200, 0, 0.3);
    }

    .hint {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.5px;
    }

    .hint span {
      display: inline-block;
      padding: 4px 10px;
      margin: 0 4px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      font-size: 11px;
    }

    .control-panel {
      position: fixed;
      bottom: 30px;
      left: 30px;
      z-index: 10;
      padding: 18px 22px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      min-width: 220px;
    }

    .control-panel label {
      display: block;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .slider-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .speed-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 3px;
      background: #2a2a3e;
      outline: none;
      cursor: pointer;
    }

    .speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6cb4ff, #3d8bff);
      cursor: pointer;
      box-shadow: 0 0 10px rgba(108, 180, 255, 0.6), inset 0 1px 2px rgba(255, 255, 255, 0.4);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .speed-slider::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      box-shadow: 0 0 15px rgba(108, 180, 255, 0.8), inset 0 1px 2px rgba(255, 255, 255, 0.4);
    }

    .speed-slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6cb4ff, #3d8bff);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px rgba(108, 180, 255, 0.6), inset 0 1px 2px rgba(255, 255, 255, 0.4);
    }

    .speed-value {
      font-size: 14px;
      font-weight: 600;
      color: #6cb4ff;
      min-width: 40px;
      text-align: right;
    }

    .reset-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 10;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }

    .reset-btn:hover {
      background: rgba(255, 255, 255, 0.18);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .reset-btn:active {
      transform: translateY(0);
    }

    .info-card {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 20;
      width: 300px;
      padding: 22px 24px;
      background: linear-gradient(135deg, rgba(20, 30, 80, 0.85), rgba(60, 40, 90, 0.85));
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 14px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transform: translateX(360px);
      opacity: 0;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    .info-card.visible {
      transform: translateX(0);
      opacity: 1;
    }

    .info-card-close {
      position: absolute;
      top: 12px;
      right: 14px;
      width: 24px;
      height: 24px;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .info-card-close:hover {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    .info-card-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .info-card-color-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      box-shadow: 0 0 10px currentColor;
    }

    .info-card-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .info-card-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 14px;
    }

    .info-card-item:last-child {
      border-bottom: none;
    }

    .info-card-label {
      color: rgba(255, 255, 255, 0.6);
    }

    .info-card-value {
      color: #fff;
      font-weight: 500;
    }

    .tooltip {
      position: fixed;
      padding: 6px 12px;
      background: rgba(0, 0, 0, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      font-size: 12px;
      color: #fff;
      pointer-events: none;
      z-index: 15;
      opacity: 0;
      transition: opacity 0.15s ease;
      white-space: nowrap;
    }

    .tooltip.visible {
      opacity: 1;
    }

    @media (max-width: 768px) {
      .header {
        padding: 15px 20px;
        flex-direction: column;
        gap: 8px;
        align-items: flex-start;
      }

      .title {
        font-size: 18px;
      }

      .hint {
        font-size: 11px;
      }

      .hint span {
        padding: 3px 8px;
        font-size: 10px;
      }

      .control-panel {
        bottom: auto;
        top: auto;
        left: 0;
        right: 0;
        bottom: 0;
        border-radius: 12px 12px 0 0;
        min-width: auto;
        padding: 14px 18px;
      }

      .reset-btn {
        bottom: 75px;
        right: 20px;
        padding: 10px 16px;
        font-size: 13px;
      }

      .info-card {
        width: calc(100% - 40px);
        right: 20px;
        left: 20px;
        bottom: 85px;
        transform: translateY(20px);
      }

      .info-card.visible {
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      .hint {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div class="header">
    <div class="title">太阳系 3D 模拟器</div>
    <div class="hint">
      <span>拖拽</span> 旋转视角
      <span>滚轮</span> 缩放
      <span>点击</span> 查看行星数据
    </div>
  </div>

  <div class="control-panel">
    <label for="speed-slider">公转速度</label>
    <div class="slider-container">
      <input type="range" id="speed-slider" class="speed-slider" min="0" max="5" step="0.1" value="1">
      <span class="speed-value" id="speed-value">1x</span>
    </div>
  </div>

  <button class="reset-btn" id="reset-btn">重置视角</button>

  <div class="info-card" id="info-card">
    <button class="info-card-close" id="info-card-close">×</button>
    <div class="info-card-title">
      <span class="info-card-color-dot" id="card-color-dot"></span>
      <span id="card-name">行星名称</span>
    </div>
    <ul class="info-card-list">
      <li class="info-card-item">
        <span class="info-card-label">相对半径</span>
        <span class="info-card-value" id="card-radius">-</span>
      </li>
      <li class="info-card-item">
        <span class="info-card-label">公转周期</span>
        <span class="info-card-value" id="card-period">-</span>
      </li>
      <li class="info-card-item">
        <span class="info-card-label">距太阳距离</span>
        <span class="info-card-value" id="card-distance">-</span>
      </li>
    </ul>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
