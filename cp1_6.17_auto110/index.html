<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>骰子战魂 - Roguelike战斗模拟器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      background: #1a0f28;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #game-container {
      position: relative;
      width: 800px;
      height: 600px;
      transform-origin: center center;
    }
    #game-canvas {
      display: block;
      border: 3px solid #C9A94C;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(201, 169, 76, 0.3),
                  inset 0 0 60px rgba(0, 0, 0, 0.5);
      cursor: pointer;
    }
    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .screen-shake {
      animation: shake 0.3s ease-in-out;
    }
    @keyframes shake {
      0%, 100% { transform: translate(0, 0) scale(var(--scale, 1)); }
      10%, 30%, 50%, 70%, 90% { transform: translate(-4px, 2px) scale(var(--scale, 1)); }
      20%, 40%, 60%, 80% { transform: translate(4px, -2px) scale(var(--scale, 1)); }
    }
    .gold-flash {
      animation: goldFlash 0.5s ease-out;
    }
    @keyframes goldFlash {
      0% { box-shadow: 0 0 30px rgba(201, 169, 76, 0.3), inset 0 0 60px rgba(0, 0, 0, 0.5); }
      50% { box-shadow: 0 0 80px rgba(255, 215, 0, 0.9), inset 0 0 100px rgba(255, 215, 0, 0.3); }
      100% { box-shadow: 0 0 30px rgba(201, 169, 76, 0.3), inset 0 0 60px rgba(0, 0, 0, 0.5); }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="800" height="600"></canvas>
    <div id="ui-overlay"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
  <script>
    function resize() {
      const container = document.getElementById('game-container');
      const canvas = document.getElementById('game-canvas');
      const scaleX = window.innerWidth / 820;
      const scaleY = window.innerHeight / 620;
      const scale = Math.min(scaleX, scaleY, 1);
      container.style.setProperty('--scale', scale.toString());
      container.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', resize);
    resize();
  </script>
</body>
</html>
