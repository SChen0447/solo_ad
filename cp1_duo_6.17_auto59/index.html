<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS选择器冲突排查工具</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body, #root {
        width: 100%;
        height: 100%;
      }
      body {
        background: linear-gradient(135deg, #f5f5f0 0%, #eae8e0 100%);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .entry-container {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
      }
      .logo {
        font-size: 48px;
        font-weight: 700;
        color: #333;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .logo-icon {
        width: 56px;
        height: 56px;
        background: linear-gradient(135deg, #4e9eff 0%, #7c3aed 100%);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 28px;
      }
      .entry-button {
        padding: 14px 40px;
        font-size: 18px;
        font-weight: 600;
        color: white;
        background: linear-gradient(135deg, #4e9eff 0%, #7c3aed 100%);
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 14px rgba(78, 158, 255, 0.3);
      }
      .entry-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(78, 158, 255, 0.4);
      }
      .entry-button:active {
        transform: scale(0.95);
      }
      .tagline {
        color: #666;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="entry-container">
        <div class="logo">
          <div class="logo-icon">⚡</div>
          <span>CSS Conflict Analyzer</span>
        </div>
        <p class="tagline">快速定位CSS选择器冲突，智能生成修复方案</p>
        <button class="entry-button" onclick="startApp()">启动工具</button>
      </div>
    </div>
    <script>
      function startApp() {
        window.__APP_STARTED__ = true;
        const rootEl = document.getElementById('root');
        rootEl.innerHTML = '';
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
