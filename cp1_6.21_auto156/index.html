<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>子弹弹道模拟沙盒</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(100, 200, 255, 0.2);
      border-top-color: #64c8ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loader-text {
      color: #fff;
      margin-top: 20px;
      font-size: 14px;
      letter-spacing: 2px;
    }

    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .lil-gui {
      --background-color: rgba(20, 20, 40, 0.75) !important;
      --widget-color: rgba(60, 60, 100, 0.8) !important;
      --focus-color: rgba(100, 150, 255, 0.3) !important;
      --hover-color: rgba(80, 80, 130, 0.8) !important;
      --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 8px;
    }

    .lil-gui .title {
      background-color: rgba(80, 80, 140, 0.6) !important;
      border-radius: 8px;
      margin-bottom: 4px;
    }

    .lil-gui .slider {
      border-radius: 6px;
    }

    .lil-gui .slider > .fill {
      background: linear-gradient(90deg, #4a9eff, #64c8ff) !important;
      border-radius: 6px;
    }

    .lil-gui .slider > .widget {
      border-radius: 50%;
      background-color: #64c8ff !important;
    }

    .lil-gui .string,
    .lil-gui .number {
      border-radius: 6px;
    }

    .lil-gui .button {
      border-radius: 8px;
      transition: transform 0.2s ease, background 0.3s ease;
    }

    .lil-gui .button:hover {
      transform: scale(1.05);
      background: linear-gradient(90deg, #4a6fff, #6496ff) !important;
    }

    .lil-gui .checkbox {
      border-radius: 4px;
    }

    .lil-gui .select {
      border-radius: 6px;
    }

    @media (max-width: 1440px) {
      .lil-gui.root {
        position: fixed !important;
        right: 10px !important;
        bottom: 10px !important;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading">
      <div class="loader-container">
        <div class="loader"></div>
        <div class="loader-text">LOADING</div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
