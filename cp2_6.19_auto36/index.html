<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>手势粒子交互画布</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0a0a2e 0%, #1a1a3e 100%);
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #video-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.3;
      transform: scaleX(-1);
    }

    #hand-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
      transform: scaleX(-1);
    }

    #three-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      pointer-events: none;
    }

    #toolbar {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      padding: 16px 24px;
      background: rgba(30, 30, 80, 0.85);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50px;
      z-index: 10;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.4),
        0 0 60px rgba(0, 255, 255, 0.05),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    @supports not ((backdrop-filter: blur(20px)) or (-webkit-backdrop-filter: blur(20px))) {
      #toolbar {
        background: rgba(20, 20, 55, 0.95);
      }
    }

    .toolbar-btn {
      --btn-glow: 0;
      --btn-shadow-x: 0;
      --btn-shadow-y: 0;
      --btn-shadow-blur: 8px;
      --btn-shadow-spread: 0px;
      --btn-shadow-color: rgba(0, 255, 255, 0);
      --btn-scale: 1;
      --btn-translate-y: 0;
      --btn-border-color: rgba(255, 255, 255, 0.3);
      --btn-bg-color: rgba(255, 255, 255, 0.1);

      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1px solid var(--btn-border-color);
      background: var(--btn-bg-color);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition:
        transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
        box-shadow 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
        border-color 0.35s ease,
        background-color 0.35s ease;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 var(--btn-shadow-y) var(--btn-shadow-blur) var(--btn-shadow-spread) var(--btn-shadow-color),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transform: translateY(var(--btn-translate-y)) scale(var(--btn-scale));
      flex-shrink: 0;
    }

    @supports not ((backdrop-filter: blur(10px)) or (-webkit-backdrop-filter: blur(10px))) {
      .toolbar-btn {
        background: rgba(40, 40, 90, 0.9);
      }
    }

    .toolbar-btn::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      background: radial-gradient(
        circle at center,
        rgba(0, 255, 255, calc(var(--btn-glow) * 0.3)) 0%,
        transparent 70%
      );
      pointer-events: none;
      transition: opacity 0.35s ease;
      opacity: var(--btn-glow);
    }

    .toolbar-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.15),
        transparent
      );
      transition: left 0.6s ease;
    }

    .toolbar-btn:hover {
      --btn-translate-y: -6px;
      --btn-scale: 1.08;
      --btn-border-color: rgba(0, 255, 255, 0.7);
      --btn-bg-color: rgba(0, 255, 255, 0.12);
      --btn-shadow-color: rgba(0, 255, 255, 0.4);
      --btn-shadow-blur: 28px;
      --btn-shadow-spread: 2px;
      --btn-glow: 1;
    }

    .toolbar-btn:hover::after {
      left: 100%;
    }

    .toolbar-btn:active {
      --btn-translate-y: -2px;
      --btn-scale: 1.02;
      --btn-shadow-blur: 16px;
      transition-duration: 0.1s;
    }

    .toolbar-btn.active {
      --btn-border-color: rgba(0, 255, 255, 1);
      --btn-shadow-color: rgba(0, 255, 255, 0.55);
      --btn-shadow-blur: 24px;
      --btn-shadow-spread: 1px;
      --btn-bg-color: rgba(0, 255, 255, 0.18);
      --btn-glow: 1;
      animation: activePulse 2.5s ease-in-out infinite;
    }

    @keyframes activePulse {
      0%, 100% {
        --btn-shadow-color: rgba(0, 255, 255, 0.55);
        --btn-shadow-blur: 24px;
      }
      50% {
        --btn-shadow-color: rgba(255, 0, 200, 0.45);
        --btn-shadow-blur: 32px;
      }
    }

    .toolbar-btn svg {
      width: 24px;
      height: 24px;
      fill: #fff;
    }

    .theme-rainbow { background: linear-gradient(135deg, #ff0080, #ff8c00, #40e0d0, #7b68ee); }
    .theme-fire { background: linear-gradient(135deg, #ff4500, #ff6347, #ffd700); }
    .theme-ocean { background: linear-gradient(135deg, #00bfff, #1e90ff, #00ced1); }
    .theme-aurora { background: linear-gradient(135deg, #00ff7f, #00ffff, #9370db); }

    .theme-btn-inner {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      opacity: 0.9;
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a0a2e 0%, #1a1a3e 100%);
      z-index: 100;
      color: #00ffff;
      font-size: 18px;
      flex-direction: column;
      gap: 20px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(0, 255, 255, 0.2);
      border-top-color: #00ffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden {
      display: none !important;
    }

    #fps-counter {
      position: fixed;
      top: 20px;
      right: 20px;
      color: #00ffff;
      font-size: 14px;
      font-family: monospace;
      z-index: 10;
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="video-container">
      <video id="video" autoplay playsinline muted></video>
    </div>
    <canvas id="hand-canvas"></canvas>
    <canvas id="three-canvas"></canvas>
    
    <div id="fps-counter">FPS: --</div>

    <div id="toolbar">
      <button class="toolbar-btn active" data-theme="rainbow" title="彩虹主题">
        <div class="theme-btn-inner theme-rainbow"></div>
      </button>
      <button class="toolbar-btn" data-theme="fire" title="火焰主题">
        <div class="theme-btn-inner theme-fire"></div>
      </button>
      <button class="toolbar-btn" data-theme="ocean" title="海洋主题">
        <div class="theme-btn-inner theme-ocean"></div>
      </button>
      <button class="toolbar-btn" data-theme="aurora" title="极光主题">
        <div class="theme-btn-inner theme-aurora"></div>
      </button>
      <button class="toolbar-btn" id="reset-btn" title="重置粒子">
        <svg viewBox="0 0 24 24">
          <path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
        </svg>
      </button>
      <button class="toolbar-btn" id="capture-btn" title="拍照保存">
        <svg viewBox="0 0 24 24">
          <path d="M12 15.2a3.2 3.2 0 100-6.4 3.2 3.2 0 000 6.4z"/>
          <path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <div>正在加载摄像头和手势识别...</div>
  </div>

  <script type="module" src="/src/App.ts"></script>
</body>
</html>
