<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🏛️%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="历史建筑风格三维交互式探索博物馆" />
    <title>历史建筑探索博物馆 | Architectural Time Explorer</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body {
        font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        background: linear-gradient(135deg, #0a0a2e 0%, #2d1b69 100%);
        color: #fff;
      }
      .loading-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0a0a2e 0%, #2d1b69 100%);
        z-index: 9999;
        transition: opacity 0.6s ease;
      }
      .loading-overlay.hidden { opacity: 0; pointer-events: none; }
      .loading-logo {
        font-size: 64px;
        margin-bottom: 24px;
        animation: float 2s ease-in-out infinite;
      }
      .loading-title {
        font-size: 22px;
        font-weight: 300;
        letter-spacing: 4px;
        margin-bottom: 32px;
        background: linear-gradient(90deg, #64b5f6, #ce93d8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .loading-bar-container {
        width: 280px;
        height: 3px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
        overflow: hidden;
      }
      .loading-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #64b5f6, #ce93d8);
        border-radius: 3px;
        animation: load 2.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      @keyframes load {
        0% { width: 0%; }
        60% { width: 75%; }
        100% { width: 100%; }
      }
    </style>
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-logo">🏛️</div>
      <div class="loading-title">ARCHITECTURAL TIME EXPLORER</div>
      <div class="loading-bar-container">
        <div class="loading-bar"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const overlay = document.getElementById('loadingOverlay');
          if (overlay) {
            overlay.classList.add('hidden');
            setTimeout(() => overlay.remove(), 700);
          }
        }, 2600);
      });
    </script>
  </body>
</html>
