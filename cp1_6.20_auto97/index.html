<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>钢琴键盘模拟器与MIDI音序器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #1e1e2e;
      color: #ffffff;
      min-height: 100vh;
      padding: 20px;
    }

    .app-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: #ffffff;
      margin-bottom: 20px;
      font-size: 28px;
    }

    .main-layout {
      display: flex;
      gap: 20px;
    }

    .left-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .right-panel {
      width: 280px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background-color: #2b2b3d;
      border-radius: 12px;
      padding: 20px;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    .divider {
      height: 1px;
      background-color: #3a3a4f;
      margin: 16px 0;
    }

    .current-note {
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: #6c5ce7;
      min-height: 36px;
      margin-bottom: 16px;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background-color: #6c5ce7;
      color: #ffffff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: filter 0.2s ease;
    }

    .btn:hover {
      filter: brightness(1.2);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-record.recording {
      background-color: #e74c3c;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .speed-control {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }

    .speed-control label {
      font-size: 13px;
      color: #b0b0c0;
    }

    .speed-control input[type="range"] {
      width: 100px;
      cursor: pointer;
    }

    .speed-value {
      font-size: 13px;
      color: #6c5ce7;
      font-weight: bold;
      min-width: 36px;
    }

    .piano-container {
      display: flex;
      justify-content: center;
      padding: 20px 0;
    }

    .piano-keyboard {
      position: relative;
      display: flex;
      user-select: none;
    }

    .white-key {
      width: 40px;
      height: 160px;
      background-color: #ffffff;
      border: 1px solid #cccccc;
      border-radius: 0 0 4px 4px;
      margin-right: -1px;
      cursor: pointer;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      padding-bottom: 8px;
      transition: background-color 0.1s ease, transform 0.1s ease;
    }

    .white-key:last-child {
      margin-right: 0;
    }

    .white-key.active {
      background-color: #d0e8ff;
      transform: translateY(2px);
    }

    .white-key .key-label {
      font-size: 11px;
      color: #888888;
      position: absolute;
      top: 8px;
      pointer-events: none;
    }

    .white-key .note-label {
      font-size: 10px;
      color: #666666;
      pointer-events: none;
    }

    .black-key {
      width: 24px;
      height: 100px;
      background-color: #000000;
      border-radius: 0 0 3px 3px;
      position: absolute;
      top: 0;
      cursor: pointer;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      padding-bottom: 6px;
      transition: background-color 0.1s ease, transform 0.1s ease;
    }

    .black-key.active {
      background-color: #4a6b8a;
      transform: translateY(2px);
    }

    .black-key .key-label {
      font-size: 10px;
      color: #aaaaaa;
      position: absolute;
      top: 6px;
      pointer-events: none;
    }

    .black-key .note-label {
      font-size: 9px;
      color: #888888;
      pointer-events: none;
    }

    .timeline-container {
      position: relative;
      height: 120px;
      background-color: #1a1a2a;
      border-radius: 8px;
      overflow: hidden;
    }

    .timeline-track {
      position: absolute;
      left: 0;
      right: 0;
      height: 24px;
      border-bottom: 1px solid #3a3a4f;
    }

    .timeline-note {
      position: absolute;
      height: 20px;
      top: 2px;
      border-radius: 3px;
      opacity: 0.9;
    }

    .playhead {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background-color: #f39c12;
      z-index: 10;
      pointer-events: none;
    }

    .playhead::before {
      content: '';
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 8px solid #f39c12;
    }

    .track-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .track-card {
      background-color: #f8f9fa;
      color: #333333;
      border-radius: 8px;
      padding: 12px;
      margin: 0 12px;
    }

    .track-card h4 {
      font-size: 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .track-card h4 input {
      flex: 1;
      font-size: 14px;
      border: none;
      background: transparent;
      outline: none;
      font-weight: bold;
      color: #333333;
    }

    .track-controls {
      display: flex;
      gap: 8px;
    }

    .track-btn {
      flex: 1;
      padding: 6px 8px;
      font-size: 12px;
      border: 2px solid #2ecc71;
      border-radius: 4px;
      background-color: #2ecc71;
      color: #ffffff;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .track-btn.muted {
      background-color: transparent;
      color: #95a5a6;
      border-color: #95a5a6;
    }

    .track-btn.delete-btn {
      background-color: #e74c3c;
      border-color: #e74c3c;
      color: #ffffff;
    }

    .track-btn.delete-btn:hover {
      filter: brightness(1.1);
    }

    .track-color-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #ffffff;
    }

    .track-list-container .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .track-count {
      font-size: 13px;
      color: #b0b0c0;
      font-weight: normal;
    }

    .empty-tracks {
      text-align: center;
      color: #70708a;
      font-size: 13px;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <h1>🎹 钢琴键盘模拟器与MIDI音序器</h1>
    
    <div class="main-layout">
      <div class="left-panel">
        <div class="card">
          <div class="current-note" id="currentNote">—</div>
          
          <div class="controls">
            <button class="btn btn-record" id="recordBtn">⏺ 录音</button>
            <button class="btn" id="stopBtn" disabled>⏹ 停止</button>
            <button class="btn" id="playBtn">▶ 播放</button>
            
            <div class="speed-control">
              <label>速度:</label>
              <input type="range" id="speedSlider" min="0.5" max="2" step="0.5" value="1">
              <span class="speed-value" id="speedValue">1x</span>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="section-title">钢琴键盘</div>
          <div class="piano-container">
            <div class="piano-keyboard" id="pianoKeyboard"></div>
          </div>
        </div>

        <div class="card">
          <div class="section-title">时间线</div>
          <div class="timeline-container" id="timelineContainer">
            <div class="playhead" id="playhead" style="left: 0;"></div>
          </div>
        </div>
      </div>

      <div class="right-panel">
        <div class="card track-list-container">
          <div class="section-title">
            <span>音轨列表</span>
            <span class="track-count" id="trackCount">0 / 4</span>
          </div>
          <div class="track-list" id="trackList">
            <div class="empty-tracks">暂无音轨，点击录音开始录制</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
