<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>太空舰队实时对战</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%; overflow: hidden;
        font-family: 'Rajdhani', sans-serif;
        color: #e0e8ff;
        background: linear-gradient(180deg, #0a0e27 0%, #1a1a3e 100%);
        user-select: none;
      }
      #app { width: 100vw; height: 100vh; position: relative; }
      button {
        font-family: 'Orbitron', sans-serif;
        cursor: pointer;
        border: 1px solid rgba(0, 212, 255, 0.5);
        background: rgba(10, 14, 39, 0.85);
        color: #e0e8ff;
        padding: 8px 16px;
        border-radius: 4px;
        transition: all 0.2s ease-out;
        letter-spacing: 1px;
      }
      button:hover {
        background: rgba(0, 212, 255, 0.2);
        border-color: #00d4ff;
        box-shadow: 0 0 12px rgba(0, 212, 255, 0.4);
      }
      button:active { transform: scale(0.97); }
      h1, h2, h3 { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }

      .panel {
        background: rgba(10, 14, 39, 0.85);
        border: 1px solid rgba(0, 212, 255, 0.3);
        backdrop-filter: blur(8px);
        box-shadow: 0 0 20px rgba(0, 212, 255, 0.15);
        border-radius: 6px;
      }

      @keyframes slideInRight {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInLeft {
        from { transform: translateX(-100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInUp {
        from { transform: translateY(100%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes slideInDown {
        from { transform: translateY(-100%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes breathe {
        0%, 100% { opacity: 0.6; box-shadow: 0 0 6px rgba(0, 212, 255, 0.3); }
        50% { opacity: 1; box-shadow: 0 0 18px rgba(0, 212, 255, 0.8); }
      }
      @keyframes pulse {
        0%, 100% { border-color: rgba(0, 212, 255, 0.8); }
        50% { border-color: #00d4ff; box-shadow: 0 0 14px rgba(0, 212, 255, 0.9); }
      }

      .modal-overlay {
        position: fixed; inset: 0;
        background: rgba(10, 14, 39, 0.75);
        display: flex; align-items: center; justify-content: center;
        z-index: 200;
        animation: fadeIn 0.3s ease-out;
      }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

      .hp-bar-bg {
        background: rgba(255, 60, 60, 0.25);
        border-radius: 2px; overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
