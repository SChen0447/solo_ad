<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星际矿井 - Interstellar Mine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #050510 0%, #0a0a2a 100%);
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }
    #game-container {
      width: 100%; height: 100%;
      position: relative;
    }
    #start-screen {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100;
      background: linear-gradient(135deg, #050510 0%, #0a0a2a 100%);
      transition: opacity 0.5s ease-out;
    }
    #start-screen.hidden { opacity: 0; pointer-events: none; }
    #start-screen h1 {
      font-size: 64px; font-weight: 900;
      color: #00d4ff;
      text-shadow: 0 0 30px rgba(0,212,255,0.6), 0 0 60px rgba(0,212,255,0.3), 0 0 90px rgba(0,212,255,0.15);
      letter-spacing: 8px;
      margin-bottom: 20px;
      animation: titlePulse 2s ease-in-out infinite;
    }
    #start-screen p {
      color: #7aa8cc; font-size: 18px; margin-bottom: 40px; letter-spacing: 2px;
    }
    #start-btn {
      background: linear-gradient(135deg, #00d4ff 0%, #0088cc 100%);
      border: 2px solid #00d4ff;
      color: #fff; font-size: 22px; font-weight: 700;
      padding: 16px 48px; border-radius: 8px;
      cursor: pointer; letter-spacing: 3px;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(0,212,255,0.3);
    }
    #start-btn:hover {
      box-shadow: 0 0 40px rgba(0,212,255,0.6), 0 0 80px rgba(0,212,255,0.2);
      transform: scale(1.05);
    }
    @keyframes titlePulse {
      0%, 100% { text-shadow: 0 0 30px rgba(0,212,255,0.6), 0 0 60px rgba(0,212,255,0.3); }
      50% { text-shadow: 0 0 50px rgba(0,212,255,0.8), 0 0 100px rgba(0,212,255,0.4), 0 0 120px rgba(0,212,255,0.2); }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="start-screen">
      <h1>星际矿井</h1>
      <p>INTERSTELLAR MINE</p>
      <button id="start-btn">启动引擎</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
