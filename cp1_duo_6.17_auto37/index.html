<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日照模拟与分析</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    body {
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #16213e 100%);
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #app-title {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #ffffff;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 1px;
      z-index: 10;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      pointer-events: none;
    }

    #screenshot-btn {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: rgba(0, 0, 0, 0.7);
      color: #ffffff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    #screenshot-btn:hover {
      background: rgba(60, 60, 80, 0.85);
    }

    #screenshot-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    #legend-bar {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 30px;
      height: 240px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    #legend-gradient {
      width: 22px;
      height: 200px;
      border-radius: 4px;
      background: linear-gradient(to top, #00ff00 0%, #ffff00 50%, #ff0000 100%);
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    }

    #legend-labels {
      position: absolute;
      right: 36px;
      top: 0;
      height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: #ffffff;
      font-size: 12px;
      font-weight: 500;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
    }

    #legend-title {
      color: #ffffff;
      font-size: 12px;
      font-weight: 500;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      margin-top: 4px;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
    }

    .lil-gui {
      --background-color: rgba(0, 0, 0, 0.7) !important;
      --widget-color: rgba(50, 50, 70, 0.8) !important;
      --focus-color: rgba(100, 100, 140, 0.9) !important;
      --hover-color: rgba(80, 80, 110, 0.8) !important;
      --font-color: #ffffff !important;
      border-radius: 4px !important;
      --width: 260px !important;
    }

    .lil-gui .title {
      border-radius: 4px 4px 0 0 !important;
    }

    .lil-gui .controller {
      border-radius: 0 !important;
    }

    .lil-gui .children {
      border-radius: 0 0 4px 4px !important;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="app-title">日照模拟与分析</div>
    <div id="legend-bar">
      <div id="legend-labels">
        <span>100%</span>
        <span>50%</span>
        <span>0%</span>
      </div>
      <div id="legend-gradient"></div>
      <div id="legend-title">阴影比例</div>
    </div>
    <button id="screenshot-btn">
      <svg viewBox="0 0 24 24">
        <path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
      </svg>
      <span>截图导出</span>
    </button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
