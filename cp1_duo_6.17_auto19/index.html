<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 城市生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
    }
    
    body {
      background: linear-gradient(135deg, #0a0a2a 0%, #2d2d44 100%);
    }
    
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    
    canvas {
      display: block;
    }
    
    #fps-counter {
      position: absolute;
      top: 20px;
      right: 20px;
      color: #00FF00;
      font-family: monospace;
      font-size: 14px;
      z-index: 100;
      text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
    }
    
    #camera-info {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: #ffffff;
      font-family: sans-serif;
      font-size: 13px;
      z-index: 100;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 15px;
      border-radius: 8px;
      line-height: 1.6;
    }
    
    .lil-gui {
      --background-color: rgba(0, 0, 0, 0.6) !important;
      --widget-color: rgba(60, 60, 80, 0.8) !important;
      --font-color: #ffffff !important;
      --title-background-color: rgba(30, 30, 50, 0.8) !important;
      border-radius: 12px !important;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    
    .lil-gui .title {
      border-radius: 12px 12px 0 0 !important;
    }
    
    .lil-gui .close-button {
      background: transparent !important;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="fps-counter">FPS: 60</div>
    <div id="camera-info">
      <div>位置: X: 0.00, Y: 0.00, Z: 0.00</div>
      <div>朝向: 0.00°</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
