<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D City Skyline Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0A0A0A;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
    }
    #param-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 280px;
      padding: 16px;
      background: rgba(20, 20, 30, 0.85);
      border-radius: 12px;
      color: #CCCCCC;
      font-size: 14px;
      backdrop-filter: blur(8px);
      transition: background 0.8s ease-in-out;
      z-index: 100;
    }
    #stats-panel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 220px;
      height: 180px;
      padding: 16px;
      background: rgba(20, 20, 30, 0.85);
      border-radius: 12px;
      color: #CCCCCC;
      font-size: 14px;
      backdrop-filter: blur(8px);
      transition: background 0.8s ease-in-out;
      z-index: 100;
    }
    .panel-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #FFFFFF;
    }
    .param-group {
      margin-bottom: 14px;
    }
    .param-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      color: #AAAAAA;
    }
    .param-value {
      color: #00BFFF;
      font-weight: 500;
    }
    input[type="range"] {
      width: 100%;
      height: 6px;
      background: #333333;
      border-radius: 3px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      background: #00BFFF;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.3s;
    }
    input[type="range"]::-moz-range-thumb {
      width: 12px;
      height: 12px;
      background: #00BFFF;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      transition: background 0.3s;
    }
    select {
      width: 100%;
      padding: 6px 10px;
      background: #222222;
      color: #CCCCCC;
      border: 1px solid #333333;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      cursor: pointer;
    }
    select:focus {
      border-color: #00BFFF;
    }
    .stats-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .stats-label {
      color: #888888;
    }
    .stats-number {
      color: #FFFFFF;
      font-weight: 600;
    }
    .chart-container {
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="param-panel"></div>
    <div id="stats-panel"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
