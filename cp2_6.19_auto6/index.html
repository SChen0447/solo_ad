<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>城市天际线生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      padding: 0 20px;
      z-index: 100;
      gap: 16px;
    }

    #toolbar .logo {
      font-size: 16px;
      font-weight: 700;
      color: #00d2ff;
      letter-spacing: 1px;
    }

    #toolbar .separator {
      width: 1px;
      height: 24px;
      background: #0f3460;
    }

    .tool-btn {
      background: transparent;
      border: 1px solid #0f3460;
      color: #a0c4ff;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .tool-btn:hover {
      background: #0f3460;
      color: #00d2ff;
    }

    .tool-btn.active {
      background: #0f3460;
      color: #00d2ff;
      border-color: #00d2ff;
    }

    #zoom-info {
      margin-left: auto;
      font-size: 12px;
      color: #7a8ba6;
    }

    #building-panel {
      position: fixed;
      top: 48px;
      left: 0;
      width: 220px;
      bottom: 0;
      background: #16213e;
      border-right: 1px solid #0f3460;
      overflow-y: auto;
      z-index: 90;
      padding: 12px;
    }

    #building-panel h3 {
      font-size: 13px;
      color: #7a8ba6;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .building-card {
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      cursor: grab;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      user-select: none;
    }

    .building-card:hover {
      transform: scale(1.04);
      border-color: #00d2ff;
      box-shadow: 0 0 12px rgba(0, 210, 255, 0.15);
    }

    .building-card.selected {
      border-color: #00d2ff;
      box-shadow: 0 0 16px rgba(0, 210, 255, 0.3);
    }

    .building-card canvas {
      display: block;
      margin: 0 auto 8px;
    }

    .building-card .card-name {
      font-size: 12px;
      color: #c0d6e8;
      text-align: center;
    }

    #canvas-container {
      position: fixed;
      top: 48px;
      left: 220px;
      right: 0;
      bottom: 0;
      overflow: hidden;
      background: #0a0a1a;
    }

    #main-canvas {
      display: block;
      cursor: crosshair;
    }

    #reset-view-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 210, 255, 0.15);
      border: 1px solid #00d2ff;
      color: #00d2ff;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    #reset-view-btn.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #reset-view-btn:hover {
      background: rgba(0, 210, 255, 0.3);
    }

    #building-panel::-webkit-scrollbar {
      width: 4px;
    }

    #building-panel::-webkit-scrollbar-track {
      background: transparent;
    }

    #building-panel::-webkit-scrollbar-thumb {
      background: #0f3460;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <span class="logo">🏙️ 天际线工坊</span>
    <div class="separator"></div>
    <button class="tool-btn" id="btn-day">☀️ 白天</button>
    <button class="tool-btn active" id="btn-night">🌙 夜景</button>
    <div class="separator"></div>
    <button class="tool-btn" id="btn-delete" title="删除选中建筑 (Delete)">🗑️ 删除</button>
    <button class="tool-btn" id="btn-clear" title="清空画布">🧹 清空</button>
    <span id="zoom-info">缩放: 100%</span>
  </div>

  <div id="building-panel">
    <h3>建筑组件</h3>
    <div id="card-list"></div>
  </div>

  <div id="canvas-container">
    <canvas id="main-canvas"></canvas>
  </div>

  <button id="reset-view-btn">归位</button>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
