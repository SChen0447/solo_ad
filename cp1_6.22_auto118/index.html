<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>诗意粒子 - 沉浸式阅读体验</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 100%);
    }

    #app {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    .input-panel {
      width: 30%;
      min-width: 300px;
      padding: 32px 28px;
      background: transparent;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .input-panel h1 {
      font-size: 24px;
      font-weight: 700;
      color: #2d3748;
      background: #ffffff;
      padding: 16px 20px;
      border-radius: 12px;
      border: 2px solid #2d3748;
      text-align: center;
    }

    .text-input {
      flex: 1;
      min-height: 120px;
      padding: 16px;
      background: #ffffff;
      border: 2px solid #2d3748;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.8;
      color: #2d3748;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .text-input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
    }

    .text-input::placeholder {
      color: #a0aec0;
    }

    .generate-btn {
      min-height: 48px;
      padding: 0 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 8px;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s, filter 0.2s;
      box-shadow: 0 4px 14px rgba(102, 126, 234, 0.35);
    }

    .generate-btn:hover {
      filter: brightness(1.08);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
    }

    .generate-btn:active {
      transform: scale(0.98);
    }

    .generate-btn:disabled {
      filter: grayscale(0.4);
      cursor: not-allowed;
      box-shadow: none;
    }

    .divider {
      width: 2px;
      background: #cbd5e0;
      flex-shrink: 0;
    }

    .scene-panel {
      flex: 1;
      position: relative;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 100%);
      overflow: hidden;
    }

    #three-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .theme-switcher {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
      z-index: 10;
    }

    .theme-btn {
      min-width: 44px;
      min-height: 44px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #ffffff;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .theme-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .theme-btn.active {
      background: rgba(102, 126, 234, 0.5);
      border-color: #667eea;
    }

    .speed-control {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      z-index: 10;
    }

    .speed-label {
      color: #ffffff;
      font-size: 14px;
      white-space: nowrap;
    }

    .speed-slider {
      width: 200px;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: #e2e8f0;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    .speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      background: #667eea;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.5);
      transition: transform 0.15s;
    }

    .speed-slider::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    .speed-slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      background: #667eea;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.5);
    }

    .speed-value {
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      min-width: 40px;
      text-align: right;
    }

    .particle-tooltip {
      position: fixed;
      padding: 8px 14px;
      background: rgba(0, 0, 0, 0.5);
      color: #ffffff;
      font-size: 14px;
      border-radius: 8px;
      pointer-events: none;
      z-index: 100;
      opacity: 0;
      transform: translate(-50%, -120%);
      transition: opacity 0.2s;
      white-space: nowrap;
      backdrop-filter: blur(4px);
    }

    .particle-tooltip.visible {
      opacity: 1;
    }

    @media (max-width: 768px) {
      #app {
        flex-direction: column;
      }

      .input-panel {
        width: 100%;
        height: 50vh;
        min-width: 0;
        padding: 16px;
        gap: 12px;
      }

      .input-panel h1 {
        font-size: 20px;
        padding: 12px 16px;
      }

      .generate-btn {
        min-height: 52px;
        font-size: 17px;
      }

      .divider {
        width: 100%;
        height: 2px;
      }

      .scene-panel {
        height: 50vh;
      }

      .speed-slider {
        width: 150px;
      }

      .theme-switcher {
        top: 12px;
        right: 12px;
        gap: 8px;
      }

      .theme-btn {
        min-width: 52px;
        min-height: 52px;
        font-size: 13px;
        padding: 6px 12px;
      }

      .speed-control {
        bottom: 16px;
        padding: 10px 16px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="input-panel">
      <h1>诗意粒子</h1>
      <textarea
        class="text-input"
        id="text-input"
        placeholder="请输入一段诗词或散文（不超过200字）...&#10;&#10;例如：&#10;明月几时有，把酒问青天。&#10;不知天上宫阙，今夕是何年。"
        maxlength="200"
      ></textarea>
      <button class="generate-btn" id="generate-btn">生成粒子</button>
    </div>

    <div class="divider"></div>

    <div class="scene-panel" id="scene-panel">
      <canvas id="three-canvas"></canvas>

      <div class="theme-switcher">
        <button class="theme-btn" data-theme="sunrise">晨曦</button>
        <button class="theme-btn" data-theme="galaxy">星河</button>
        <button class="theme-btn" data-theme="forest">森林</button>
      </div>

      <div class="speed-control">
        <span class="speed-label">速度</span>
        <input type="range" class="speed-slider" id="speed-slider" min="0.1" max="5" step="0.1" value="1" />
        <span class="speed-value" id="speed-value">1.0x</span>
      </div>

      <div class="particle-tooltip" id="particle-tooltip"></div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
