<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaxy Explorer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Helvetica, Arial, sans-serif;
      color: #e0f7ff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    #info-panel {
      position: fixed;
      top: 20px;
      right: -280px;
      width: 250px;
      background: rgba(10, 10, 20, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(79, 195, 247, 0.3);
      border-radius: 8px;
      padding: 20px;
      color: #e0f7ff;
      transition: right 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.4s ease;
      opacity: 0;
      z-index: 100;
      font-family: Helvetica, Arial, sans-serif;
    }

    #info-panel.visible {
      right: 20px;
      opacity: 1;
    }

    #info-panel .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(79, 195, 247, 0.2);
    }

    #info-panel h2 {
      font-size: 16px;
      font-weight: 600;
      color: #4fc3f7;
      letter-spacing: 1px;
    }

    #info-panel .close-btn {
      background: none;
      border: none;
      color: #b0bec5;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.2s, color 0.2s;
    }

    #info-panel .close-btn:hover {
      background: rgba(79, 195, 247, 0.1);
      color: #4fc3f7;
    }

    #info-panel .star-name {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 16px;
    }

    #info-panel .info-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 13px;
    }

    #info-panel .info-label {
      color: #b0bec5;
    }

    #info-panel .info-value {
      color: #4fc3f7;
      font-weight: 600;
    }

    #controls-hint {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(10, 10, 20, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 12px;
      color: #b0bec5;
      line-height: 1.8;
      z-index: 100;
      border: 1px solid rgba(79, 195, 247, 0.2);
    }

    #controls-hint .key {
      display: inline-block;
      background: rgba(79, 195, 247, 0.15);
      color: #4fc3f7;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
      margin-right: 4px;
      min-width: 18px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    
    <div id="info-panel">
      <div class="panel-header">
        <h2>STAR DATA</h2>
        <button class="close-btn" id="close-panel">&times;</button>
      </div>
      <div class="star-name" id="star-name">-</div>
      <div class="info-row">
        <span class="info-label">Spectral Type</span>
        <span class="info-value" id="star-spectral">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">Temperature</span>
        <span class="info-value" id="star-temp">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">Radius</span>
        <span class="info-value" id="star-radius">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">Luminosity</span>
        <span class="info-value" id="star-luminosity">-</span>
      </div>
    </div>

    <div id="controls-hint">
      <div><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> Move</div>
      <div><span class="key">Q</span><span class="key">E</span> Up / Down</div>
      <div><span class="key">Drag</span> Rotate View</div>
      <div><span class="key">Click</span> Star Info</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
