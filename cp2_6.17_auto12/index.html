<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roguelike 迷宫探索</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #status-bar {
      width: 100%;
      height: 40px;
      background: #2c2c2c;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 0 16px;
      font-size: 13px;
      z-index: 10;
      border-bottom: 1px solid #3a3a4a;
      flex-shrink: 0;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-label {
      color: #888;
    }

    .status-value {
      color: #e0e0e0;
      font-weight: bold;
    }

    .hp-bar-mini {
      width: 60px;
      height: 8px;
      background: #444;
      border-radius: 4px;
      overflow: hidden;
    }

    .hp-bar-mini-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s, background 0.3s;
    }

    #game-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      opacity: 1;
      transition: opacity 0.3s;
    }

    #game-container.fading {
      opacity: 0;
    }

    #maze-grid {
      display: grid;
      position: relative;
      border: 3px solid #3a3a4a;
      border-radius: 4px;
      overflow: hidden;
    }

    .cell {
      width: 40px;
      height: 40px;
      position: relative;
      transition: opacity 0.3s, filter 0.3s;
      opacity: 0;
      animation: cellFadeIn 0.2s forwards;
    }

    @keyframes cellFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .cell.wall {
      background: #4a4a4a;
    }

    .cell.corridor {
      background: #f5f0e1;
    }

    .cell.start {
      background: #4caf50;
    }

    .cell.end {
      background: #e53935;
    }

    .cell.fog {
      filter: brightness(0.15);
    }

    .cell.visible {
      filter: brightness(1);
    }

    .cell.fog-edge {
      filter: brightness(0.5);
    }

    #player {
      width: 20px;
      height: 20px;
      background: #2196f3;
      border-radius: 50%;
      position: absolute;
      z-index: 5;
      pointer-events: none;
      transition: left 0.1s, top 0.1s;
      box-shadow: 0 0 8px rgba(33, 150, 243, 0.6);
    }

    .item-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 20px;
      z-index: 3;
      pointer-events: none;
      transition: transform 0.3s, opacity 0.3s;
    }

    .item-icon.picked {
      transform: translate(-50%, -50%) scale(0) rotate(360deg);
      opacity: 0;
    }

    .chest-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 20px;
      z-index: 3;
      pointer-events: none;
    }

    .monster-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 22px;
      z-index: 3;
      pointer-events: none;
    }

    #battle-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #battle-overlay.active {
      display: flex;
    }

    #battle-card {
      width: 320px;
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      color: #333;
      text-align: center;
      position: relative;
    }

    .combatant-info {
      margin: 10px 0;
    }

    .combatant-name {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .attr-bar-container {
      width: 100%;
      height: 12px;
      background: #ddd;
      border-radius: 6px;
      overflow: hidden;
      margin: 4px 0;
    }

    .attr-bar-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.3s, background 0.3s;
    }

    .combatant-stats {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    .battle-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 16px;
    }

    .battle-btn {
      padding: 10px 28px;
      font-size: 16px;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      transition: background 0.2s, transform 0.1s;
    }

    .battle-btn:active {
      transform: scale(0.95);
    }

    .battle-btn:disabled {
      background: #999;
      cursor: not-allowed;
    }

    #attack-btn {
      background: #e53935;
    }

    #attack-btn:hover:not(:disabled) {
      background: #c62828;
    }

    #defend-btn {
      background: #2196f3;
    }

    #defend-btn:hover:not(:disabled) {
      background: #1976d2;
    }

    #defend-btn.defending {
      background: #1565c0;
      box-shadow: 0 0 10px rgba(33, 150, 243, 0.6);
    }

    .battle-log {
      margin-top: 10px;
      font-size: 12px;
      color: #555;
      height: 60px;
      max-height: 60px;
      overflow-y: auto;
      background: #f0f0f0;
      border-radius: 6px;
      padding: 6px 8px;
      text-align: left;
    }

    .battle-log div {
      line-height: 1.4;
    }

    .damage-number {
      position: absolute;
      font-size: 20px;
      font-weight: bold;
      pointer-events: none;
      z-index: 10;
      animation: damageFloat 0.5s ease-out forwards;
    }

    .damage-number.player-dmg {
      color: #2196f3;
    }

    .damage-number.monster-dmg {
      color: #e53935;
    }

    @keyframes damageFloat {
      0% {
        opacity: 1;
        transform: translateY(0) translateX(-50%);
      }
      100% {
        opacity: 0;
        transform: translateY(-40px) translateX(-50%);
      }
    }

    @keyframes attackFlash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    @keyframes hitShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .flash-anim {
      animation: attackFlash 0.1s;
    }

    .shake-anim {
      animation: hitShake 0.2s;
    }

    #game-over-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    #game-over-overlay.active {
      display: flex;
    }

    #game-over-card {
      background: #2c2c2c;
      border-radius: 12px;
      padding: 32px;
      text-align: center;
      color: #e0e0e0;
    }

    #game-over-card h2 {
      font-size: 28px;
      margin-bottom: 16px;
      color: #e53935;
    }

    #game-over-card p {
      font-size: 18px;
      margin: 8px 0;
    }

    #restart-btn {
      margin-top: 20px;
      padding: 12px 36px;
      font-size: 16px;
      background: #4caf50;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      transition: background 0.2s;
    }

    #restart-btn:hover {
      background: #388e3c;
    }

    #battle-result-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 150;
      align-items: center;
      justify-content: center;
    }

    #battle-result-overlay.active {
      display: flex;
    }

    #battle-result-card {
      background: #2c2c2c;
      border-radius: 12px;
      padding: 24px 32px;
      text-align: center;
      color: #e0e0e0;
    }

    #battle-result-card h3 {
      font-size: 22px;
      margin-bottom: 12px;
    }

    #battle-result-card p {
      font-size: 14px;
      margin: 4px 0;
    }

    #battle-result-close {
      margin-top: 14px;
      padding: 8px 24px;
      font-size: 14px;
      background: #4caf50;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
    }

    @media (max-width: 1023px) {
      #battle-card {
        width: 100%;
        height: 100%;
        border-radius: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div id="status-bar">
    <div class="status-item">
      <span class="status-label">层数:</span>
      <span class="status-value" id="floor-num">1</span>
    </div>
    <div class="status-item">
      <span class="status-label">HP:</span>
      <span class="status-value" id="hp-num" style="color:#4caf50;">20/20</span>
      <div class="hp-bar-mini">
        <div class="hp-bar-mini-fill" id="hp-bar" style="width:100%;background:#4caf50;"></div>
      </div>
    </div>
    <div class="status-item">
      <span class="status-label">已探索:</span>
      <span class="status-value" id="explored-num">0</span>
    </div>
    <div class="status-item">
      <span class="status-label">击败:</span>
      <span class="status-value" id="killed-num">0</span>
    </div>
    <div class="status-item">
      <span class="status-label">物品:</span>
      <span class="status-value" id="inventory-display">无</span>
    </div>
  </div>

  <div id="game-container">
    <div id="maze-grid"></div>
    <div id="player"></div>
  </div>

  <div id="battle-overlay">
    <div id="battle-card">
      <div class="combatant-info" id="player-info"></div>
      <div style="font-size:20px;margin:8px 0;">⚔️ VS ⚔️</div>
      <div class="combatant-info" id="monster-info"></div>
      <div class="battle-log" id="battle-log"></div>
      <div class="battle-buttons">
        <button id="attack-btn" class="battle-btn">攻击</button>
        <button id="defend-btn" class="battle-btn">防御</button>
      </div>
    </div>
  </div>

  <div id="battle-result-overlay">
    <div id="battle-result-card">
      <h3 id="battle-result-title"></h3>
      <p id="battle-result-msg"></p>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:14px;">
        <button id="battle-result-close">确定</button>
        <button id="battle-result-continue" style="display:none;">继续探索</button>
      </div>
    </div>
  </div>

  <div id="game-over-overlay">
    <div id="game-over-card">
      <h2>游戏结束</h2>
      <p id="final-score"></p>
      <p id="final-stats"></p>
      <button id="restart-btn">重新开始</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
