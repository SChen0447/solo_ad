<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D粒子流体动力学模拟</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0b0b1a;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
    }
    #fps-counter {
      position: fixed;
      top: 16px;
      right: 16px;
      color: #ccc;
      background: rgba(0, 0, 0, 0.5);
      padding: 8px 14px;
      border-radius: 6px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 14px;
      z-index: 100;
      pointer-events: none;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    #particle-count {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }
    .dg.main {
      background: rgba(255, 255, 255, 0.1) !important;
      backdrop-filter: blur(10px);
    }
    .dg.main .close-button {
      background: rgba(255, 255, 255, 0.1) !important;
      color: #ccc !important;
    }
    .dg li.title {
      background: rgba(100, 100, 200, 0.3) !important;
      color: #fff !important;
    }
    .dg .c .slider {
      background: linear-gradient(90deg, #4a6cf7, #f74a6c) !important;
      border-radius: 3px;
    }
    .dg .c .slider-fg {
      background: rgba(255, 255, 255, 0.4) !important;
      border-radius: 3px;
    }
    .dg .c input[type=text] {
      color: #ccc !important;
      background: rgba(0, 0, 0, 0.4) !important;
    }
    .dg .property-name {
      color: #ccc !important;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="fps-counter">
    <div>FPS: <span id="fps-value">--</span></div>
    <div id="particle-count">粒子: --</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
