<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>手势识别与三维网格变形</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1A2A2A;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #video-container {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 320px;
      height: 240px;
      border-radius: 8px;
      overflow: hidden;
      opacity: 0.7;
      z-index: 10;
      background: rgba(0, 0, 0, 0.3);
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #hand-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    #finger-count {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 24px;
      color: #7FB3B3;
      font-weight: bold;
      padding: 4px 12px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 6px;
      opacity: 0;
      animation: fadeIn 0.3s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #permission-tip {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 16px;
      background: rgba(0, 0, 0, 0.7);
      color: #E8F0F0;
      text-align: center;
      z-index: 100;
      backdrop-filter: blur(8px);
      transition: opacity 0.5s ease;
    }

    #gesture-status-bar {
      position: relative;
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 320px;
      height: 50px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 16px;
      z-index: 20;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .gesture-text {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .gesture-text.left {
      color: #F0A0A0;
    }

    .gesture-text.right {
      color: #A0B0F0;
    }

    .gesture-icons {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hand-icon {
      font-size: 22px;
      display: inline-block;
      transition: transform 0.15s ease, opacity 0.15s ease;
      transform-origin: center;
    }

    .hand-icon.switching {
      transform: rotate(20deg) scale(1.2);
      opacity: 0.5;
    }

    .hand-icon.pulse-left,
    .hand-icon.pulse-right {
      animation: pinchPulse 0.3s ease-in-out;
    }

    @keyframes pinchPulse {
      0%   { transform: scale(1.0); }
      50%  { transform: scale(0.85); }
      100% { transform: scale(1.0); }
    }

    .gesture-text.left.pinch-highlight {
      color: #FF6B6B !important;
      transition: color 0.2s ease;
    }

    .gesture-text.right.pinch-highlight {
      color: #6B8BFF !important;
      transition: color 0.2s ease;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      display: inline-block;
      flex-shrink: 0;
      transition: background-color 0.2s ease;
    }

    .status-dot.blinking {
      animation: dotBlink 0.6s ease-in-out 2;
    }

    @keyframes dotBlink {
      0%, 100% {
        background: rgba(255, 255, 255, 0.3);
        box-shadow: none;
      }
      50% {
        background: #4ADE80;
        box-shadow: 0 0 8px rgba(74, 222, 128, 0.8);
      }
    }

    .both-pinch-hint {
      position: absolute;
      left: 50%;
      top: -28px;
      transform: translateX(-50%);
      font-size: 16px;
      color: #FFD700;
      font-weight: 600;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
      transition: opacity 0.3s ease;
    }

    .both-pinch-hint.visible {
      opacity: 1;
      animation: hintFadeIn 0.3s ease forwards;
    }

    .both-pinch-hint.fading {
      animation: hintFadeOut 0.5s ease forwards;
    }

    @keyframes hintFadeIn {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @keyframes hintFadeOut {
      from {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      to {
        opacity: 0;
        transform: translateX(-50%) translateY(-8px);
      }
    }

    .icon-separator {
      color: #7FB3B3;
      font-size: 18px;
    }

    #control-panel {
      position: fixed;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      width: 220px;
      background: rgba(42, 58, 58, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 10px;
      padding: 18px;
      z-index: 20;
      border: 0.2px solid rgba(255, 255, 255, 0.4);
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    #control-panel.hidden {
      transform: translateY(-50%) translateX(calc(100% + 30px));
      opacity: 0;
      pointer-events: none;
    }

    .panel-title {
      color: #7FB3B3;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      text-align: center;
      letter-spacing: 1px;
    }

    .control-group {
      margin-bottom: 16px;
    }

    .control-label {
      color: #B0D0D0;
      font-size: 12px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }

    .control-value {
      color: #7FB3B3;
      font-weight: 600;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: #4A6B6B;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #B0D0D0;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #D0E8E8;
      transform: scale(1.15);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #B0D0D0;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      transition: background 0.2s ease, transform 0.2s ease;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    input[type="range"]::-moz-range-thumb:hover {
      background: #D0E8E8;
      transform: scale(1.15);
    }

    .subdivision-select {
      width: 100%;
      padding: 8px 10px;
      background: #3A4A4A;
      border: 1px solid #4A6B6B;
      border-radius: 6px;
      color: #E8F0F0;
      font-size: 13px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .subdivision-select:hover {
      border-color: #7FB3B3;
    }

    .subdivision-select option {
      background: #2A3A3A;
      color: #E8F0F0;
    }

    .subdivision-select option:checked {
      background: #A0C0C0;
      color: #1A2A2A;
    }

    #reset-btn {
      width: 180px;
      height: 40px;
      margin: 8px auto 0;
      display: block;
      background: #5A8A8A;
      border: none;
      border-radius: 6px;
      color: #E8F0F0;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.1s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    #reset-btn:hover {
      background: #7AB0B0;
      box-shadow: 0 4px 16px rgba(122, 176, 176, 0.4);
    }

    #reset-btn:active {
      transform: scale(0.97);
    }

    #panel-toggle {
      display: none;
      position: fixed;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      width: 40px;
      height: 40px;
      background: #3A5A5A;
      border: none;
      border-radius: 6px;
      color: #E8F0F0;
      font-size: 20px;
      cursor: pointer;
      z-index: 25;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
    }

    #panel-toggle:hover {
      background: #5A7A7A;
    }

    #performance-warning {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 8px 14px;
      background: #3A3A00;
      color: #FFFFA0;
      font-size: 14px;
      border-radius: 4px;
      z-index: 30;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    #performance-warning.visible {
      opacity: 1;
    }

    @media (max-width: 768px) {
      #video-container {
        width: 180px;
        height: 135px;
        top: 10px;
        left: 10px;
      }

      #finger-count {
        font-size: 18px;
      }

      #control-panel {
        right: 10px;
        width: 200px;
        padding: 14px;
      }

      #control-panel.hidden {
        transform: translateY(-50%) translateX(calc(100% + 20px));
      }

      #panel-toggle {
        display: flex;
      }

      #gesture-status-bar {
        width: calc(100% - 40px);
        height: 45px;
        bottom: 20px;
      }

      .gesture-text {
        font-size: 12px;
      }

      .hand-icon {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    
    <div id="video-container">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="hand-canvas"></canvas>
      <div id="finger-count">0</div>
    </div>

    <div id="permission-tip" style="display: none;">
      摄像头权限被拒绝，部分功能将不可用。请在浏览器设置中允许访问摄像头。
    </div>

    <div id="gesture-status-bar">
      <span class="status-dot" id="left-dot"></span>
      <span class="gesture-text left" id="left-gesture">等待...</span>
      <span class="gesture-icons">
        <span class="hand-icon" id="left-icon">✋</span>
        <span class="both-pinch-hint" id="both-pinch-hint">双手捏合</span>
        <span class="icon-separator">-</span>
        <span class="hand-icon" id="right-icon">✋</span>
      </span>
      <span class="gesture-text right" id="right-gesture">等待...</span>
      <span class="status-dot" id="right-dot"></span>
    </div>

    <button id="panel-toggle">≣</button>
    <div id="control-panel">
      <div class="panel-title">控制面板</div>
      
      <div class="control-group">
        <label class="control-label">
          变形幅度
          <span class="control-value" id="amplitude-value">0.30</span>
        </label>
        <input type="range" id="amplitude-slider" min="0.1" max="0.8" step="0.01" value="0.3" />
      </div>

      <div class="control-group">
        <label class="control-label">
          响应速度
          <span class="control-value" id="speed-value">0.10</span>
        </label>
        <input type="range" id="speed-slider" min="0.05" max="0.3" step="0.01" value="0.1" />
      </div>

      <div class="control-group">
        <label class="control-label">网格细分等级</label>
        <select class="subdivision-select" id="subdivision-select">
          <option value="2">2 级 (642 顶点)</option>
          <option value="3" selected>3 级 (2562 顶点)</option>
          <option value="4">4 级 (10242 顶点)</option>
        </select>
      </div>

      <button id="reset-btn">重置变形</button>
    </div>

    <div id="performance-warning">性能下降，已自动优化</div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
