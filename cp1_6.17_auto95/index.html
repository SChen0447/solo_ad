<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 流体运动轨迹模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #0a0e1a;
      color: #ffffff;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #info-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(10, 14, 26, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 12px;
      padding: 16px 20px;
      min-width: 220px;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.15);
      z-index: 10;
    }

    #info-panel h3 {
      font-size: 14px;
      font-weight: 600;
      color: #00D4FF;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    #info-panel .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 13px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    #info-panel .info-row:last-child {
      border-bottom: none;
    }

    #info-panel .info-label {
      color: rgba(255, 255, 255, 0.6);
    }

    #info-panel .info-value {
      color: #ffffff;
      font-family: 'Courier New', monospace;
      font-weight: 500;
    }

    #info-panel .empty {
      color: rgba(255, 255, 255, 0.4);
      font-style: italic;
      font-size: 12px;
    }

    #fps-counter {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(10, 14, 26, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 12px;
      padding: 10px 16px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: #00D4FF;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.15);
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="info-panel">
      <h3>粒子信息</h3>
      <div id="info-content">
        <p class="empty">点击粒子查看详情</p>
      </div>
    </div>
    <div id="fps-counter">FPS: --</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
