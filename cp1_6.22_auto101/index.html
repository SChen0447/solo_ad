<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>地下城 Roguelike 卡牌构筑</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: #1a202c;
      font-family: 'Georgia', 'Times New Roman', serif;
      color: #fff;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 1200px;
      max-height: 900px;
    }

    #loading-screen {
      position: absolute;
      inset: 0;
      background: #1a202c;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      transition: opacity 0.8s ease-out;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-title {
      font-size: 48px;
      color: #ecc94b;
      text-shadow: 0 0 20px rgba(236, 201, 75, 0.5);
      margin-bottom: 20px;
      letter-spacing: 4px;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid #5c4033;
      border-top-color: #ecc94b;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 20px;
      color: #a0aec0;
      font-size: 14px;
    }

    #game-canvas {
      display: block;
      background: #1a202c;
      width: 100%;
      height: 100%;
    }

    #game-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    #death-screen {
      position: absolute;
      inset: 0;
      background: rgba(123, 17, 19, 0);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 90;
      pointer-events: all;
      transition: background-color 2s ease-in;
    }

    #death-screen.show {
      display: flex;
      background: rgba(123, 17, 19, 0.9);
    }

    .death-title {
      font-size: 72px;
      color: #fff;
      text-shadow: 0 0 30px #ff0000;
      margin-bottom: 40px;
      letter-spacing: 8px;
    }

    .gothic-btn {
      position: relative;
      background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
      color: #ecc94b;
      border: none;
      padding: 16px 48px;
      font-size: 20px;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.2s ease;
      box-shadow:
        inset 0 0 0 2px #d69e2e,
        inset 0 0 0 3px #1a202c,
        inset 0 0 0 4px #b7791f;
    }

    .gothic-btn:hover {
      transform: translateY(-2px);
      box-shadow:
        inset 0 0 0 2px #ecc94b,
        inset 0 0 0 3px #1a202c,
        inset 0 0 0 4px #b7791f,
        0 8px 20px rgba(236, 201, 75, 0.3);
    }

    .gothic-btn:active {
      transform: translateY(0);
    }

    #victory-panel {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 85;
      pointer-events: all;
    }

    #victory-panel.show {
      display: flex;
    }

    .victory-box {
      background: rgba(45, 55, 72, 0.85);
      border-radius: 12px;
      padding: 48px 72px;
      box-shadow:
        inset 0 0 0 2px #d69e2e,
        inset 0 0 0 3px #2d3748,
        inset 0 0 0 4px #b7791f,
        0 20px 60px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    .victory-title {
      font-size: 48px;
      color: #ecc94b;
      text-shadow: 0 0 20px rgba(236, 201, 75, 0.6);
      margin-bottom: 32px;
      letter-spacing: 4px;
    }

    .victory-stats {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 40px;
    }

    .victory-stat {
      font-size: 24px;
      color: #fff;
    }

    .victory-stat span {
      color: #ecc94b;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="loading-screen">
      <div class="loading-title">地下城</div>
      <div class="loading-spinner"></div>
      <div class="loading-text">正在加载地牢数据...</div>
    </div>

    <canvas id="game-canvas"></canvas>

    <div id="game-overlay">
      <div id="death-screen">
        <div class="death-title">阵 亡</div>
        <button class="gothic-btn" id="retry-btn">重新挑战</button>
      </div>

      <div id="victory-panel">
        <div class="victory-box">
          <div class="victory-title">胜 利</div>
          <div class="victory-stats">
            <div class="victory-stat">击败怪物数量：<span id="kill-count">0</span></div>
            <div class="victory-stat">使用回合数：<span id="turn-count">0</span></div>
          </div>
          <button class="gothic-btn" id="continue-btn">继续探索</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
