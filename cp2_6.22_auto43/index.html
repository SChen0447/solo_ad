<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D雕塑展示台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0A0A23;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    canvas {
      display: block;
    }

    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: rgba(26, 26, 46, 0.85);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      z-index: 10;
    }

    .nav-arrow {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #16213E;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #E0E0E0;
      font-size: 16px;
      font-weight: bold;
      transition: all 0.15s ease;
    }

    .nav-arrow:hover {
      filter: brightness(1.1);
    }

    .nav-arrow:active {
      transform: scale(0.95);
    }

    .nav-title {
      font-size: 18px;
      color: #E0E0E0;
      font-weight: 500;
      min-width: 200px;
      text-align: center;
    }

    .control-panel {
      position: absolute;
      top: 50%;
      right: 16px;
      transform: translateY(-50%);
      width: 280px;
      background: #16213E;
      border-radius: 20px;
      padding: 16px;
      z-index: 20;
      border: 1px solid rgba(74, 0, 224, 0.5);
      box-shadow: 0 0 20px rgba(74, 0, 224, 0.1);
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        right: -300px;
        opacity: 0;
      }
      to {
        right: 16px;
        opacity: 1;
      }
    }

    .panel-title {
      font-size: 16px;
      font-weight: bold;
      color: #FFFFFF;
      margin-bottom: 16px;
    }

    .slider-group {
      margin-bottom: 20px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .slider-label span:first-child {
      font-size: 12px;
      color: #9CA3AF;
    }

    .slider-value {
      font-size: 16px;
      font-weight: bold;
      color: #FFFFFF;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #4A00E0;
      outline: none;
      cursor: pointer;
      transition: filter 0.15s ease;
    }

    input[type="range"]:hover {
      filter: brightness(1.1);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #FFFFFF;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
      transition: transform 0.1s ease;
    }

    input[type="range"]::-webkit-slider-thumb:active {
      transform: scale(0.95);
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #FFFFFF;
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
      transition: transform 0.1s ease;
    }

    input[type="range"]::-moz-range-thumb:active {
      transform: scale(0.95);
    }

    .toggle-panel-btn {
      position: absolute;
      top: 50%;
      right: 0;
      transform: translateY(-50%);
      width: 32px;
      height: 64px;
      background: #16213E;
      border: 1px solid rgba(74, 0, 224, 0.5);
      border-right: none;
      border-radius: 10px 0 0 10px;
      cursor: pointer;
      color: #E0E0E0;
      font-size: 18px;
      z-index: 21;
      display: none;
      transition: all 0.15s ease;
    }

    .toggle-panel-btn:hover {
      filter: brightness(1.1);
    }

    .toggle-panel-btn:active {
      transform: translateY(-50%) scale(0.95);
    }

    .control-panel.hidden {
      right: -300px;
      animation: slideOut 0.3s ease-out forwards;
    }

    @keyframes slideOut {
      from {
        right: 16px;
        opacity: 1;
      }
      to {
        right: -300px;
        opacity: 0;
      }
    }

    .magnifier-hint {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(26, 26, 46, 0.85);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 8px;
      color: #9CA3AF;
      font-size: 12px;
      z-index: 15;
    }

    .model-glow {
      position: absolute;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div class="magnifier-hint">按住 Z 键启用放大镜模式</div>
    <button class="toggle-panel-btn" id="togglePanelBtn">◀</button>
    <div class="control-panel" id="controlPanel">
      <div class="panel-title">材质与光照调节</div>
      <div class="slider-group">
        <div class="slider-label">
          <span>金属度</span>
          <span class="slider-value" id="metalnessValue">0.50</span>
        </div>
        <input type="range" id="metalnessSlider" min="0" max="1" step="0.01" value="0.5" />
      </div>
      <div class="slider-group">
        <div class="slider-label">
          <span>粗糙度</span>
          <span class="slider-value" id="roughnessValue">0.30</span>
        </div>
        <input type="range" id="roughnessSlider" min="0" max="1" step="0.01" value="0.3" />
      </div>
      <div class="slider-group">
        <div class="slider-label">
          <span>环境光强度</span>
          <span class="slider-value" id="ambientValue">1.0</span>
        </div>
        <input type="range" id="ambientSlider" min="0.5" max="2.0" step="0.1" value="1.0" />
      </div>
    </div>
    <div class="bottom-nav">
      <button class="nav-arrow" id="prevBtn">◀</button>
      <div class="nav-title" id="navTitle">几何抽象</div>
      <button class="nav-arrow" id="nextBtn">▶</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
