<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>太阳系3D交互式天文教学工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #05050f;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #e0e0ff;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #hover-label {
      position: fixed;
      left: 20px;
      bottom: 20px;
      font-size: 14px;
      color: rgba(180, 180, 255, 0.8);
      pointer-events: none;
      z-index: 10;
      text-shadow: 0 0 8px rgba(100, 100, 255, 0.5);
      transition: opacity 0.3s ease;
    }
    #data-panel {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: 320px;
      background: rgba(20, 15, 50, 0.65);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(120, 100, 255, 0.25);
      border-radius: 16px;
      padding: 24px;
      z-index: 20;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      pointer-events: none;
      box-shadow: 0 8px 32px rgba(60, 40, 160, 0.3);
    }
    #data-panel.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    #data-panel .panel-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #8b7aff, #5e9fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #data-panel .panel-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(120, 100, 255, 0.1);
    }
    #data-panel .panel-row:last-child {
      border-bottom: none;
    }
    #data-panel .panel-label {
      font-size: 13px;
      color: rgba(180, 175, 220, 0.8);
    }
    #data-panel .panel-value {
      font-size: 15px;
      font-weight: 600;
      color: #c8c4ff;
    }
    #data-panel .panel-desc {
      margin-top: 12px;
      font-size: 12px;
      line-height: 1.7;
      color: rgba(180, 180, 220, 0.7);
    }
    #close-panel {
      position: absolute;
      top: 12px;
      right: 14px;
      width: 24px;
      height: 24px;
      background: none;
      border: none;
      color: rgba(180, 170, 255, 0.6);
      font-size: 18px;
      cursor: pointer;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #close-panel:hover {
      color: #a8a0ff;
    }
    #loading-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #05050f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.8s ease;
    }
    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    #loading-screen .loader-text {
      font-size: 18px;
      color: rgba(160, 150, 255, 0.8);
      margin-top: 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loader-ring {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(120, 100, 255, 0.2);
      border-top-color: #7b6aff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="loader-ring"></div>
    <div class="loader-text">太阳系加载中...</div>
  </div>
  <div id="canvas-container"></div>
  <div id="hover-label"></div>
  <div id="data-panel">
    <button id="close-panel">&times;</button>
    <div class="panel-title" id="panel-name"></div>
    <div class="panel-row">
      <span class="panel-label">直径</span>
      <span class="panel-value" id="panel-diameter"></span>
    </div>
    <div class="panel-row">
      <span class="panel-label">公转周期</span>
      <span class="panel-value" id="panel-period"></span>
    </div>
    <div class="panel-row">
      <span class="panel-label">距日距离</span>
      <span class="panel-value" id="panel-distance"></span>
    </div>
    <div class="panel-desc" id="panel-desc"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
