<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>果冻水上竞速派对</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: relative;
      background: radial-gradient(ellipse at center, #e0f7fa 0%, #ffffff 100%);
    }

    #hud-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #hud-top {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 12px 32px;
      display: flex;
      align-items: center;
      gap: 32px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }

    #round-info {
      font-size: 18px;
      font-weight: bold;
      color: #333;
    }

    .player-score {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: bold;
      font-size: 16px;
    }

    .player-name {
      font-size: 14px;
    }

    .player-avatar {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: inline-block;
    }

    #charge-container {
      position: absolute;
      bottom: 30px;
      left: 30px;
      width: 120px;
      height: 120px;
    }

    #charge-canvas {
      width: 100%;
      height: 100%;
    }

    #fps-warning {
      position: absolute;
      top: 80px;
      left: 20px;
      display: none;
      color: #ffc107;
      font-size: 32px;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #controls-panel {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px 40px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      animation: fadeOut 5s ease-in-out forwards;
      animation-delay: 3s;
    }

    @keyframes fadeOut {
      0% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }

    #controls-panel h2 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
      font-size: 22px;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .player-controls {
      padding: 16px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.5);
    }

    .player-controls h3 {
      margin-bottom: 10px;
      font-size: 16px;
    }

    .player-controls p {
      font-size: 13px;
      color: #555;
      margin: 4px 0;
    }

    .key {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-family: monospace;
      font-weight: bold;
      font-size: 12px;
      color: #333;
      background: #f0f0f0;
      border: 1px solid #ddd;
    }

    #score-panel, #final-panel {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 40px 60px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      display: none;
      text-align: center;
      z-index: 20;
      pointer-events: auto;
    }

    #score-panel h2, #final-panel h2 {
      font-size: 32px;
      color: #333;
      margin-bottom: 20px;
    }

    .score-ranking {
      list-style: none;
      margin: 20px 0;
    }

    .score-ranking li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 30px;
      padding: 10px 20px;
      margin: 8px 0;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
    }

    .rank-badge {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }

    .rank-1 { background: linear-gradient(135deg, #ffd700, #ffaa00); }
    .rank-2 { background: linear-gradient(135deg, #c0c0c0, #999999); }
    .rank-3 { background: linear-gradient(135deg, #cd7f32, #a0522d); }
    .rank-4 { background: linear-gradient(135deg, #888, #666); }

    #next-btn {
      margin-top: 20px;
      padding: 12px 40px;
      font-size: 18px;
      font-weight: bold;
      color: white;
      background: linear-gradient(135deg, #4ecdc4, #44a08d);
      border: none;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(78, 205, 196, 0.4);
      transition: transform 0.2s;
    }

    #next-btn:hover {
      transform: scale(1.05);
    }

    #start-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(224, 247, 250, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 30;
      pointer-events: auto;
    }

    #start-screen h1 {
      font-size: 48px;
      color: #333;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }

    #start-screen .subtitle {
      font-size: 20px;
      color: #666;
      margin-bottom: 40px;
    }

    .player-select {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .player-select-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 4px solid transparent;
      cursor: pointer;
      font-size: 24px;
      font-weight: bold;
      color: white;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
      transition: all 0.2s;
    }

    .player-select-btn:hover {
      transform: scale(1.1);
    }

    .player-select-btn.active {
      border-color: #333;
      transform: scale(1.1);
    }

    #start-btn {
      padding: 16px 60px;
      font-size: 24px;
      font-weight: bold;
      color: white;
      background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
      border: none;
      border-radius: 40px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
      transition: transform 0.2s;
    }

    #start-btn:hover {
      transform: scale(1.05);
    }

    #celebration-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 25;
      display: none;
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <div id="hud-overlay">
      <div id="hud-top">
        <span id="round-info">第 1/3 局</span>
        <div id="player-scores"></div>
      </div>

      <div id="charge-container">
        <canvas id="charge-canvas" width="120" height="120"></canvas>
      </div>

      <div id="fps-warning">⚠</div>

      <div id="controls-panel">
        <h2>🎮 操作说明</h2>
        <div class="controls-grid">
          <div class="player-controls">
            <h3 style="color: #ff6b6b;">玩家 1（红）</h3>
            <p><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> 移动</p>
            <p><span class="key">空格</span> 跳跃（按住蓄力）</p>
          </div>
          <div class="player-controls">
            <h3 style="color: #4ecdc4;">玩家 2（蓝）</h3>
            <p><span class="key">↑</span><span class="key">←</span><span class="key">↓</span><span class="key">→</span> 移动</p>
            <p><span class="key">Enter</span> 跳跃（按住蓄力）</p>
          </div>
          <div class="player-controls">
            <h3 style="color: #ffe66d;">玩家 3（黄）</h3>
            <p><span class="key">U</span><span class="key">H</span><span class="key">J</span><span class="key">K</span> 移动</p>
            <p><span class="key">空格</span> 跳跃（按住蓄力）</p>
          </div>
          <div class="player-controls">
            <h3 style="color: #a29bfe;">玩家 4（紫）</h3>
            <p><span class="key">8</span><span class="key">4</span><span class="key">5</span><span class="key">6</span> 移动</p>
            <p><span class="key">0</span> 跳跃（按住蓄力）</p>
          </div>
        </div>
      </div>

      <div id="score-panel">
        <h2 id="score-title">本局结束</h2>
        <ul class="score-ranking" id="round-scores"></ul>
        <button id="next-btn">下一局</button>
      </div>

      <div id="final-panel">
        <h2>🎉 最终排名</h2>
        <ul class="score-ranking" id="final-scores"></ul>
        <button id="restart-btn" style="margin-top: 20px; padding: 12px 40px; font-size: 18px; font-weight: bold; color: white; background: linear-gradient(135deg, #a29bfe, #6c5ce7); border: none; border-radius: 30px; cursor: pointer;">再来一局</button>
      </div>

      <canvas id="celebration-canvas"></canvas>

      <div id="start-screen">
        <h1>🍬 果冻水上竞速派对 🍬</h1>
        <p class="subtitle">选择参与玩家数量，开始欢乐竞速！</p>
        <div class="player-select">
          <button class="player-select-btn" data-players="2" style="background: linear-gradient(135deg, #ff6b6b, #4ecdc4);">2P</button>
          <button class="player-select-btn active" data-players="3" style="background: linear-gradient(135deg, #ff6b6b, #4ecdc4, #ffe66d);">3P</button>
          <button class="player-select-btn" data-players="4" style="background: linear-gradient(135deg, #ff6b6b, #4ecdc4, #ffe66d, #a29bfe);">4P</button>
        </div>
        <button id="start-btn">开始游戏</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
