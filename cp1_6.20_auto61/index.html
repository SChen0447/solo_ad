<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>建筑能耗3D热力可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3a 100%);
      font-family: Arial, sans-serif;
      color: #ffffff;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    canvas {
      display: block;
    }
    #toast {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      background: rgba(0, 170, 255, 0.8);
      border-radius: 6px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
      z-index: 100;
    }
    #toast.show {
      opacity: 1;
    }
    #control-panel {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 220px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      z-index: 100;
    }
    #control-panel .title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 12px;
      color: #00aaff;
    }
    #control-panel button {
      width: 100%;
      height: 36px;
      margin-bottom: 8px;
      background: #1e3a5f;
      border: 1px solid transparent;
      border-radius: 6px;
      color: #ffffff;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s ease;
      outline: none;
    }
    #control-panel button:hover {
      border-color: #00aaff;
      box-shadow: 0 0 3px 3px rgba(0, 170, 255, 0.4);
    }
    #control-panel button:active {
      background: #2a4a7f;
    }
    #control-panel button.active {
      background: #00aaff;
      color: #000;
    }
    #legend {
      position: absolute;
      bottom: 20px;
      left: 20px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      z-index: 100;
      font-size: 12px;
    }
    #legend .title {
      font-weight: bold;
      margin-bottom: 8px;
      color: #00aaff;
    }
    .legend-item {
      display: flex;
      align-items: center;
      margin-bottom: 4px;
    }
    .legend-color {
      width: 20px;
      height: 12px;
      border-radius: 2px;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="toast">数据已更新</div>
    <div id="control-panel">
      <div class="title">控制面板</div>
      <button id="btn-toggle-polling" class="active">暂停数据更新</button>
      <button id="btn-reset-camera">重置视角</button>
      <button id="btn-toggle-particles" class="active">粒子系统：开</button>
    </div>
    <div id="legend">
      <div class="title">能耗图例</div>
      <div class="legend-item">
        <div class="legend-color" style="background: #00ff00;"></div>
        <span>正常 (0.2 - 0.4)</span>
      </div>
      <div class="legend-item">
        <div class="legend-color" style="background: #ffff00;"></div>
        <span>警告 (0.5)</span>
      </div>
      <div class="legend-item">
        <div class="legend-color" style="background: #ff5500;"></div>
        <span>异常 (0.7 - 1.0)</span>
      </div>
      <div class="legend-item">
        <div class="legend-color" style="background: #ff0000;"></div>
        <span>严重 (1.0)</span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
