<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Wind Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="app">
    <div id="title-area">
      <h1 id="app-title">Global Wind Explorer</h1>
    </div>

    <div id="controls-area">
      <div id="month-selector">
        <button class="month-btn active" data-month="january">January</button>
        <button class="month-btn" data-month="july">July</button>
      </div>
    </div>

    <div id="info-card" class="hidden">
      <div class="info-header">
        <span class="info-title">Wind Analysis</span>
        <button id="close-info-btn">&times;</button>
      </div>
      <div class="info-content">
        <div class="info-row">
          <span class="info-label">Latitude:</span>
          <span id="info-lat" class="info-value">--</span>
        </div>
        <div class="info-row">
          <span class="info-label">Longitude:</span>
          <span id="info-lon" class="info-value">--</span>
        </div>
        <div class="info-row">
          <span class="info-label">Avg Speed:</span>
          <span id="info-speed" class="info-value">-- m/s</span>
        </div>
        <div class="info-row direction-row">
          <span class="info-label">Dominant Dir:</span>
          <div class="direction-indicator-wrapper">
            <div class="wind-direction-indicator">
              <svg viewBox="0 0 64 64" width="44" height="44">
                <circle cx="32" cy="32" r="29" fill="rgba(0,191,255,0.08)" stroke="rgba(0,191,255,0.35)" stroke-width="1.5" />
                <text x="32" y="12" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.6)" font-family="Inter, sans-serif">N</text>
                <text x="32" y="60" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.6)" font-family="Inter, sans-serif">S</text>
                <text x="6" y="35" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.6)" font-family="Inter, sans-serif">W</text>
                <text x="58" y="35" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.6)" font-family="Inter, sans-serif">E</text>
                <g id="wind-arrow-group" transform="translate(32,32) rotate(0)">
                  <line x1="0" y1="18" x2="0" y2="-16" stroke="#00bfff" stroke-width="2.5" stroke-linecap="round" />
                  <polygon points="0,-24 -6,-12 6,-12" fill="#00bfff" />
                  <circle cx="0" cy="20" r="3" fill="rgba(255,69,0,0.8)" />
                </g>
              </svg>
            </div>
            <span id="info-dir" class="info-value dir-text">--</span>
          </div>
        </div>
      </div>
    </div>

    <div id="speed-control">
      <div class="speed-label">Speed</div>
      <input type="range" id="speed-slider" min="0.1" max="5" step="0.1" value="1" />
      <div id="speed-value">1.0x</div>
    </div>

    <canvas id="scene-canvas"></canvas>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
