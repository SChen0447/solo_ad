<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Music Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-start: #0a0e27;
      --bg-end: #1a1f44;
      --accent-blue: #00d4ff;
      --accent-purple: #a855f7;
      --accent-pink: #ff0080;
      --accent-red: #ff3366;
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.15);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --text-muted: rgba(255, 255, 255, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Noto Sans SC', sans-serif;
      color: var(--text-primary);
      background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .title {
      position: absolute;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 4px;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple), var(--accent-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
      pointer-events: none;
    }

    .upload-prompt {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 15;
      text-align: center;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    .upload-prompt.hidden {
      opacity: 0;
    }

    .upload-prompt h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 24px;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .upload-prompt p {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .controls {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      width: min(900px, 95%);
      padding: 20px 28px;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .controls-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    .controls-row:last-child {
      margin-bottom: 0;
    }

    .btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      padding: 0;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
      overflow: hidden;
    }

    .btn:hover:not(:disabled) {
      transform: scale(1.05);
      background: rgba(255, 255, 255, 0.18);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
    }

    .btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.3) 0%, transparent 70%);
      transform: translate(-50%, -50%) scale(0);
      transition: transform 0.4s ease;
      pointer-events: none;
    }

    .btn:active:not(:disabled)::after {
      transform: translate(-50%, -50%) scale(2);
    }

    .btn-upload {
      width: auto;
      padding: 0 20px;
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      border: none;
    }

    .btn-upload:hover:not(:disabled) {
      background: linear-gradient(135deg, #00e5ff, #b866ff);
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.4);
    }

    #file-input {
      display: none;
    }

    .progress-container {
      flex: 1;
      position: relative;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      cursor: pointer;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple), var(--accent-pink));
      background-size: 200% 100%;
      border-radius: 4px;
      width: 0%;
      animation: gradientMove 3s linear infinite;
      transition: width 0.1s linear;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    .time-display {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      color: var(--text-secondary);
      min-width: 100px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .volume-control {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .volume-icon {
      font-size: 18px;
      color: var(--text-secondary);
    }

    .slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100px;
      height: 6px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s ease;
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
    }

    .slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
    }

    .color-mode-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }

    .color-mode-label {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .toggle-switch {
      position: relative;
      width: 48px;
      height: 26px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 13px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .toggle-switch.active {
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
    }

    .toggle-knob {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s ease;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    .toggle-switch.active .toggle-knob {
      transform: translateX(22px);
    }

    .info-box {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      z-index: 30;
      padding: 28px 32px;
      background: rgba(10, 14, 39, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      min-width: 320px;
    }

    .info-box.visible {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) scale(1);
    }

    .info-box-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--glass-border);
    }

    .info-box-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 2px;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .info-box-close {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .info-box-close:hover {
      background: rgba(255, 255, 255, 0.2);
      color: var(--text-primary);
      transform: rotate(90deg);
    }

    .freq-item {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
    }

    .freq-item:last-child {
      margin-bottom: 0;
    }

    .freq-label {
      width: 60px;
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .freq-bar-container {
      flex: 1;
      height: 12px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      overflow: hidden;
    }

    .freq-bar {
      height: 100%;
      border-radius: 6px;
      transition: width 0.3s ease;
    }

    .freq-bar.low {
      background: linear-gradient(90deg, #00d4ff, #0099cc);
    }

    .freq-bar.mid {
      background: linear-gradient(90deg, #a855f7, #7c3aed);
    }

    .freq-bar.high {
      background: linear-gradient(90deg, #ff3366, #ff0080);
    }

    .freq-value {
      width: 50px;
      text-align: right;
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .freq-value.low { color: var(--accent-blue); }
    .freq-value.mid { color: var(--accent-purple); }
    .freq-value.high { color: var(--accent-pink); }

    .info-time {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--glass-border);
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
    }

    .info-time strong {
      color: var(--text-primary);
      font-family: 'Orbitron', sans-serif;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .title {
        font-size: 20px;
        top: 20px;
      }

      .controls {
        bottom: 16px;
        padding: 16px;
        border-radius: 16px;
      }

      .controls-row {
        gap: 12px;
      }

      .btn {
        width: 42px;
        height: 42px;
        font-size: 16px;
      }

      .btn-upload {
        width: auto;
        padding: 0 14px;
        font-size: 11px;
      }

      .slider {
        width: 70px;
      }

      .color-mode-label {
        display: none;
      }

      .time-display {
        font-size: 11px;
        min-width: 80px;
      }

      .info-box {
        min-width: 280px;
        padding: 20px 24px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    
    <h1 class="title">3D MUSIC VISUALIZER</h1>
    
    <div class="upload-prompt" id="upload-prompt">
      <h2>🎵 上传音乐开始可视化</h2>
      <p>支持 MP3、WAV、OGG 等格式</p>
    </div>

    <div class="info-box" id="info-box">
      <div class="info-box-header">
        <span class="info-box-title">频率数据详情</span>
        <button class="info-box-close" id="info-close">✕</button>
      </div>
      <div class="freq-item">
        <span class="freq-label">低频</span>
        <div class="freq-bar-container">
          <div class="freq-bar low" id="freq-low-bar"></div>
        </div>
        <span class="freq-value low" id="freq-low-value">0</span>
      </div>
      <div class="freq-item">
        <span class="freq-label">中频</span>
        <div class="freq-bar-container">
          <div class="freq-bar mid" id="freq-mid-bar"></div>
        </div>
        <span class="freq-value mid" id="freq-mid-value">0</span>
      </div>
      <div class="freq-item">
        <span class="freq-label">高频</span>
        <div class="freq-bar-container">
          <div class="freq-bar high" id="freq-high-bar"></div>
        </div>
        <span class="freq-value high" id="freq-high-value">0</span>
      </div>
      <div class="info-time">
        时间点: <strong id="info-time">00:00.000</strong>
      </div>
    </div>

    <div class="controls">
      <div class="controls-row">
        <input type="file" id="file-input" accept="audio/*">
        <button class="btn btn-upload" id="upload-btn">
          <span>📁 上传音乐</span>
        </button>
        <button class="btn" id="play-btn" disabled>
          <span id="play-icon">▶</span>
        </button>
        <div class="progress-container" id="progress-container">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="time-display">
          <span id="current-time">00:00</span> / <span id="total-time">00:00</span>
        </div>
      </div>
      <div class="controls-row">
        <div class="volume-control">
          <span class="volume-icon">🔊</span>
          <input type="range" class="slider" id="volume-slider" min="0" max="100" value="80">
        </div>
        <div class="color-mode-toggle">
          <span class="color-mode-label">颜色模式</span>
          <div class="toggle-switch" id="color-toggle">
            <div class="toggle-knob"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
