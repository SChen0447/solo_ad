<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>卡牌连击模拟器</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        background-color: #1a1a2e;
        color: #ffffff;
        font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        overflow: hidden;
      }
      #root {
        width: 100%;
        height: 100%;
      }
      #canvas-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
      }
      #ui-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        pointer-events: none;
      }
      #ui-container > * {
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div id="ui-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
