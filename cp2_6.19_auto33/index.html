<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Music Visualizer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1a1a2e;
      font-family: monospace;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #upload-zone {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      height: 200px;
      border: 2px dashed rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background-color: rgba(0, 0, 0, 0.3);
      z-index: 100;
    }

    #upload-zone:hover,
    #upload-zone.drag-over {
      border-style: solid;
      border-color: rgba(100, 200, 255, 0.8);
      background-color: rgba(100, 200, 255, 0.1);
      box-shadow: 0 0 30px rgba(100, 200, 255, 0.3);
    }

    #upload-zone.hidden {
      display: none;
    }

    #upload-zone .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    #upload-zone .text {
      font-size: 16px;
      margin-bottom: 8px;
    }

    #upload-zone .hint {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }

    #file-input {
      display: none;
    }

    #audio-info {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 50;
      background-color: rgba(0, 0, 0, 0.6);
      padding: 12px 16px;
      border-radius: 8px;
      display: none;
    }

    #audio-info.visible {
      display: block;
    }

    #audio-info .name {
      font-size: 14px;
      margin-bottom: 4px;
    }

    #audio-info .duration {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }

    #play-status {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 50;
      width: 50px;
      height: 50px;
      background-color: rgba(0, 0, 0, 0.6);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    #play-status.visible {
      display: flex;
    }

    #play-status:hover {
      background-color: rgba(100, 200, 255, 0.4);
      transform: scale(1.1);
    }

    #play-status .icon {
      font-size: 24px;
    }

    #controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background-color: rgba(0, 0, 0, 0.6);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      z-index: 50;
      gap: 20px;
    }

    #controls.visible {
      display: flex;
    }

    .theme-buttons {
      display: flex;
      gap: 12px;
    }

    .theme-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .theme-btn.active {
      border-color: rgba(255, 255, 255, 0.8);
      box-shadow: 0 0 15px currentColor;
    }

    .theme-btn:hover {
      transform: scale(1.15);
    }

    .theme-btn.neon {
      background: linear-gradient(135deg, #ff00ff, #00ffff);
    }

    .theme-btn.aurora {
      background: linear-gradient(135deg, #00ff88, #00ccff);
    }

    .theme-btn.lava {
      background: linear-gradient(135deg, #ff4400, #ffaa00);
    }

    .audio-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      max-width: 500px;
    }

    #play-pause-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0.1);
      border: none;
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    #play-pause-btn:hover {
      background-color: rgba(100, 200, 255, 0.4);
    }

    #progress-bar {
      flex: 1;
      height: 6px;
      background-color: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    #progress-bar .progress {
      height: 100%;
      background: linear-gradient(90deg, #3344ff, #ff3344);
      border-radius: 3px;
      width: 0%;
      transition: width 0.1s linear;
    }

    #time-display {
      font-size: 12px;
      min-width: 90px;
      text-align: right;
    }

    @media (max-width: 768px) {
      #controls {
        height: 80px;
        flex-wrap: wrap;
        padding: 10px;
        gap: 10px;
      }

      .theme-btn {
        width: 32px;
        height: 32px;
      }

      #upload-zone {
        width: 90%;
        max-width: 350px;
        height: 180px;
      }

      #audio-info,
      #play-status {
        font-size: 12px;
      }

      #play-status {
        width: 40px;
        height: 40px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div id="upload-zone">
      <div class="icon">🎵</div>
      <div class="text">拖拽音频文件到此处</div>
      <div class="hint">支持 MP3 / WAV 格式</div>
      <input type="file" id="file-input" accept=".mp3,.wav,audio/*">
    </div>

    <div id="audio-info">
      <div class="name" id="audio-name"></div>
      <div class="duration" id="audio-duration"></div>
    </div>

    <div id="play-status">
      <span class="icon" id="play-status-icon">▶</span>
    </div>

    <div id="controls">
      <div class="theme-buttons">
        <button class="theme-btn neon active" data-theme="neon" title="霓虹主题"></button>
        <button class="theme-btn aurora" data-theme="aurora" title="极光主题"></button>
        <button class="theme-btn lava" data-theme="lava" title="熔岩主题"></button>
      </div>
      <div class="audio-controls">
        <button id="play-pause-btn">▶</button>
        <div id="progress-bar">
          <div class="progress" id="progress"></div>
        </div>
        <div id="time-display">0:00 / 0:00</div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/App.ts"></script>
</body>
</html>
