<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>城市内涝3D模拟与可视化</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #3a3a3a; font-family: sans-serif; }
    #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }

    #info-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: linear-gradient(180deg, rgba(30,30,30,0.9) 0%, rgba(30,30,30,0.7) 100%);
      display: flex;
      align-items: center;
      padding: 0 20px;
      z-index: 100;
      color: #fff;
      font-size: 14px;
      font-family: sans-serif;
    }
    #info-bar .title {
      font-weight: bold;
      font-size: 16px;
      margin-right: 30px;
    }
    #info-bar .sim-time {
      margin-right: 20px;
    }

    #info-panel {
      position: fixed;
      top: 50px;
      left: 16px;
      width: 260px;
      background: rgba(20, 20, 20, 0.82);
      border-radius: 12px;
      padding: 16px 18px;
      z-index: 100;
      color: #fff;
      font-size: 14px;
      font-family: sans-serif;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.08);
    }
    #info-panel .panel-title {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 12px;
      color: #8ec8f8;
    }
    #info-panel .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
    }
    #info-panel .info-row .label { color: #bbb; }
    #info-panel .info-row .value { color: #fff; font-weight: bold; }
    #info-panel .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(140,200,248,0.4), transparent);
      margin: 4px 0;
    }

    #pause-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.35);
      z-index: 90;
      justify-content: center;
      align-items: center;
    }
    #pause-overlay.visible { display: flex; }
    #pause-overlay .pause-text {
      color: #fff;
      font-size: 64px;
      font-family: sans-serif;
      font-weight: bold;
      text-shadow: 0 4px 20px rgba(0,0,0,0.6);
      user-select: none;
    }

    .monitor-popup {
      position: absolute;
      background: rgba(10, 30, 50, 0.92);
      border: 1px solid rgba(100, 200, 255, 0.5);
      border-radius: 8px;
      padding: 10px 14px;
      color: #fff;
      font-size: 13px;
      font-family: sans-serif;
      z-index: 200;
      pointer-events: none;
      animation: popupIn 0.3s ease-out forwards;
      white-space: nowrap;
    }
    .monitor-popup.fade-out {
      animation: popupOut 0.3s ease-in forwards;
    }
    @keyframes popupIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes popupOut {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-10px); }
    }
  </style>
</head>
<body>
  <div id="info-bar">
    <span class="title">城市内涝3D模拟系统</span>
    <span class="sim-time" id="sim-time-display">模拟时长: 0s</span>
    <span id="fps-display">FPS: --</span>
  </div>

  <div id="info-panel">
    <div class="panel-title">模拟信息</div>
    <div class="info-row"><span class="label">降雨强度</span><span class="value" id="panel-rain">0 mm/h</span></div>
    <div class="divider"></div>
    <div class="info-row"><span class="label">模拟时长</span><span class="value" id="panel-time">0s</span></div>
    <div class="divider"></div>
    <div class="info-row"><span class="label">活跃监测点</span><span class="value" id="panel-monitors">5</span></div>
    <div class="divider"></div>
    <div class="info-row"><span class="label">平均水位</span><span class="value" id="panel-avg-water">0.00m</span></div>
  </div>

  <div id="pause-overlay">
    <div class="pause-text">暂 停</div>
  </div>

  <div id="canvas-container"></div>

  <script type="module" src="/src/App.ts"></script>
</body>
</html>
