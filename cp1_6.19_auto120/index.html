<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>粒子星云调色盘</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background: linear-gradient(to bottom, #0a0a2e 0%, #2e0a3a 100%);
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      display: block;
    }

    #control-panel {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 280px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      z-index: 100;
    }

    #control-panel h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }

    .slider-group {
      margin-bottom: 14px;
    }

    .slider-group:last-child {
      margin-bottom: 0;
    }

    .slider-group label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 6px;
      color: rgba(255, 255, 255, 0.9);
    }

    .slider-group .value {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      font-variant-numeric: tabular-nums;
    }

    .slider-group input[type="range"] {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    .slider-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
      transition: transform 0.15s ease;
    }

    .slider-group input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .slider-group input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
    }

    #particle-label {
      position: absolute;
      pointer-events: none;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      border-radius: 6px;
      color: #fff;
      font-size: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      white-space: nowrap;
      z-index: 200;
      display: none;
      transform: translate(-50%, -120%);
    }

    @media (max-width: 768px) {
      #control-panel {
        bottom: 0;
        right: 0;
        left: 0;
        width: 100%;
        border-radius: 12px 12px 0 0;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="canvas-container"></canvas>
    <div id="control-panel">
      <h2>粒子星云调色盘</h2>
      <div class="slider-group">
        <label>
          <span>主色调</span>
          <span class="value" id="hue-value">210°</span>
        </label>
        <input type="range" id="hue-slider" min="0" max="360" step="1" value="210" />
      </div>
      <div class="slider-group">
        <label>
          <span>粒子大小</span>
          <span class="value" id="size-value">0.80</span>
        </label>
        <input type="range" id="size-slider" min="0.1" max="3" step="0.01" value="0.8" />
      </div>
      <div class="slider-group">
        <label>
          <span>运动速度</span>
          <span class="value" id="speed-value">1.00</span>
        </label>
        <input type="range" id="speed-slider" min="0" max="5" step="0.01" value="1" />
      </div>
      <div class="slider-group">
        <label>
          <span>分布形态</span>
          <span class="value" id="shape-value">1.00</span>
        </label>
        <input type="range" id="shape-slider" min="0.1" max="1" step="0.01" value="1" />
      </div>
    </div>
    <div id="particle-label"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
