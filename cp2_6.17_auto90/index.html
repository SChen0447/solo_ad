<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星域对决</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(to bottom, #0a0a2e, #000011);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #game {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #gameCanvas {
      display: block;
      border: none;
    }

    .menu-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom, #0a0a2e, #000011);
      z-index: 100;
    }

    .menu-title {
      font-size: 48px;
      font-weight: bold;
      color: #00e5ff;
      text-shadow: 2px 2px 0 #ffffff, 0 0 20px rgba(0, 229, 255, 0.5);
      margin-bottom: 60px;
      animation: breathe 2s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% {
        text-shadow: 2px 2px 0 #ffffff, 0 0 20px rgba(0, 229, 255, 0.5);
      }
      50% {
        text-shadow: 2px 2px 0 #ffffff, 0 0 40px rgba(0, 229, 255, 0.8), 0 0 60px rgba(0, 229, 255, 0.4);
      }
    }

    .menu-buttons {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .menu-btn {
      padding: 16px 48px;
      font-size: 18px;
      color: #ffffff;
      background: #1a1a3e;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .menu-btn:hover {
      background: #2a2a5e;
    }

    .modal-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 200;
    }

    .modal {
      width: 320px;
      height: 180px;
      background: #1a1a3e;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
      animation: scaleIn 0.3s ease-out;
    }

    @keyframes scaleIn {
      0% {
        transform: scale(0.5);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .modal-title {
      font-size: 20px;
      color: #ffffff;
      margin-bottom: 10px;
    }

    .modal-buttons {
      display: flex;
      gap: 20px;
    }

    .game-over-panel {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #1a1a2e;
      border-radius: 20px;
      padding: 32px 48px;
      text-align: center;
      z-index: 150;
      animation: fadeIn 0.5s ease-in;
    }

    @keyframes fadeIn {
      0% {
        opacity: 0;
      }
      100% {
        opacity: 1;
      }
    }

    .game-over-title {
      font-size: 32px;
      color: #00e5ff;
      margin-bottom: 16px;
    }

    .game-over-score {
      font-size: 24px;
      color: #ffffff;
      margin-bottom: 24px;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="game">
    <canvas id="gameCanvas" width="900" height="600"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
