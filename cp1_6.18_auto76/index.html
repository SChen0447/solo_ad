<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text-Based Tower Defense</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0f0f1a;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      color: #ffffff;
    }

    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    #game-canvas {
      flex: 0 0 70vh;
      width: 100%;
      background-color: #1a1a2e;
      display: block;
    }

    #ui-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, #16213e 0%, #0f0f1a 100%);
      padding: 10px 20px;
      gap: 10px;
    }

    #status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      padding: 5px 0;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-label {
      color: rgba(255, 255, 255, 0.6);
    }

    .status-value {
      font-weight: bold;
      font-size: 16px;
    }

    .gold { color: #ffd700; }
    .lives { color: #ff6b6b; }
    .wave { color: #4ecdc4; }

    #notification-area {
      height: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .notification {
      padding: 6px 16px;
      border-radius: 4px;
      font-size: 13px;
      animation: fadeInOut 2s ease-in-out forwards;
      position: absolute;
    }

    .notification.success {
      background-color: rgba(46, 204, 113, 0.3);
      border: 1px solid rgba(46, 204, 113, 0.6);
      color: #2ecc71;
    }

    .notification.error {
      background-color: rgba(231, 76, 60, 0.3);
      border: 1px solid rgba(231, 76, 60, 0.6);
      color: #e74c3c;
    }

    .notification.info {
      background-color: rgba(52, 152, 219, 0.3);
      border: 1px solid rgba(52, 152, 219, 0.6);
      color: #3498db;
    }

    @keyframes fadeInOut {
      0% { opacity: 0; transform: translateY(10px); }
      20% { opacity: 1; transform: translateY(0); }
      80% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-10px); }
    }

    #input-container {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #command-input {
      flex: 1;
      padding: 12px 16px;
      font-size: 14px;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 6px;
      color: #ffffff;
      outline: none;
      backdrop-filter: blur(10px);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #command-input:focus {
      border-color: rgba(78, 205, 196, 0.8);
      box-shadow: 0 0 10px rgba(78, 205, 196, 0.3);
    }

    #command-input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    #submit-btn {
      padding: 12px 24px;
      font-size: 14px;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      background: rgba(78, 205, 196, 0.3);
      border: 1px solid rgba(78, 205, 196, 0.6);
      border-radius: 6px;
      color: #4ecdc4;
      cursor: pointer;
      transition: background 0.2s;
    }

    #submit-btn:hover {
      background: rgba(78, 205, 196, 0.5);
    }

    #help-text {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      text-align: center;
      margin-top: 4px;
    }

    #help-text span {
      margin: 0 8px;
    }

    .key {
      background: rgba(255, 255, 255, 0.1);
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="ui-panel">
      <div id="status-bar">
        <div class="status-item">
          <span class="status-label">WAVE:</span>
          <span class="status-value wave" id="wave-display">0</span>
        </div>
        <div class="status-item">
          <span class="status-label">GOLD:</span>
          <span class="status-value gold" id="gold-display">100</span>
        </div>
        <div class="status-item">
          <span class="status-label">LIVES:</span>
          <span class="status-value lives" id="lives-display">20</span>
        </div>
        <div class="status-item">
          <span class="status-label">ENEMIES:</span>
          <span class="status-value" id="enemies-display">0</span>
        </div>
      </div>
      <div id="notification-area"></div>
      <div id="input-container">
        <input type="text" id="command-input" placeholder="Enter command... (try 'deploy arrow 5 5' or 'help')" autocomplete="off">
        <button id="submit-btn">Execute</button>
      </div>
      <div id="help-text">
        <span><span class="key">↑↓</span> History</span>
        <span><span class="key">Tab</span> Autocomplete</span>
        <span><span class="key">Enter</span> Execute</span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
