<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>阅读追踪 - 我的书房</title>
  <style>
    :root {
      --bg-beige: #FAF3E0;
      --bg-beige-light: #FDF8EC;
      --text-brown: #4E342E;
      --text-brown-light: #795548;
      --accent: #8D6E63;
      --accent-light: #BCAAA4;
      --card-shadow: 0 2px 8px rgba(78, 52, 46, 0.12);
      --card-shadow-hover: 0 8px 24px rgba(78, 52, 46, 0.2);
      --success: #66BB6A;
      --warning: #FFA726;
      --danger: #EF5350;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
    }

    @media (max-width: 480px) {
      html { font-size: 14px; }
    }

    @media (max-width: 360px) {
      html { font-size: 13px; }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg-beige);
      color: var(--text-brown);
      min-height: 100vh;
      overflow-x: hidden;
    }

    #app {
      max-width: 768px;
      margin: 0 auto;
      padding-bottom: 4.5rem;
      min-height: 100vh;
      background: var(--bg-beige);
    }

    .page {
      display: none;
      padding: 1rem;
      animation: fadeIn 0.3s ease;
    }

    .page.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .page-header {
      padding: 1.25rem 1rem 1rem;
      background: var(--bg-beige);
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--accent-light);
    }

    .page-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-brown);
    }

    .nav-bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 768px;
      margin: 0 auto;
      background: var(--bg-beige-light);
      border-top: 1px solid var(--accent-light);
      display: flex;
      justify-content: space-around;
      padding: 0.5rem 0;
      z-index: 100;
      box-shadow: 0 -2px 10px rgba(78, 52, 46, 0.08);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.4rem 0.8rem;
      cursor: pointer;
      color: var(--text-brown-light);
      transition: color 0.2s ease;
      flex: 1;
      user-select: none;
    }

    .nav-item:hover {
      color: var(--text-brown);
    }

    .nav-item.active {
      color: var(--accent);
    }

    .nav-item svg {
      width: 1.5rem;
      height: 1.5rem;
      margin-bottom: 0.2rem;
    }

    .nav-item span {
      font-size: 0.75rem;
      font-weight: 500;
    }

    .book-card {
      background: var(--bg-beige-light);
      border-radius: 12px;
      padding: 1rem;
      box-shadow: var(--card-shadow);
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .book-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--card-shadow-hover);
    }

    .book-cover {
      width: 100%;
      aspect-ratio: 3 / 4;
      background: linear-gradient(135deg, var(--accent-light), var(--accent));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--bg-beige-light);
      font-size: 2rem;
      font-weight: 700;
      overflow: hidden;
    }

    .book-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .book-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-brown);
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .book-author {
      font-size: 0.8rem;
      color: var(--text-brown-light);
    }

    .book-progress {
      height: 6px;
      background: var(--accent-light);
      border-radius: 3px;
      overflow: hidden;
    }

    .book-progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    .book-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--text-brown-light);
    }

    .status-badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: 500;
    }

    .status-reading { background: #E3F2FD; color: #1976D2; }
    .status-finished { background: #E8F5E9; color: #388E3C; }
    .status-shelved { background: #FFF3E0; color: #F57C00; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      gap: 0.4rem;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover { background: var(--text-brown); }

    .btn-secondary {
      background: var(--bg-beige-light);
      color: var(--text-brown);
      border: 1px solid var(--accent-light);
    }

    .btn-secondary:hover { background: var(--accent-light); }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-fab {
      position: fixed;
      bottom: 5.5rem;
      right: 1rem;
      width: 3.2rem;
      height: 3.2rem;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      box-shadow: 0 4px 16px rgba(78, 52, 46, 0.25);
      z-index: 50;
      font-size: 1.8rem;
      line-height: 1;
    }

    .btn-fab:hover {
      background: var(--text-brown);
      transform: scale(1.05);
    }

    .filter-tabs {
      display: flex;
      gap: 0.5rem;
      padding: 0 1rem 1rem;
      flex-wrap: wrap;
    }

    .filter-tab {
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
      background: var(--bg-beige-light);
      color: var(--text-brown-light);
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    .filter-tab.active {
      background: var(--accent);
      color: white;
    }

    .book-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      padding: 0 1rem;
    }

    @media (min-width: 600px) {
      .book-grid { grid-template-columns: repeat(3, 1fr); }
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-brown-light);
    }

    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(78, 52, 46, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 1rem;
      animation: fadeIn 0.2s ease;
    }

    .modal {
      background: var(--bg-beige);
      border-radius: 16px;
      width: 100%;
      max-width: 480px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 1.5rem;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal h2 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      color: var(--text-brown);
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 0.3rem;
      color: var(--text-brown-light);
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1px solid var(--accent-light);
      border-radius: 8px;
      background: var(--bg-beige-light);
      color: var(--text-brown);
      font-size: 0.9rem;
      font-family: inherit;
      transition: border-color 0.2s ease;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .form-actions {
      display: flex;
      gap: 0.8rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }

    .detail-layout {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 1rem;
    }

    .detail-sidebar {
      background: var(--bg-beige-light);
      border-radius: 12px;
      padding: 1rem;
      box-shadow: var(--card-shadow);
    }

    @media (min-width: 640px) {
      .detail-layout {
        flex-direction: row;
        align-items: flex-start;
      }
      .detail-sidebar {
        width: 280px;
        flex-shrink: 0;
        position: sticky;
        top: 5rem;
      }
      .detail-main {
        flex: 1;
        min-width: 0;
      }
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      cursor: pointer;
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      transition: background 0.2s ease;
    }

    .back-btn:hover {
      background: rgba(141, 110, 99, 0.1);
    }

    .detail-cover {
      width: 120px;
      aspect-ratio: 3 / 4;
      margin: 0 auto 1rem;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      background: linear-gradient(135deg, var(--accent-light), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 2rem;
      font-weight: 700;
    }

    .detail-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .detail-title {
      font-size: 1.25rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.3rem;
    }

    .detail-author {
      text-align: center;
      color: var(--text-brown-light);
      margin-bottom: 1rem;
    }

    .detail-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin-bottom: 1rem;
    }

    .stat-item {
      text-align: center;
      padding: 0.6rem;
      background: var(--bg-beige);
      border-radius: 8px;
    }

    .stat-value {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-brown-light);
    }

    .tab-switcher {
      display: flex;
      background: var(--bg-beige-light);
      border-radius: 10px;
      padding: 4px;
      position: relative;
      margin-bottom: 1rem;
    }

    .tab-btn {
      flex: 1;
      padding: 0.6rem;
      text-align: center;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-brown-light);
      cursor: pointer;
      transition: color 0.2s ease;
      z-index: 1;
      background: transparent;
      border: none;
    }

    .tab-btn.active {
      color: var(--text-brown);
    }

    .tab-indicator {
      position: absolute;
      top: 4px;
      bottom: 4px;
      width: calc(50% - 4px);
      background: white;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(78, 52, 46, 0.1);
      transition: transform 0.3s ease;
    }

    .tab-indicator.right {
      transform: translateX(100%);
    }

    .tab-content {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .tab-content.active {
      display: block;
    }

    .record-form {
      background: var(--bg-beige-light);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .record-form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin-bottom: 0.8rem;
    }

    .record-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .record-item {
      background: var(--bg-beige-light);
      border-radius: 10px;
      padding: 0.8rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .record-info {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .record-date {
      font-size: 0.85rem;
      font-weight: 600;
    }

    .record-pages {
      font-size: 0.75rem;
      color: var(--text-brown-light);
    }

    .record-count {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
    }

    .note-editor {
      background: var(--bg-beige-light);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .rte-toolbar {
      display: flex;
      gap: 0.3rem;
      padding: 0.5rem;
      background: var(--bg-beige);
      border-radius: 8px;
      margin-bottom: 0.6rem;
    }

    .rte-btn {
      width: 2rem;
      height: 2rem;
      border: none;
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
      color: var(--text-brown-light);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .rte-btn:hover {
      background: var(--accent-light);
      color: var(--text-brown);
    }

    .rte-btn.active {
      background: var(--accent);
      color: white;
    }

    .rte-content {
      min-height: 120px;
      padding: 0.8rem;
      background: white;
      border: 1px solid var(--accent-light);
      border-radius: 8px;
      outline: none;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .rte-content:focus {
      border-color: var(--accent);
    }

    .rte-content:empty:before {
      content: attr(data-placeholder);
      color: #aaa;
    }

    .notes-list {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .note-card {
      background: var(--bg-beige-light);
      border-radius: 12px;
      padding: 1rem;
      box-shadow: var(--card-shadow);
      animation: fadeIn 0.3s ease;
    }

    .note-card.fade-out {
      animation: fadeOut 0.3s ease forwards;
    }

    @keyframes fadeOut {
      to { opacity: 0; transform: translateY(-8px); }
    }

    .note-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.6rem;
    }

    .note-date {
      font-size: 0.75rem;
      color: var(--text-brown-light);
    }

    .note-actions {
      display: flex;
      gap: 0.3rem;
    }

    .note-action-btn {
      padding: 0.25rem 0.5rem;
      font-size: 0.75rem;
      border: none;
      background: transparent;
      color: var(--text-brown-light);
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s ease;
    }

    .note-action-btn:hover {
      background: var(--accent-light);
      color: var(--text-brown);
    }

    .note-content {
      font-size: 0.9rem;
      line-height: 1.6;
      word-break: break-word;
    }

    .note-content ul,
    .note-content ol {
      padding-left: 1.5rem;
    }

    .stats-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem;
      padding: 0 1rem 1.5rem;
    }

    .stats-card {
      background: var(--bg-beige-light);
      border-radius: 12px;
      padding: 1rem 0.8rem;
      text-align: center;
      box-shadow: var(--card-shadow);
    }

    .stats-card-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stats-card-label {
      font-size: 0.7rem;
      color: var(--text-brown-light);
      margin-top: 0.3rem;
    }

    .chart-section {
      background: var(--bg-beige-light);
      border-radius: 16px;
      padding: 1rem;
      margin: 0 1rem 1.5rem;
      box-shadow: var(--card-shadow);
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .chart-title {
      font-size: 1rem;
      font-weight: 600;
    }

    .chart-toggle {
      display: flex;
      background: var(--bg-beige);
      border-radius: 8px;
      padding: 3px;
    }

    .chart-toggle-btn {
      padding: 0.4rem 0.9rem;
      font-size: 0.8rem;
      border: none;
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-brown-light);
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .chart-toggle-btn.active {
      background: var(--accent);
      color: white;
    }

    .chart-container {
      position: relative;
      height: 280px;
    }

    .settings-section {
      background: var(--bg-beige-light);
      border-radius: 12px;
      padding: 1rem;
      margin: 0 1rem 1rem;
    }

    .settings-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.8rem;
    }

    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--accent-light);
    }

    .settings-row:last-child {
      border-bottom: none;
    }

    .settings-label {
      font-size: 0.9rem;
    }

    .settings-desc {
      font-size: 0.75rem;
      color: var(--text-brown-light);
      margin-top: 0.2rem;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
