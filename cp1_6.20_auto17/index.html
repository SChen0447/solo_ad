<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adaptive TD - 自适应塔防</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      color: #e0e0e0;
      user-select: none;
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      display: block;
    }
    .hud-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 16px 24px;
      background: rgba(26, 26, 46, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 12px;
      z-index: 100;
      min-width: 220px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4), 0 0 30px rgba(0, 212, 255, 0.1);
    }
    .hud-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 8px 0;
      font-size: 14px;
    }
    .hud-label {
      color: #8a8ab0;
      font-weight: 500;
    }
    .hud-value {
      font-weight: 700;
      font-size: 18px;
    }
    .hud-wave {
      color: #00d4ff;
      text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
    }
    .hud-hp {
      color: #ff2a6d;
      text-shadow: 0 0 10px rgba(255, 42, 109, 0.5);
    }
    .hud-gold {
      color: #ffd700;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }
    .tower-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 16px;
      background: rgba(26, 26, 46, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 12px;
      z-index: 100;
      min-width: 180px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4), 0 0 30px rgba(0, 212, 255, 0.1);
    }
    .tower-panel-title {
      font-size: 14px;
      color: #00d4ff;
      margin-bottom: 12px;
      text-align: center;
      font-weight: 600;
      letter-spacing: 2px;
    }
    .tower-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      margin: 6px 0;
      background: rgba(0, 212, 255, 0.08);
      border: 1px solid rgba(0, 212, 255, 0.25);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #e0e0e0;
      font-size: 13px;
    }
    .tower-btn:hover {
      background: rgba(0, 212, 255, 0.2);
      border-color: rgba(0, 212, 255, 0.6);
      transform: translateX(-2px);
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
    }
    .tower-btn.selected {
      background: rgba(255, 42, 109, 0.2);
      border-color: rgba(255, 42, 109, 0.7);
      box-shadow: 0 0 15px rgba(255, 42, 109, 0.3);
    }
    .tower-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: bold;
    }
    .tower-icon.arrow {
      background: linear-gradient(135deg, #4ade80, #22c55e);
      color: #fff;
    }
    .tower-icon.magic {
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      color: #fff;
    }
    .tower-icon.cannon {
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: #fff;
    }
    .tower-info {
      flex: 1;
    }
    .tower-name {
      font-weight: 600;
    }
    .tower-cost {
      font-size: 11px;
      color: #ffd700;
    }
    .action-btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: linear-gradient(135deg, #ff2a6d, #d10047);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 0 15px rgba(255, 42, 109, 0.3);
    }
    .action-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 25px rgba(255, 42, 109, 0.5);
    }
    .action-btn.secondary {
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
    }
    .action-btn.secondary:hover {
      box-shadow: 0 0 25px rgba(0, 212, 255, 0.5);
    }
    .game-over {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 40px 60px;
      background: rgba(26, 26, 46, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 2px solid #ff2a6d;
      border-radius: 16px;
      z-index: 200;
      text-align: center;
      display: none;
      box-shadow: 0 0 60px rgba(255, 42, 109, 0.4);
    }
    .game-over h2 {
      color: #ff2a6d;
      font-size: 36px;
      margin-bottom: 16px;
      text-shadow: 0 0 20px rgba(255, 42, 109, 0.6);
    }
    .game-over p {
      color: #8a8ab0;
      font-size: 16px;
      margin-bottom: 24px;
    }
    .tooltip-panel {
      position: absolute;
      padding: 12px 16px;
      background: rgba(26, 26, 46, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 212, 255, 0.5);
      border-radius: 8px;
      z-index: 150;
      display: none;
      min-width: 200px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }
    .tooltip-panel.visible {
      opacity: 1;
    }
    .tooltip-title {
      color: #00d4ff;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .tooltip-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin: 4px 0;
      color: #c0c0e0;
    }
    .tooltip-label {
      color: #8a8ab0;
    }
    .wave-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 48px;
      font-weight: 900;
      color: #00d4ff;
      text-shadow: 0 0 40px rgba(0, 212, 255, 0.8);
      opacity: 0;
      pointer-events: none;
      z-index: 120;
      letter-spacing: 8px;
    }
    .wave-indicator.show {
      animation: waveAppear 2s ease-out forwards;
    }
    @keyframes waveAppear {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
      20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
      30% { transform: translate(-50%, -50%) scale(1); }
      80% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
    }
    .hint-text {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #5a5a8a;
      font-size: 12px;
      z-index: 100;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="map-layer"></canvas>
    <canvas id="entity-layer"></canvas>
    <canvas id="effect-layer"></canvas>
    <canvas id="ui-layer"></canvas>

    <div class="hud-panel">
      <div class="hud-item">
        <span class="hud-label">波次</span>
        <span class="hud-value hud-wave" id="hud-wave">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">生命值</span>
        <span class="hud-value hud-hp" id="hud-hp">100</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">金币</span>
        <span class="hud-value hud-gold" id="hud-gold">300</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">剩余敌人</span>
        <span class="hud-value" id="hud-enemies" style="color: #ff2a6d;">0</span>
      </div>
    </div>

    <div class="tower-panel">
      <div class="tower-panel-title">炮塔建造</div>
      <button class="tower-btn" data-tower="arrow">
        <div class="tower-icon arrow">箭</div>
        <div class="tower-info">
          <div class="tower-name">箭塔</div>
          <div class="tower-cost">💰 50</div>
        </div>
      </button>
      <button class="tower-btn" data-tower="magic">
        <div class="tower-icon magic">魔</div>
        <div class="tower-info">
          <div class="tower-name">魔法塔</div>
          <div class="tower-cost">💰 100</div>
        </div>
      </button>
      <button class="tower-btn" data-tower="cannon">
        <div class="tower-icon cannon">炮</div>
        <div class="tower-info">
          <div class="tower-name">重炮塔</div>
          <div class="tower-cost">💰 150</div>
        </div>
      </button>
      <button class="action-btn secondary" id="btn-upgrade">升级选中炮塔</button>
      <button class="action-btn" id="btn-sell">出售选中炮塔</button>
      <button class="action-btn secondary" id="btn-wave" style="margin-top: 16px;">开始下一波</button>
    </div>

    <div class="tooltip-panel" id="tooltip-panel"></div>
    <div class="wave-indicator" id="wave-indicator"></div>

    <div class="game-over" id="game-over">
      <h2>游戏结束</h2>
      <p id="game-over-text">坚持了 0 波敌人的进攻</p>
      <button class="action-btn secondary" id="btn-restart">重新开始</button>
    </div>

    <div class="hint-text">
      左键放置炮塔 | 右键取消选择 | 点击炮塔查看详情 | 按 1/2/3 快速选择炮塔类型
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
