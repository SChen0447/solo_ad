<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI叙事文字冒险游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0d1117 0%, #1a202c 100%);
      font-family: monospace;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #game-wrapper {
      position: relative;
      min-width: 800px;
      min-height: 600px;
      width: 800px;
      height: 600px;
      display: flex;
      flex-direction: column;
      border: 1px solid #2d3748;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }
    #game-canvas {
      display: block;
      width: 100%;
      flex: 1;
      background: transparent;
    }
    #input-wrapper {
      width: 100%;
      height: 40px;
      background: #111827;
      border-top: 1px solid #2d3748;
      display: flex;
      align-items: center;
      padding: 0 12px;
    }
    #command-input {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #f3f4f6;
      font-family: monospace;
      font-size: 16px;
      caret-color: #a3e635;
    }
    #command-input::placeholder {
      color: #6b7280;
    }
    @media (min-width: 900px) {
      #game-wrapper {
        width: 850px;
        height: 650px;
      }
    }
    @media (min-width: 1100px) {
      #game-wrapper {
        width: 960px;
        height: 720px;
      }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="game-wrapper">
      <canvas id="game-canvas"></canvas>
      <div id="input-wrapper">
        <input type="text" id="command-input" placeholder="输入你的指令..." autocomplete="off" spellcheck="false" />
      </div>
    </div>
  </div>
  <script type="module" src="/src/gameEngine.ts"></script>
</body>
</html>
