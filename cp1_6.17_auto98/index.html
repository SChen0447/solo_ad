<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 曲线管状建模器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    #root {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #loading-mask {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 600ms ease-out;
    }
    #loading-mask.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .loader-ring {
      width: 64px;
      height: 64px;
      border: 3px solid rgba(255, 255, 255, 0.15);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    :root {
      --bg-main: #1a1a2e;
      --bg-panel: #16213e;
      --text-primary: #e0e0e0;
      --text-secondary: #8892b0;
      --accent-start: #0f3460;
      --accent-end: #1640a5;
      --accent-glow: #00e5ff;
      --border-glass: rgba(192, 192, 192, 0.2);
      --panel-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    .panel-glass {
      background: rgba(22, 33, 62, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--border-glass);
      border-radius: 12px;
      box-shadow: var(--panel-shadow);
    }
    .btn-gradient {
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      transition: all 300ms ease-out;
    }
    .btn-gradient:hover {
      filter: brightness(1.2);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(22, 64, 165, 0.5);
    }
    #hierarchy-panel {
      position: absolute;
      left: 16px;
      top: 16px;
      bottom: 16px;
      width: 280px;
      z-index: 10;
      padding: 16px;
      display: flex;
      flex-direction: column;
      transition: all 300ms ease-out;
    }
    #params-panel {
      position: absolute;
      right: 16px;
      top: 16px;
      bottom: 16px;
      width: 300px;
      z-index: 10;
      padding: 16px;
      display: flex;
      flex-direction: column;
      transition: all 300ms ease-out;
    }
    .panel-title {
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      letter-spacing: 1px;
    }
    .panel-title::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 16px;
      background: linear-gradient(180deg, var(--accent-glow), var(--accent-end));
      margin-right: 8px;
      vertical-align: middle;
      border-radius: 2px;
    }
    #curve-list {
      flex: 1;
      overflow-y: auto;
      margin: 0 -4px;
      padding: 0 4px;
    }
    #curve-list::-webkit-scrollbar {
      width: 6px;
    }
    #curve-list::-webkit-scrollbar-track {
      background: transparent;
    }
    #curve-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }
    #curve-list::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    .curve-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      margin-bottom: 8px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      transition: all 300ms ease-out;
      gap: 10px;
    }
    .curve-item:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.1);
    }
    .curve-item.selected {
      background: rgba(0, 229, 255, 0.1);
      border-color: var(--accent-glow);
      box-shadow: 0 0 12px rgba(0, 229, 255, 0.2);
    }
    .color-swatch {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      flex-shrink: 0;
    }
    .curve-info {
      flex: 1;
      min-width: 0;
    }
    .curve-name {
      font-size: 13px;
      font-weight: 500;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .curve-name-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--accent-glow);
      border-radius: 4px;
      color: #fff;
      font-size: 13px;
      padding: 2px 6px;
      outline: none;
    }
    .curve-meta {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .delete-btn {
      width: 26px;
      height: 26px;
      border: none;
      background: rgba(255, 68, 68, 0.15);
      color: #ff5c5c;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 200ms ease-out;
      flex-shrink: 0;
    }
    .delete-btn:hover {
      background: rgba(255, 68, 68, 0.3);
      color: #ffffff;
      transform: scale(1.1);
    }
    .param-group {
      margin-bottom: 16px;
    }
    .param-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 8px;
      color: #ffffff;
    }
    .param-value {
      color: var(--accent-glow);
      font-weight: 600;
      font-size: 12px;
      padding: 2px 8px;
      background: rgba(0, 229, 255, 0.1);
      border-radius: 4px;
    }
    input[type="range"] {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-glow), var(--accent-end));
      border: 2px solid #ffffff;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
      transition: transform 150ms ease-out;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }
    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-glow), var(--accent-end));
      border: 2px solid #ffffff;
      cursor: pointer;
    }
    .color-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .color-row input[type="color"] {
      width: 48px;
      height: 32px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      padding: 2px;
    }
    .color-row input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
    }
    .color-row input[type="color"]::-webkit-color-swatch {
      border: none;
      border-radius: 4px;
    }
    .color-hex {
      font-family: 'Consolas', monospace;
      font-size: 13px;
      color: var(--text-secondary);
      letter-spacing: 1px;
    }
    .btn-action {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      color: #ffffff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    .btn-action.secondary {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: all 300ms ease-out;
    }
    .btn-action.secondary:hover {
      background: rgba(255, 255, 255, 0.14);
      transform: translateY(-2px);
    }
    .panel-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }
    .hint-text {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.7;
      padding: 12px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      border-left: 3px solid var(--accent-glow);
    }
    .hint-text strong {
      color: #ffffff;
    }
    .empty-tip {
      text-align: center;
      padding: 40px 16px;
      color: var(--text-secondary);
      font-size: 13px;
    }
    .empty-tip-icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.4;
    }
    #tooltip {
      position: absolute;
      padding: 10px 14px;
      background: rgba(15, 30, 60, 0.95);
      border: 1px solid var(--accent-glow);
      border-radius: 8px;
      font-size: 12px;
      color: #ffffff;
      z-index: 100;
      pointer-events: none;
      box-shadow: 0 4px 20px rgba(0, 229, 255, 0.2);
      opacity: 0;
      transform: translateY(4px);
      transition: all 200ms ease-out;
      white-space: nowrap;
    }
    #tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .tooltip-row {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 4px;
    }
    .tooltip-row:last-child {
      margin-bottom: 0;
    }
    .tooltip-label {
      color: var(--text-secondary);
    }
    .tooltip-value {
      color: var(--accent-glow);
      font-weight: 600;
    }
    .params-disabled-mask {
      text-align: center;
      padding: 32px 16px;
      color: var(--text-secondary);
      font-size: 13px;
    }
    .params-disabled-mask .icon {
      font-size: 36px;
      margin-bottom: 10px;
      opacity: 0.4;
    }
    #file-input {
      display: none;
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="canvas-container"></div>
    <div id="loading-mask">
      <div class="loader-ring"></div>
    </div>

    <div id="hierarchy-panel" class="panel-glass">
      <div class="panel-title">场景层级</div>
      <div id="curve-list"></div>
      <div class="panel-section">
        <div class="hint-text">
          <strong>操作提示：</strong><br/>
          • 左键拖拽：绘制曲线<br/>
          • 中键拖拽：平移场景<br/>
          • 滚轮：缩放视角<br/>
          • Ctrl+Z：撤销曲线
        </div>
      </div>
    </div>

    <div id="params-panel" class="panel-glass">
      <div class="panel-title">参数调节</div>
      <div id="params-content"></div>

      <div class="panel-section">
        <button id="btn-export" class="btn-action btn-gradient">📤 导出场景</button>
        <button id="btn-import" class="btn-action secondary">📥 导入场景</button>
        <input type="file" id="file-input" accept=".scene" />
      </div>

      <div class="panel-section">
        <div class="hint-text">
          <strong>曲线数量：</strong><br/>
          场景支持最多 <span id="curve-count" style="color:var(--accent-glow);font-weight:600;">0</span> / 10 条曲线
        </div>
      </div>
    </div>

    <div id="tooltip"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
