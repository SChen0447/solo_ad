<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel River Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1 class="app-title">PIXEL RIVER CALENDAR</h1>
      <div class="header-controls">
        <button id="todayBtn" class="pixel-btn">TODAY</button>
        <span id="monthIndicator" class="month-indicator">—</span>
      </div>
    </header>
    <main class="app-main">
      <div id="canvasContainer" class="canvas-container">
        <canvas id="riverCanvas"></canvas>
        <div id="tooltip" class="tooltip hidden"></div>
      </div>
      <div class="legend">
        <div class="legend-item">
          <div class="legend-color" style="background: #0f0f23;"></div>
          <span>0</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #1a1a4e;"></div>
          <span>1</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #5c1a8a;"></div>
          <span>2</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #c41e8a;"></div>
          <span>3</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #ff2a6d;"></div>
          <span>5+</span>
        </div>
        <span class="legend-label">events/day</span>
      </div>
    </main>
    <div id="modalOverlay" class="modal-overlay hidden">
      <div id="modal" class="modal">
        <h2 id="modalTitle" class="modal-title">Add Event</h2>
        <input type="text" id="eventInput" class="event-input" placeholder="Enter event description..." />
        <div class="modal-actions">
          <button id="cancelBtn" class="pixel-btn secondary">CANCEL</button>
          <button id="saveBtn" class="pixel-btn primary">SAVE</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
