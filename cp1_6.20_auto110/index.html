<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>漂浮遗迹 · 解谜探索</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Georgia', serif;
      background: linear-gradient(180deg, #0d0d2b 0%, #1c1c3d 100%);
      color: #e0d0b0;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    #canvas-container canvas {
      display: block;
    }

    #info-panel {
      position: fixed;
      top: 80px;
      left: 20px;
      width: 260px;
      max-height: calc(100vh - 120px);
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 20px;
      z-index: 10;
      overflow-y: auto;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  width 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  height 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  top 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  left 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    #info-panel h2 {
      font-size: 18px;
      color: #ffd700;
      margin-bottom: 12px;
      letter-spacing: 1px;
      border-bottom: 1px solid rgba(255, 215, 0, 0.3);
      padding-bottom: 8px;
    }

    #info-panel .clue-item {
      font-size: 14px;
      line-height: 1.6;
      color: #e0d0b0;
      margin-bottom: 10px;
      padding: 8px 10px;
      background: rgba(0, 0, 0, 0.2);
      border-left: 3px solid #ffd700;
      border-radius: 0 4px 4px 0;
      opacity: 0;
      transform: translateX(-10px);
      animation: fadeInSlide 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes fadeInSlide {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .clue-empty {
      font-size: 13px;
      color: rgba(224, 208, 176, 0.5);
      font-style: italic;
    }

    #progress-bar-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: rgba(0, 0, 0, 0.5);
      z-index: 20;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
      transition: width 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    #progress-nodes {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 30px;
      z-index: 20;
    }

    .progress-node {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid rgba(255, 255, 255, 0.3);
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .progress-node.active {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      border-color: #00f2fe;
      box-shadow: 0 0 10px rgba(79, 172, 254, 0.8);
    }

    #fps-counter {
      position: fixed;
      top: 20px;
      left: 20px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      color: #00f2fe;
      background: rgba(0, 0, 0, 0.4);
      padding: 6px 10px;
      border-radius: 4px;
      z-index: 30;
      letter-spacing: 1px;
    }

    #reset-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #e74c3c;
      border: none;
      cursor: pointer;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  box-shadow 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
    }

    #reset-btn:hover {
      box-shadow: 0 6px 20px rgba(231, 76, 60, 0.6);
    }

    #reset-btn:active {
      transform: scale(0.9);
    }

    #reset-btn svg {
      width: 20px;
      height: 20px;
      stroke: white;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    #panel-toggle {
      display: none;
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 4px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 2px;
      z-index: 25;
    }

    @media (max-width: 1024px) {
      #info-panel {
        top: auto;
        left: 0;
        bottom: 0;
        width: 100%;
        max-height: 40vh;
        height: auto;
        border-radius: 16px 16px 0 0;
        transform: translateY(100%);
      }

      #info-panel.open {
        transform: translateY(0);
      }

      #panel-toggle {
        display: block;
        bottom: calc(40vh + 10px);
      }

      #fps-counter {
        top: 12px;
        left: 12px;
        font-size: 11px;
      }
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 215, 0, 0.3);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 215, 0, 0.5);
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="progress-bar-container">
    <div id="progress-bar"></div>
  </div>

  <div id="progress-nodes">
    <div class="progress-node" data-index="0"></div>
    <div class="progress-node" data-index="1"></div>
    <div class="progress-node" data-index="2"></div>
    <div class="progress-node" data-index="3"></div>
    <div class="progress-node" data-index="4"></div>
  </div>

  <div id="fps-counter">FPS: 60</div>

  <div id="info-panel">
    <h2>遗迹线索</h2>
    <div id="clue-container">
      <p class="clue-empty">探索遗迹，发现隐藏的秘密...</p>
    </div>
  </div>

  <button id="reset-btn" title="重置">
    <svg viewBox="0 0 24 24">
      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
      <path d="M3 3v5h5"/>
    </svg>
  </button>

  <div id="panel-toggle"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
