<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>像素小镇协作 - Pixel Town</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      background-color: #1a1a2e;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
      color: #fff;
    }
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #game-container {
      position: relative;
      display: none;
    }
    #game-canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
      border: 4px solid #444;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
    }
    #role-select {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 40px;
      background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
      border-radius: 16px;
      box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
      max-width: 600px;
      width: 90%;
    }
    #role-select h1 {
      font-size: 18px;
      color: #e94560;
      text-shadow: 2px 2px 0 #000;
      margin-bottom: 8px;
    }
    #role-select h2 {
      font-size: 12px;
      color: #eee;
    }
    .role-cards {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .role-card {
      width: 140px;
      padding: 16px 12px;
      background: #1a1a2e;
      border: 3px solid #444;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .role-card:hover {
      border-color: #e94560;
      transform: translateY(-4px);
    }
    .role-card.selected {
      border-color: #00ff88;
      background: #1a2e1a;
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
    }
    .role-card.disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }
    .role-sprite {
      width: 64px;
      height: 64px;
      margin: 0 auto 8px;
      image-rendering: pixelated;
    }
    .role-card h3 {
      font-size: 10px;
      color: #fff;
      margin-bottom: 6px;
    }
    .role-card p {
      font-size: 7px;
      color: #aaa;
      line-height: 1.6;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      max-width: 360px;
    }
    .input-group label {
      font-size: 9px;
      color: #ccc;
    }
    .input-group input {
      padding: 12px 14px;
      background: #0f0f1a;
      border: 2px solid #444;
      border-radius: 6px;
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-group input:focus {
      border-color: #e94560;
    }
    .button-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      padding: 14px 24px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      transition: all 0.2s;
      box-shadow: 0 4px 0 #a32f44;
    }
    .btn:hover:not(:disabled) {
      background: #ff5773;
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #a32f44;
    }
    .btn:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #a32f44;
    }
    .btn:disabled {
      background: #555;
      color: #888;
      cursor: not-allowed;
      box-shadow: 0 4px 0 #333;
    }
    .btn.secondary {
      background: #4a69bd;
      box-shadow: 0 4px 0 #2d427a;
    }
    .btn.secondary:hover:not(:disabled) {
      background: #5a7dd0;
      box-shadow: 0 6px 0 #2d427a;
    }
    .btn.secondary:active:not(:disabled) {
      box-shadow: 0 2px 0 #2d427a;
    }
    .room-info {
      display: flex;
      gap: 16px;
      padding: 10px 16px;
      background: #0f0f1a;
      border: 2px solid #444;
      border-radius: 6px;
      font-size: 9px;
      color: #00ff88;
      align-items: center;
    }
    .room-info span {
      color: #ffcc00;
    }
    #status-msg {
      min-height: 16px;
      font-size: 8px;
      color: #ff9999;
      text-align: center;
    }
    #hud-panel {
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      display: none;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
    }
    .hud-section {
      pointer-events: auto;
    }
    #room-display {
      padding: 6px 12px;
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid #444;
      border-radius: 6px;
      font-size: 8px;
      color: #00ff88;
    }
    #coin-display {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid #444;
      border-radius: 6px;
      font-size: 10px;
      color: #ffcc00;
    }
    #inventory-panel {
      position: absolute;
      bottom: 8px;
      left: 8px;
      right: 8px;
      display: none;
      justify-content: space-between;
      gap: 8px;
      pointer-events: none;
    }
    .inv-box {
      pointer-events: auto;
      flex: 1;
      padding: 10px;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid #444;
      border-radius: 8px;
      min-height: 80px;
    }
    .inv-box h4 {
      font-size: 8px;
      color: #aaa;
      margin-bottom: 8px;
    }
    .inv-items {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .inv-item {
      padding: 4px 8px;
      background: #2a2a3e;
      border: 1px solid #555;
      border-radius: 4px;
      font-size: 7px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .inv-item .count {
      color: #ffcc00;
    }
    .action-btn {
      pointer-events: auto;
      padding: 8px 12px;
      background: #4a69bd;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      margin-top: 6px;
      margin-right: 4px;
      transition: background 0.2s;
    }
    .action-btn:hover:not(:disabled) {
      background: #5a7dd0;
    }
    .action-btn:disabled {
      background: #444;
      color: #888;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="role-select">
      <h1>🎮 像素小镇协作</h1>
      <h2>选择你的角色，共同建设家园！</h2>

      <div class="role-cards" id="role-cards">
        <div class="role-card" data-role="farmer">
          <canvas class="role-sprite" width="64" height="64" data-preview="farmer"></canvas>
          <h3>🌱 农场主</h3>
          <p>种植农作物<br/>收获新鲜食材</p>
        </div>
        <div class="role-card" data-role="chef">
          <canvas class="role-sprite" width="64" height="64" data-preview="chef"></canvas>
          <h3>🍳 厨师</h3>
          <p>烹饪美味料理<br/>制作精致菜肴</p>
        </div>
        <div class="role-card" data-role="merchant">
          <canvas class="role-sprite" width="64" height="64" data-preview="merchant"></canvas>
          <h3>🛒 商贩</h3>
          <p>兜售商品调料<br/>出售成品赚钱</p>
        </div>
      </div>

      <div class="input-group">
        <label>房间码（留空则创建新房间）</label>
        <input type="text" id="room-input" maxlength="6" placeholder="例如：A1B2C3" />
      </div>

      <div class="button-group">
        <button class="btn" id="join-btn" disabled>🚪 加入 / 创建房间</button>
      </div>

      <div class="room-info" id="room-info" style="display:none;">
        你的房间码：<span id="room-code">-</span>
      </div>
      <div id="status-msg"></div>
    </div>

    <div id="game-container">
      <canvas id="game-canvas" width="800" height="600"></canvas>
      <div id="hud-panel">
        <div class="hud-section">
          <div id="room-display">房间: --</div>
        </div>
        <div class="hud-section">
          <div id="coin-display">
            <canvas width="16" height="16" id="coin-icon"></canvas>
            <span id="coin-amount">0</span>
          </div>
        </div>
      </div>
      <div id="inventory-panel">
        <div class="inv-box" id="inv-farmer">
          <h4>🌱 农场物资</h4>
          <div class="inv-items" id="inv-farmer-items"></div>
        </div>
        <div class="inv-box" id="inv-chef">
          <h4>🍳 厨房物资</h4>
          <div class="inv-items" id="inv-chef-items"></div>
          <div id="chef-actions"></div>
        </div>
        <div class="inv-box" id="inv-merchant">
          <h4>🛒 商店物资</h4>
          <div class="inv-items" id="inv-merchant-items"></div>
          <div id="merchant-actions"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/client/main.ts"></script>
</body>
</html>
