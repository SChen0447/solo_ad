<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>多边形拓扑优化可视化工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
        'Microsoft YaHei', Roboto, sans-serif;
      color: #e6edf3;
      background: #0d1117;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 280px;
      right: 0;
      bottom: 0;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #1a1f3a 0%, #0d1117 70%, #1a1525 100%);
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    @media (max-width: 768px) {
      #canvas-container {
        left: 0;
        top: 420px;
      }
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      background: #000000cc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      pointer-events: auto;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #21262d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 16px;
      font-size: 14px;
      color: #8b949e;
    }

    .progress-bar {
      width: 200px;
      height: 6px;
      background: #21262d;
      border-radius: 3px;
      margin-top: 12px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #58a6ff, #a371f7);
      border-radius: 3px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .progress-estimate {
      margin-top: 8px;
      font-size: 12px;
      color: #6e7681;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
