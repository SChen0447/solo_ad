<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>自媒体内容排期管理</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'PingFang SC', 'Microsoft YaHei', sans-serif;
        background-color: #1e1e2e;
        color: #e0e0f0;
        min-height: 100vh;
        transition: all 0.3s ease;
      }
      #root {
        min-height: 100vh;
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #2a2a3e;
      }
      ::-webkit-scrollbar-thumb {
        background: #4a4a6a;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #5a5a7a;
      }
      button {
        font-family: inherit;
        cursor: pointer;
        border: none;
        outline: none;
        transition: all 0.3s ease;
      }
      input,
      select,
      textarea {
        font-family: inherit;
        outline: none;
        border: none;
        transition: all 0.3s ease;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
