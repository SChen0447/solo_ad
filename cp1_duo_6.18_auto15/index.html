<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>光锥回声 - Lightcone Echo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      background: #0a0a12;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
    }
    #game-container {
      position: relative;
      width: 900px;
      height: 600px;
      box-shadow: 0 0 60px rgba(0, 191, 255, 0.2);
      border-radius: 8px;
      overflow: hidden;
    }
    canvas {
      display: block;
      background: #0f0f1a;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="900" height="600"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
