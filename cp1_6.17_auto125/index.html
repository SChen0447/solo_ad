<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 材质实验室</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    .app-container {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    .viewport-container {
      flex: 0 0 70%;
      position: relative;
      background: radial-gradient(circle at 50% 50%, #2a2a3e 0%, #12121f 100%);
      overflow: hidden;
    }

    #three-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .viewport-info {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 12px;
      color: #888;
      pointer-events: none;
      background: rgba(0, 0, 0, 0.4);
      padding: 6px 12px;
      border-radius: 8px;
    }

    .control-panel {
      flex: 0 0 30%;
      min-width: 320px;
      background: #2a2a3e;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      border-left: 1px solid #3a3a4e;
    }

    .panel-header {
      padding: 18px 20px;
      border-bottom: 1px solid #3a3a4e;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.5px;
    }

    .hamburger-btn {
      display: none;
      width: 36px;
      height: 36px;
      background: #3a3a4e;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      transition: all 0.2s ease;
    }

    .hamburger-btn:hover {
      transform: translateY(-2px);
      background: #4a4a5e;
    }

    .hamburger-btn:active {
      transform: scale(0.95);
    }

    .hamburger-btn span {
      width: 18px;
      height: 2px;
      background: #e0e0e0;
      border-radius: 1px;
      transition: all 0.3s ease;
    }

    .hamburger-btn.active span:nth-child(1) {
      transform: translateY(6px) rotate(45deg);
    }

    .hamburger-btn.active span:nth-child(2) {
      opacity: 0;
    }

    .hamburger-btn.active span:nth-child(3) {
      transform: translateY(-6px) rotate(-45deg);
    }

    .panel-body {
      flex: 1;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #9090a8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .material-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .material-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 13px 16px;
      background: #3a3a4e;
      border: 1px solid #4a4a5e;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .material-btn:hover {
      transform: translateY(-2px);
      background: #45455a;
      border-color: #5a5a6e;
    }

    .material-btn:active {
      transform: scale(0.98);
    }

    .material-btn.active {
      background: #4a90d9;
      border-color: #5aa0e9;
      color: #ffffff;
      box-shadow: 0 4px 14px rgba(74, 144, 217, 0.35);
    }

    .material-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon-metal {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e8e8e8 0%, #888888 50%, #c0c0c0 100%);
      box-shadow: inset -2px -2px 4px rgba(0, 0, 0, 0.3), inset 2px 2px 4px rgba(255, 255, 255, 0.3);
    }

    .icon-plastic {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      background: linear-gradient(135deg, #7a7a8a 0%, #5a5a6a 100%);
      filter: blur(0.5px);
      opacity: 0.9;
    }

    .icon-glass {
      width: 16px;
      height: 16px;
      transform: rotate(45deg);
      background: linear-gradient(135deg, rgba(180, 220, 255, 0.6) 0%, rgba(100, 180, 255, 0.3) 100%);
      border: 1px solid rgba(180, 220, 255, 0.8);
    }

    .icon-emissive {
      position: relative;
      width: 20px;
      height: 20px;
    }

    .icon-emissive::before {
      content: '★';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 20px;
      color: #ffd700;
      text-shadow: 0 0 8px rgba(255, 215, 0, 0.8);
    }

    .texture-select-wrapper {
      position: relative;
    }

    .texture-select {
      width: 100%;
      padding: 12px 14px;
      background: #3a3a4e;
      border: 1px solid #4a4a5e;
      border-radius: 10px;
      color: #ffffff;
      font-size: 14px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      transition: all 0.2s ease;
    }

    .texture-select:hover {
      transform: translateY(-2px);
      border-color: #5a5a6e;
      background: #45455a;
    }

    .texture-select:active {
      transform: scale(0.98);
    }

    .texture-select:focus {
      outline: none;
      border-color: #4a90d9;
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.2);
    }

    .texture-select-arrow {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: #9090a8;
      font-size: 12px;
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .slider-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #b0b0c8;
    }

    .slider-label-value {
      font-family: 'Courier New', monospace;
      font-weight: 600;
      color: #4a90d9;
    }

    input[type="range"].axis-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: #4a4a5e;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"].axis-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #4a90d9;
      cursor: pointer;
      border: 2px solid #ffffff;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
      transition: all 0.15s ease;
    }

    input[type="range"].axis-slider::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      background: #5aa0e9;
    }

    input[type="range"].axis-slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #4a90d9;
      cursor: pointer;
      border: 2px solid #ffffff;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    .preset-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .preset-save-btn {
      padding: 8px 14px;
      background: linear-gradient(135deg, #4a90d9 0%, #3a80c9 100%);
      border: none;
      border-radius: 8px;
      color: #ffffff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .preset-save-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(74, 144, 217, 0.4);
    }

    .preset-save-btn:active {
      transform: scale(0.95);
    }

    .preset-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 280px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .preset-list::-webkit-scrollbar {
      width: 6px;
    }

    .preset-list::-webkit-scrollbar-track {
      background: #3a3a4e;
      border-radius: 3px;
    }

    .preset-list::-webkit-scrollbar-thumb {
      background: #5a5a6e;
      border-radius: 3px;
    }

    .preset-card {
      padding: 12px 14px;
      background: #3a3a4e;
      border: 1px solid #5a5a6e;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .preset-card:hover {
      transform: translateY(-2px);
      border-color: #4a90d9;
      background: #404054;
    }

    .preset-card:active {
      transform: scale(0.98);
    }

    .preset-card-name {
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 6px;
    }

    .preset-card-info {
      font-size: 12px;
      color: #9090a8;
      line-height: 1.5;
    }

    .preset-empty {
      text-align: center;
      padding: 20px;
      color: #707088;
      font-size: 13px;
      border: 1px dashed #4a4a5e;
      border-radius: 10px;
    }

    @media (max-width: 768px) {
      .app-container {
        flex-direction: column;
      }

      .viewport-container {
        flex: 1;
        flex-basis: auto;
        height: 60vh;
      }

      .control-panel {
        flex: 0 0 auto;
        min-width: 100%;
        height: auto;
        max-height: 40vh;
        border-left: none;
        border-top: 1px solid #3a3a4e;
      }

      .hamburger-btn {
        display: flex;
      }

      .panel-body {
        display: none;
      }

      .panel-body.mobile-open {
        display: flex;
        max-height: calc(40vh - 64px);
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="viewport-container">
      <canvas id="three-canvas"></canvas>
      <div class="viewport-info">拖拽旋转 · 滚轮缩放 · 右键平移</div>
    </div>

    <aside class="control-panel">
      <div class="panel-header">
        <h1>3D 材质实验室</h1>
        <button class="hamburger-btn" id="hamburger-btn" aria-label="菜单">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>

      <div class="panel-body" id="panel-body">
        <section>
          <div class="section-title">材质类型</div>
          <div class="material-buttons">
            <button class="material-btn active" data-material="metal">
              <span class="material-icon"><span class="icon-metal"></span></span>
              金属
            </button>
            <button class="material-btn" data-material="plastic">
              <span class="material-icon"><span class="icon-plastic"></span></span>
              粗糙塑料
            </button>
            <button class="material-btn" data-material="glass">
              <span class="material-icon"><span class="icon-glass"></span></span>
              透明玻璃
            </button>
            <button class="material-btn" data-material="emissive">
              <span class="material-icon"><span class="icon-emissive"></span></span>
              自发光
            </button>
          </div>
        </section>

        <section>
          <div class="section-title">纹理贴图</div>
          <div class="texture-select-wrapper">
            <select class="texture-select" id="texture-select">
              <option value="none">无纹理</option>
              <option value="wood">木纹</option>
              <option value="marble">大理石</option>
              <option value="brushed">磨砂金属</option>
              <option value="fabric">织物</option>
            </select>
            <span class="texture-select-arrow">▼</span>
          </div>
        </section>

        <section>
          <div class="section-title">点光源位置</div>
          <div class="slider-group">
            <div class="slider-row">
              <div class="slider-label">
                <span>X 轴</span>
                <span class="slider-label-value" id="light-x-value">5.0</span>
              </div>
              <input type="range" class="axis-slider" id="light-x" min="-10" max="10" step="0.1" value="5" />
            </div>
            <div class="slider-row">
              <div class="slider-label">
                <span>Y 轴</span>
                <span class="slider-label-value" id="light-y-value">5.0</span>
              </div>
              <input type="range" class="axis-slider" id="light-y" min="0" max="10" step="0.1" value="5" />
            </div>
            <div class="slider-row">
              <div class="slider-label">
                <span>Z 轴</span>
                <span class="slider-label-value" id="light-z-value">5.0</span>
              </div>
              <input type="range" class="axis-slider" id="light-z" min="-10" max="10" step="0.1" value="5" />
            </div>
          </div>
        </section>

        <section>
          <div class="preset-header">
            <div class="section-title" style="margin-bottom:0">预设管理</div>
            <button class="preset-save-btn" id="preset-save-btn">保存当前</button>
          </div>
          <div class="preset-list" id="preset-list">
            <div class="preset-empty">暂无预设，点击上方按钮保存</div>
          </div>
        </section>
      </div>
    </aside>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
