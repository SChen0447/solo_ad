<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>魔法咒语施放模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    #root {
      width: 100%;
      height: 100%;
    }
    #video-container {
      display: none;
    }
    #video-element {
      position: absolute;
      top: -9999px;
      left: -9999px;
      opacity: 0;
      pointer-events: none;
    }
    #three-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="video-container">
    <video id="video-element" autoplay playsinline muted></video>
  </div>
  <canvas id="three-canvas"></canvas>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
