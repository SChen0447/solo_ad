<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1a1a2e" />
    <title>Pixel Art Avatar Editor · 像素艺术头像编辑器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        background: #1a1a2e;
        font-family: 'Roboto Mono', monospace;
        color: #eaeaea;
        overflow-x: hidden;
      }
      #root {
        position: relative;
      }
      .app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0f0f1a 100%);
        z-index: 9999;
        animation: loadingFadeOut 0.4s ease-in-out 0.8s forwards;
      }
      .loading-grid {
        display: grid;
        grid-template-columns: repeat(4, 16px);
        grid-template-rows: repeat(4, 16px);
        gap: 3px;
      }
      .loading-cell {
        background: #e94560;
        border-radius: 3px;
        opacity: 0.15;
        transform: scale(0.6);
        animation: cellPulse 1.2s ease-in-out infinite;
      }
      .loading-cell:nth-child(1) { animation-delay: 0s; }
      .loading-cell:nth-child(2) { animation-delay: 0.05s; }
      .loading-cell:nth-child(3) { animation-delay: 0.1s; }
      .loading-cell:nth-child(4) { animation-delay: 0.15s; }
      .loading-cell:nth-child(5) { animation-delay: 0.2s; }
      .loading-cell:nth-child(6) { animation-delay: 0.25s; }
      .loading-cell:nth-child(7) { animation-delay: 0.3s; }
      .loading-cell:nth-child(8) { animation-delay: 0.35s; }
      .loading-cell:nth-child(9) { animation-delay: 0.4s; }
      .loading-cell:nth-child(10) { animation-delay: 0.45s; }
      .loading-cell:nth-child(11) { animation-delay: 0.5s; }
      .loading-cell:nth-child(12) { animation-delay: 0.55s; }
      .loading-cell:nth-child(13) { animation-delay: 0.6s; }
      .loading-cell:nth-child(14) { animation-delay: 0.65s; }
      .loading-cell:nth-child(15) { animation-delay: 0.7s; }
      .loading-cell:nth-child(16) { animation-delay: 0.75s; }
      .loading-title {
        font-size: 18px;
        font-weight: 500;
        letter-spacing: 2px;
        color: #eaeaea;
        opacity: 0.85;
      }
      .loading-subtitle {
        font-size: 12px;
        letter-spacing: 4px;
        color: #ffffff80;
        text-transform: uppercase;
      }
      @keyframes cellPulse {
        0%, 100% { opacity: 0.15; transform: scale(0.6); }
        50% { opacity: 1; transform: scale(1); background: #ff6b81; box-shadow: 0 0 12px #e9456080; }
      }
      @keyframes loadingFadeOut {
        to { opacity: 0; visibility: hidden; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-loading">
        <div class="loading-grid">
          <div class="loading-cell"></div><div class="loading-cell"></div><div class="loading-cell"></div><div class="loading-cell"></div>
          <div class="loading-cell"></div><div class="loading-cell"></div><div class="loading-cell"></div><div class="loading-cell"></div>
          <div class="loading-cell"></div><div class="loading-cell"></div><div class="loading-cell"></div><div class="loading-cell"></div>
          <div class="loading-cell"></div><div class="loading-cell"></div><div class="loading-cell"></div><div class="loading-cell"></div>
        </div>
        <div class="loading-title">PIXEL ART AVATAR</div>
        <div class="loading-subtitle">Loading Canvas · · ·</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
