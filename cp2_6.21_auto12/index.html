<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>声控解谜 - Sound Puzzle Platformer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }

    body {
      background: radial-gradient(ellipse at center, #1F2833 0%, #0B0C10 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #gameCanvas {
      display: block;
      image-rendering: pixelated;
      box-shadow: 0 0 60px rgba(102, 252, 241, 0.3);
      border-radius: 8px;
    }

    #uiContainer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #uiContainer > * {
      pointer-events: auto;
    }

    .screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s ease-in-out;
    }

    .screen.active {
      opacity: 1;
    }

    .btn {
      padding: 12px 32px;
      font-size: 18px;
      font-weight: bold;
      color: #0B0C10;
      background: linear-gradient(135deg, #45A29E 0%, #66FCF1 100%);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 15px rgba(102, 252, 241, 0.3);
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 25px rgba(102, 252, 241, 0.5);
    }

    .btn:active {
      transform: scale(1.02);
    }

    .hidden {
      display: none !important;
    }

    .stars {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .star {
      position: absolute;
      background: #ffffff;
      border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="stars" id="starsContainer"></div>
  <canvas id="gameCanvas"></canvas>
  <div id="uiContainer"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
