<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星际舰队指挥官</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #0a0a1a 0%, #1c0e2b 100%);
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      color: #a8d8ea;
    }
    #app {
      display: flex;
      width: 100%;
      height: 100vh;
    }
    #fleet-panel {
      width: 240px;
      min-width: 240px;
      height: 100vh;
      background: rgba(10,10,20,0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-right: 1px solid rgba(240,208,96,0.15);
      overflow-y: auto;
      z-index: 10;
      transition: transform 0.3s ease;
    }
    #fleet-panel.collapsed {
      transform: translateX(-240px);
    }
    #game-container {
      flex: 1;
      min-height: 500px;
      position: relative;
    }
    #command-panel {
      width: 280px;
      min-width: 280px;
      height: 100vh;
      background: rgba(10,10,20,0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-left: 1px solid rgba(240,208,96,0.15);
      overflow-y: auto;
      z-index: 10;
      transition: transform 0.3s ease;
    }
    #command-panel.collapsed {
      transform: translateX(280px);
    }
    .panel-title {
      text-align: center;
      padding: 16px 12px;
      font-size: 16px;
      font-weight: bold;
      color: #f0d060;
      text-shadow: 0 0 10px rgba(240,208,96,0.5);
      border-bottom: 1px solid rgba(240,208,96,0.2);
      letter-spacing: 2px;
    }
    .fleet-card:hover {
      transform: scale(1.02);
      filter: brightness(1.15);
    }
    .fleet-card.selected {
      border-color: #f0d060;
      box-shadow: 0 0 8px rgba(240,208,96,0.4);
    }
    .fleet-card .ship-name {
      font-size: 13px;
      font-weight: 600;
      color: #a8d8ea;
    }
    .fleet-card .stars {
      color: #f0d060;
      font-size: 11px;
      text-shadow: 0 0 4px rgba(240,208,96,0.6);
    }
    .stat-row {
      display: flex;
      align-items: center;
      margin: 4px 0;
      font-size: 11px;
    }
    .stat-label {
      width: 36px;
      color: rgba(168,216,234,0.6);
    }
    .stat-bar-bg {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
      margin: 0 6px;
    }
    .stat-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    .stat-val {
      width: 32px;
      text-align: right;
      font-size: 10px;
      color: rgba(168,216,234,0.7);
    }
    .bar-hp { background: linear-gradient(90deg, #ff4444, #44ff44); }
    .bar-fire { background: linear-gradient(90deg, #4488ff, #ff4444); }
    .bar-speed { background: linear-gradient(90deg, #00cccc, #66ffff); }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      position: absolute;
      bottom: 10px;
      right: 10px;
    }
    .status-idle { background: radial-gradient(circle, #44ff44, #228822); }
    .status-moving {
      background: radial-gradient(circle, #4488ff, #2244aa);
      animation: pulse-blue 0.6s ease-in-out infinite;
    }
    .status-combat {
      background: radial-gradient(circle, #ff4444, #aa2222);
      animation: blink-red 0.2s step-end infinite;
    }
    @keyframes pulse-blue {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
    @keyframes blink-red {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .glow-idle { box-shadow: 0 0 4px 2px rgba(68,255,68,0.3); }
    .glow-moving { box-shadow: 0 0 4px 2px rgba(68,136,255,0.3); }
    .glow-combat { box-shadow: 0 0 4px 2px rgba(255,68,68,0.3); }
    .cmd-section {
      padding: 14px;
      border-bottom: 1px solid rgba(240,208,96,0.1);
    }
    .cmd-section h3 {
      font-size: 13px;
      color: #f0d060;
      margin-bottom: 10px;
      text-shadow: 0 0 6px rgba(240,208,96,0.3);
    }
    .mission-btn {
      display: block;
      width: 100%;
      padding: 8px 12px;
      margin: 6px 0;
      background: rgba(240,208,96,0.1);
      border: 1px solid rgba(240,208,96,0.3);
      border-radius: 6px;
      color: #f0d060;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s ease;
      text-align: left;
    }
    .mission-btn:hover {
      transform: scale(1.02);
      filter: brightness(1.15);
      background: rgba(240,208,96,0.2);
    }
    .mission-btn.active {
      background: rgba(240,208,96,0.25);
      border-color: #f0d060;
      box-shadow: 0 0 6px rgba(240,208,96,0.3);
    }
    .execute-btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      background: linear-gradient(135deg, rgba(240,208,96,0.3), rgba(240,208,96,0.15));
      border: 1px solid #f0d060;
      border-radius: 8px;
      color: #f0d060;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: 2px;
      text-shadow: 0 0 8px rgba(240,208,96,0.5);
    }
    .execute-btn:hover {
      transform: scale(1.02);
      filter: brightness(1.15);
      background: linear-gradient(135deg, rgba(240,208,96,0.45), rgba(240,208,96,0.25));
    }
    .execute-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }
    .status-info {
      font-size: 12px;
      color: rgba(168,216,234,0.7);
      line-height: 1.8;
    }
    .filter-bar {
      padding: 10px;
      border-bottom: 1px solid rgba(240,208,96,0.1);
      background: rgba(20,20,40,0.5);
    }
    .filter-row {
      margin-bottom: 8px;
    }
    .filter-row:last-child {
      margin-bottom: 0;
    }
    #search-input {
      width: 100%;
      padding: 6px 10px;
      background: rgba(10,10,30,0.8);
      border: 1px solid rgba(240,208,96,0.2);
      border-radius: 4px;
      color: #a8d8ea;
      font-size: 12px;
      outline: none;
      transition: all 0.15s ease;
    }
    #search-input::placeholder {
      color: rgba(168,216,234,0.4);
    }
    #search-input:focus {
      border-color: rgba(240,208,96,0.5);
      box-shadow: 0 0 4px rgba(240,208,96,0.2);
    }
    #star-filter {
      width: 100%;
      padding: 6px 8px;
      background: rgba(10,10,30,0.8);
      border: 1px solid rgba(240,208,96,0.2);
      border-radius: 4px;
      color: #a8d8ea;
      font-size: 12px;
      outline: none;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    #star-filter:focus {
      border-color: rgba(240,208,96,0.5);
    }
    #star-filter option {
      background: #0a0a1a;
      color: #a8d8ea;
    }
    .fleet-card {
      margin: 10px;
      padding: 10px;
      background: rgba(20,20,40,0.9);
      border: 1px solid rgba(168,216,234,0.15);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
      user-select: none;
    }
    .fleet-card.dragging {
      opacity: 0.4;
      transform: scale(0.98);
    }
    .fleet-card.drag-over {
      border-color: #f0d060;
      box-shadow: 0 0 12px rgba(240,208,96,0.5);
    }
    .drag-handle {
      position: absolute;
      left: 2px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(240,208,96,0.3);
      font-size: 10px;
      cursor: grab;
      padding: 2px 3px;
      letter-spacing: -2px;
    }
    .drag-handle:hover {
      color: rgba(240,208,96,0.6);
    }
    .fleet-card .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      margin-left: 16px;
    }
    .card-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 6px;
    }
    .expand-btn {
      font-size: 11px;
      color: rgba(168,216,234,0.6);
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 3px;
      transition: all 0.15s ease;
    }
    .expand-btn:hover {
      color: #f0d060;
      background: rgba(240,208,96,0.1);
    }
    .ship-detail {
      margin-top: 8px;
      padding: 10px;
      background: rgba(10,10,30,0.6);
      border-radius: 6px;
      border: 1px solid rgba(240,208,96,0.15);
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      font-size: 11px;
      border-bottom: 1px dashed rgba(168,216,234,0.1);
    }
    .detail-row:last-child {
      border-bottom: none;
    }
    .detail-label {
      color: rgba(168,216,234,0.6);
    }
    .detail-value {
      color: #a8d8ea;
      font-weight: 500;
    }
    .detail-value.star-gold {
      color: #f0d060;
      text-shadow: 0 0 4px rgba(240,208,96,0.5);
    }
    .detail-bar-row {
      align-items: center;
    }
    .detail-bar-row .detail-label {
      width: 36px;
      flex-shrink: 0;
    }
    .detail-bar {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
      margin: 0 6px;
    }
    .detail-bar-val {
      width: 60px;
      text-align: right;
      font-size: 10px;
      color: rgba(168,216,234,0.7);
      flex-shrink: 0;
    }
    .task-logs {
      max-height: 180px;
      overflow-y: auto;
      font-size: 11px;
      line-height: 1.6;
    }
    .task-logs::-webkit-scrollbar {
      width: 4px;
    }
    .task-logs::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
    }
    .task-logs::-webkit-scrollbar-thumb {
      background: rgba(240,208,96,0.3);
      border-radius: 2px;
    }
    .log-entry {
      padding: 5px 0;
      border-bottom: 1px dashed rgba(168,216,234,0.08);
      animation: logFadeIn 0.3s ease;
    }
    .log-entry:last-child {
      border-bottom: none;
    }
    .log-entry.empty {
      color: rgba(168,216,234,0.4);
      text-align: center;
      padding: 12px 0;
    }
    .log-time {
      color: rgba(240,208,96,0.6);
      margin-right: 6px;
      font-family: 'Courier New', monospace;
    }
    .log-msg {
      color: rgba(168,216,234,0.85);
    }
    @keyframes logFadeIn {
      from {
        opacity: 0;
        transform: translateY(-5px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .mobile-toggle {
      display: none;
      position: fixed;
      z-index: 100;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(240,208,96,0.4);
      background: rgba(10,10,20,0.9);
      color: #f0d060;
      font-size: 18px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
    }
    #toggle-left { top: 10px; left: 10px; }
    #toggle-right { top: 10px; right: 10px; }
    @media (max-width: 900px) {
      #fleet-panel {
        position: fixed;
        left: 0;
        top: 0;
        transform: translateX(-240px);
      }
      #fleet-panel.open { transform: translateX(0); }
      #command-panel {
        position: fixed;
        right: 0;
        top: 0;
        transform: translateX(280px);
      }
      #command-panel.open { transform: translateX(0); }
      .mobile-toggle { display: flex; }
    }
  </style>
</head>
<body>
  <button id="toggle-left" class="mobile-toggle">☰</button>
  <button id="toggle-right" class="mobile-toggle">⚙</button>
  <div id="app">
    <div id="fleet-panel">
      <div class="panel-title">⚓ 舰队列表</div>
      <div id="fleet-list"></div>
    </div>
    <div id="game-container"></div>
    <div id="command-panel">
      <div class="panel-title">📡 指挥面板</div>
      <div id="cmd-content"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
