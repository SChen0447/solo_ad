<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DNA结构探索器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 100%);
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #title-bar {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      color: rgba(255, 255, 255, 0.75);
      pointer-events: none;
      user-select: none;
    }

    #title-bar h1 {
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 2px;
      margin-bottom: 6px;
      text-shadow: 0 0 10px rgba(79, 195, 247, 0.3);
    }

    #title-bar .sequence-info {
      font-size: 13px;
      opacity: 0.6;
    }

    #info-panel {
      position: absolute;
      top: 20px;
      right: -320px;
      width: 300px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 12px;
      border: 1px solid rgba(79, 195, 247, 0.2);
      padding: 20px;
      color: white;
      transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    #info-panel.open {
      right: 20px;
    }

    #info-panel .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    #info-panel .panel-title {
      font-size: 16px;
      font-weight: 500;
      color: #4fc3f7;
    }

    #info-panel .close-btn {
      width: 24px;
      height: 24px;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.1s ease;
    }

    #info-panel .close-btn:hover {
      background: rgba(255, 100, 100, 0.4);
      transform: scale(1.05);
    }

    #info-panel .close-btn:active {
      transform: scale(0.95);
    }

    #info-panel .info-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 14px;
    }

    #info-panel .info-row:last-child {
      border-bottom: none;
    }

    #info-panel .info-label {
      color: rgba(255, 255, 255, 0.6);
    }

    #info-panel .info-value {
      color: white;
      font-weight: 500;
      text-align: right;
    }

    #info-panel .base-color {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 3px;
      margin-left: 6px;
      vertical-align: middle;
      box-shadow: 0 0 6px currentColor;
    }

    .dg.ac {
      z-index: 100 !important;
    }

    .dg.main .close-button {
      background: linear-gradient(135deg, #7c4dff, #4fc3f7) !important;
      border-radius: 8px !important;
      margin: 4px !important;
      color: white !important;
      font-weight: 500 !important;
      transition: transform 0.1s ease !important;
    }

    .dg.main .close-button:hover {
      transform: scale(1.02);
    }

    .dg.main .close-button:active {
      transform: scale(0.98);
    }

    .dg.main .button {
      background: linear-gradient(135deg, #4fc3f7, #7c4dff) !important;
      color: white !important;
      border-radius: 6px !important;
      margin: 3px 0 !important;
      transition: all 0.1s ease !important;
      text-shadow: none !important;
    }

    .dg.main .button:hover {
      filter: brightness(1.1);
    }

    .dg.main .button:active {
      transform: scale(0.97);
    }

    .dg.main .c input[type="text"] {
      border: 1px solid rgba(79, 195, 247, 0.3) !important;
      background: rgba(0, 0, 0, 0.3) !important;
      color: white !important;
      border-radius: 4px !important;
      padding: 3px 6px !important;
      outline: none !important;
      transition: border-color 0.2s ease, box-shadow 0.2s ease !important;
      font-family: 'Courier New', monospace !important;
      letter-spacing: 1px !important;
    }

    .dg.main .c input[type="text"]:focus {
      border-color: #4fc3f7 !important;
      box-shadow: 0 0 8px rgba(79, 195, 247, 0.5) !important;
    }

    .sequence-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .sequence-input-wrapper input[type="text"] {
      flex: 1;
    }

    .validation-icon {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ef5350;
      color: white;
      font-size: 11px;
      font-weight: bold;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: help;
      z-index: 5;
      box-shadow: 0 0 6px rgba(239, 83, 80, 0.6);
      font-family: Arial, sans-serif;
      line-height: 1;
    }

    .validation-icon.visible {
      display: flex;
    }

    .validation-icon:hover .validation-tooltip {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(-4px);
    }

    .validation-tooltip {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) translateY(0);
      background: rgba(0, 0, 0, 0.85);
      color: #ffcdd2;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 11px;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      transition: all 0.15s ease;
      pointer-events: none;
      border: 1px solid rgba(239, 83, 80, 0.3);
      font-weight: normal;
      letter-spacing: normal;
    }

    .validation-tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: rgba(0, 0, 0, 0.85);
    }

    .sequence-status {
      font-size: 12px !important;
      color: #4fc3f7 !important;
      margin-top: 2px !important;
      padding-left: 2px !important;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      text-shadow: 0 0 6px rgba(79, 195, 247, 0.4);
      letter-spacing: 0.5px;
      height: 0;
      overflow: hidden;
      display: block;
    }

    .sequence-status.visible {
      opacity: 1;
      height: 18px;
    }

    @media (max-width: 768px) {
      #title-bar h1 {
        font-size: 14px;
      }

      #title-bar .sequence-info {
        font-size: 11px;
      }

      #info-panel {
        width: 260px;
        padding: 14px;
      }

      #info-panel.open {
        right: 10px;
      }

      .dg {
        font-size: 11px !important;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    
    <div id="title-bar">
      <h1>DNA结构探索器</h1>
      <div class="sequence-info">当前序列长度: <span id="seq-length">24</span> 碱基对</div>
    </div>

    <div id="info-panel">
      <div class="panel-header">
        <span class="panel-title">碱基详情</span>
        <button class="close-btn" id="close-panel">×</button>
      </div>
      <div class="info-row">
        <span class="info-label">碱基名称</span>
        <span class="info-value" id="base-name">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">碱基符号</span>
        <span class="info-value" id="base-symbol">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">序列位置</span>
        <span class="info-value" id="base-index">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">配对碱基</span>
        <span class="info-value" id="base-pair">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">氢键数量</span>
        <span class="info-value" id="base-hydrogen">-</span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
