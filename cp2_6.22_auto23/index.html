<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>塔防与资源采集</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #2D1B0E;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }
    #game-container {
      position: relative;
      display: flex;
      background: #FFF8E7;
      border: 4px solid #3E2723;
      border-radius: 8px;
      overflow: hidden;
    }
    #game-canvas {
      display: block;
      cursor: pointer;
    }
    #ui-canvas {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }
    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .interactive {
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="ui-layer"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
