<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>纸偶动画风格磁带录音机</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a1a;
      font-family: 'Georgia', serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #app {
      position: relative;
      width: 640px;
      height: 480px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
    }

    #gameCanvas {
      display: block;
      width: 640px;
      height: 480px;
      image-rendering: pixelated;
    }

    .hint {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      color: #fdf5e6;
      font-size: 12px;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
      pointer-events: none;
      opacity: 0.85;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas" width="640" height="480"></canvas>
    <div class="hint">空格:播放/暂停 &nbsp; R:录音 &nbsp; ←:倒带 &nbsp; →:快进</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
