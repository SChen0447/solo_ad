<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>城市内涝3D模拟系统</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 12px 20px;
    }
    #title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 6px;
    }
    #info-bar {
      font-size: 14px;
      display: flex;
      gap: 24px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="header">
      <div id="title">城市内涝3D模拟系统</div>
      <div id="info-bar">
        <span id="water-level">水位: 0.00m</span>
        <span id="rain-intensity">降雨强度: 0mm/h</span>
        <span id="simulation-time">模拟时间: 00:00</span>
        <span id="fps">FPS: 60</span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/App.ts"></script>
</body>
</html>
