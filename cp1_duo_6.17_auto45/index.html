<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日照模拟与分析</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
      background: radial-gradient(circle at center, #1a1a2e 0%, #16213e 100%);
    }

    #app-title {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #ffffff;
      font-size: 20px;
      font-weight: 500;
      z-index: 100;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
      pointer-events: none;
    }

    #screenshot-btn {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(0, 0, 0, 0.7);
      color: #ffffff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s ease;
    }

    #screenshot-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    #screenshot-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    #legend {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      background: rgba(0, 0, 0, 0.7);
      padding: 12px;
      border-radius: 4px;
    }

    #legend-bar {
      width: 20px;
      height: 200px;
      background: linear-gradient(to top, #00ff00, #ffff00, #ff0000);
      border-radius: 2px;
    }

    #legend-labels {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 200px;
      position: absolute;
      left: 48px;
      font-size: 12px;
      color: #ffffff;
    }

    #legend-title {
      color: #ffffff;
      font-size: 12px;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="app-title">日照模拟与分析</div>
    <button id="screenshot-btn">
      <svg viewBox="0 0 24 24">
        <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7zm0-5.5a2 2 0 1 1 0 4 2 2 0 0 1 0-4zM9 4L7.17 6H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-3.17L15 4H9z"/>
      </svg>
      截图保存
    </button>
    <div id="legend">
      <div id="legend-title">阴影比例</div>
      <div style="position: relative; display: flex;">
        <div id="legend-bar"></div>
        <div id="legend-labels">
          <span>100%</span>
          <span>50%</span>
          <span>0%</span>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
