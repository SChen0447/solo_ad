<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>三消对战 - Match3 Battle</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(180deg, #0a0a2e 0%, #1a0033 100%);
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #gameContainer {
      display: flex;
      width: 100%;
      height: 100%;
    }
    #uiPanel {
      width: 260px;
      height: 100%;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      color: #ffffff;
      background: rgba(10, 10, 46, 0.85);
      border-right: 1px solid rgba(0, 255, 255, 0.2);
    }
    #uiPanel h2 {
      font-size: 18px;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }
    .player-info {
      padding: 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .player-info.p1 { border-color: rgba(0, 229, 255, 0.4); }
    .player-info.p2 { border-color: rgba(255, 0, 229, 0.4); }
    .player-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .p1 .player-name { color: #00e5ff; }
    .p2 .player-name { color: #ff00e5; }
    .score-text {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .score-bar {
      width: 200px;
      height: 20px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.1);
      overflow: hidden;
      position: relative;
    }
    .score-fill {
      height: 100%;
      width: 0%;
      transition: width 0.2s ease-out;
      border-radius: 10px;
    }
    .p1 .score-fill {
      background: linear-gradient(90deg, #00e5ff 0%, #0077ff 100%);
      box-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
    }
    .p2 .score-fill {
      background: linear-gradient(90deg, #ff00e5 0%, #7700ff 100%);
      box-shadow: 0 0 10px rgba(255, 0, 229, 0.5);
    }
    #timerSection {
      text-align: center;
      padding: 20px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 255, 255, 0.3);
    }
    #timerLabel {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 6px;
    }
    #timerValue {
      font-size: 40px;
      font-weight: 700;
      color: #00ffff;
      text-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
      font-variant-numeric: tabular-nums;
    }
    #gameControls {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #gameControls button {
      width: 100%;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.5px;
      transition: all 0.2s ease;
    }
    #startBtn {
      background: linear-gradient(135deg, #00e5ff 0%, #0077ff 100%);
      color: #0a0a2e;
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
    }
    #startBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 25px rgba(0, 229, 255, 0.6);
    }
    #resetBtn {
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.2) !important;
    }
    #resetBtn:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    #statusText {
      text-align: center;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.05);
    }
    #canvasContainer {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    #canvasWrapper {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    canvas {
      display: block;
    }
    #mainCanvas {
      position: relative;
      z-index: 1;
    }
    .label {
      position: absolute;
      padding: 6px 16px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 14px;
      z-index: 10;
      letter-spacing: 1px;
    }
    #labelP1 {
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #00e5ff;
      background: rgba(0, 229, 255, 0.15);
      border: 1px solid rgba(0, 229, 255, 0.4);
    }
    #labelP2 {
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #ff00e5;
      background: rgba(255, 0, 229, 0.15);
      border: 1px solid rgba(255, 0, 229, 0.4);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="gameContainer">
      <div id="uiPanel">
        <div id="timerSection">
          <div id="timerLabel">剩余时间</div>
          <div id="timerValue">02:00</div>
        </div>
        <div class="player-info p1">
          <div class="player-name">玩家一 (上屏)</div>
          <div class="score-text" id="scoreP1">0</div>
          <div class="score-bar"><div class="score-fill" id="barP1"></div></div>
        </div>
        <div class="player-info p2">
          <div class="player-name">玩家二 (下屏)</div>
          <div class="score-text" id="scoreP2">0</div>
          <div class="score-bar"><div class="score-fill" id="barP2"></div></div>
        </div>
        <div id="statusText">点击「开始游戏」开始对战</div>
        <div id="gameControls">
          <button id="startBtn">开始游戏</button>
          <button id="resetBtn">重置游戏</button>
        </div>
      </div>
      <div id="canvasContainer">
        <div id="canvasWrapper">
          <span class="label" id="labelP1">PLAYER 1</span>
          <canvas id="mainCanvas"></canvas>
          <span class="label" id="labelP2">PLAYER 2</span>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
