<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>沙盘推演 - 策略对战</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #d4b996;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #app {
      display: flex;
      width: 100vw;
      height: 100vh;
      padding: 12px;
      gap: 12px;
    }

    #map-container {
      position: relative;
      flex-shrink: 0;
      border: 3px solid #c9a96e;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    #battlefield {
      display: block;
    }

    #right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 280px;
      max-width: 340px;
    }

    #status-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
      background: rgba(201, 169, 110, 0.25);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 2px solid #c9a96e;
      border-radius: 8px;
      overflow-y: auto;
      transition: box-shadow 0.3s;
    }

    #status-panel.ai-turn {
      box-shadow: 0 0 18px 4px rgba(60, 120, 255, 0.5);
      animation: aiPulse 0.8s ease-in-out infinite alternate;
    }

    @keyframes aiPulse {
      from { box-shadow: 0 0 12px 2px rgba(60, 120, 255, 0.3); }
      to { box-shadow: 0 0 24px 6px rgba(60, 120, 255, 0.6); }
    }

    .panel-title {
      font-size: 15px;
      font-weight: bold;
      color: #5a3e1b;
      text-align: center;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(201, 169, 110, 0.5);
      margin-bottom: 4px;
    }

    .unit-card {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 2px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .unit-card:hover {
      background: rgba(255, 255, 255, 0.35);
    }

    .unit-card.selected {
      border-color: #ffd700;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
    }

    .unit-card.dead {
      opacity: 0.35;
      pointer-events: none;
      filter: grayscale(1);
    }

    .unit-card .emoji {
      font-size: 24px;
      width: 32px;
      text-align: center;
    }

    .unit-card .info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .unit-card .name-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #5a3e1b;
    }

    .unit-card .hp-bar {
      height: 6px;
      background: rgba(0,0,0,0.2);
      border-radius: 3px;
      overflow: hidden;
    }

    .unit-card .hp-bar .hp-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s, background 0.3s;
    }

    .unit-card .pos {
      font-size: 10px;
      color: #8a6e3b;
    }

    #action-panel {
      padding: 12px;
      background: rgba(201, 169, 110, 0.25);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 2px solid #c9a96e;
      border-radius: 8px;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #action-panel .turn-info {
      font-size: 14px;
      font-weight: bold;
      color: #5a3e1b;
      text-align: center;
    }

    #action-panel .hint {
      font-size: 12px;
      color: #7a5e2b;
      text-align: center;
      min-height: 18px;
    }

    .action-btn {
      padding: 8px 16px;
      border: 2px solid #c9a96e;
      border-radius: 6px;
      background: rgba(201, 169, 110, 0.4);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      color: #5a3e1b;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.15s;
    }

    .action-btn:hover:not(:disabled) {
      background: rgba(201, 169, 110, 0.6);
      transform: translateY(-1px);
    }

    .action-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .action-btn.primary {
      background: rgba(201, 169, 110, 0.6);
      border-color: #b8942e;
    }

    .action-btn.primary:hover:not(:disabled) {
      background: rgba(201, 169, 110, 0.8);
    }

    #tooltip {
      position: fixed;
      padding: 8px 12px;
      background: rgba(90, 62, 27, 0.92);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      color: #f0e0c0;
      font-size: 12px;
      border-radius: 6px;
      border: 1px solid #c9a96e;
      pointer-events: none;
      z-index: 1000;
      display: none;
      line-height: 1.6;
      white-space: nowrap;
    }

    #deploy-bar {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    #deploy-bar .deploy-btn {
      padding: 6px 12px;
      border: 2px solid #c9a96e;
      border-radius: 6px;
      background: rgba(201, 169, 110, 0.4);
      backdrop-filter: blur(6px);
      color: #5a3e1b;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
    }

    #deploy-bar .deploy-btn:hover:not(:disabled) {
      background: rgba(201, 169, 110, 0.7);
    }

    #deploy-bar .deploy-btn.active {
      background: rgba(255, 215, 0, 0.4);
      border-color: #ffd700;
      box-shadow: 0 0 8px rgba(255, 215, 0, 0.4);
    }

    #deploy-bar .deploy-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .section-label {
      font-size: 11px;
      color: #8a6e3b;
      text-align: center;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="map-container">
      <canvas id="battlefield"></canvas>
    </div>
    <div id="right-panel">
      <div id="status-panel">
        <div class="panel-title" id="player-title">玩家单位</div>
        <div id="player-cards"></div>
        <div class="panel-title" id="ai-title" style="margin-top:8px;">AI单位</div>
        <div id="ai-cards"></div>
      </div>
      <div id="action-panel">
        <div class="turn-info" id="turn-info">第 1 回合</div>
        <div class="hint" id="hint-text">部署你的单位</div>
        <div id="deploy-bar"></div>
        <div id="action-buttons"></div>
      </div>
    </div>
  </div>
  <div id="tooltip"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
