<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AQI 3D Particle Cloud Explorer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0b0f19 0%, #1a2332 100%);
      color: #ffffff;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .label-tooltip {
      background: rgba(255, 255, 255, 0.92);
      color: #1a202c;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      line-height: 1.6;
      border: 2px solid rgba(220, 230, 245, 0.9);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.8),
        inset 0 -1px 0 rgba(180, 195, 220, 0.4),
        0 2px 8px rgba(0, 0, 0, 0.2),
        0 0 12px rgba(99, 179, 237, 0.15);
      pointer-events: none;
      white-space: nowrap;
      transition: opacity 0.2s ease, transform 0.2s ease;
      opacity: 0;
      transform: translateY(2px);
    }

    .label-tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .city-info {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(11, 15, 25, 0.8);
      border-radius: 8px;
      padding: 12px 16px;
      color: #ffffff;
      font-size: 13px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 10;
    }

    .city-name {
      font-size: 16px;
      font-weight: 600;
      color: #63b3ed;
      margin-bottom: 4px;
    }

    .city-stats {
      color: #a0aec0;
      font-size: 12px;
    }

    .dg.ac {
      z-index: 100 !important;
    }

    .dg.main .close-button {
      background-color: #1a2332;
      color: #a0aec0;
    }

    .dg li:not(.folder) {
      background: #1a2332;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .dg .cr.function .property-name {
      color: #63b3ed;
    }

    .dg .title {
      background: #0b0f19;
      color: #e0e6ed;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div class="city-info">
    <div class="city-name" id="city-name">北京</div>
    <div class="city-stats" id="city-stats">采样点: 20 | 平均AQI: --</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
