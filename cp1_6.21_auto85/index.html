<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>虚拟博物馆 - 导览路线设计器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #2a2a2a;
      font-family: Georgia, 'Times New Roman', serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #three-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="three-container"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
