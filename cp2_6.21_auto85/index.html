<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>城市街区三维热力分布</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0A0E17; font-family: 'Segoe UI', Arial, sans-serif; color: #E5E7EB; }
    #app { display: flex; width: 100%; height: 100%; }
    #viewport { width: 70%; height: 100%; position: relative; }
    #viewport canvas { display: block; width: 100%; height: 100%; }
    #panel { width: 30%; height: 100%; background: #121926; border-radius: 12px; margin: 8px 8px 8px 0; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    #tooltip { position: absolute; pointer-events: none; display: none; background: rgba(255,255,255,0.95); color: #111; border-radius: 8px; width: 180px; height: 120px; padding: 10px; font-size: 13px; line-height: 1.5; box-shadow: 0 4px 16px rgba(0,0,0,0.3); z-index: 100; }
    @media (max-width: 768px) {
      #app { flex-direction: column; }
      #viewport { width: 100%; height: 55%; }
      #panel { width: 100%; height: 45%; margin: 0; border-radius: 12px 12px 0 0; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="viewport">
      <div id="tooltip"></div>
    </div>
    <div id="panel"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
