<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智慧城市 · 道路车流3D热力图</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000000;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    #scene-container {
      width: 100%; height: 100%;
      display: block;
    }
    #tooltip {
      position: absolute;
      display: none;
      padding: 6px 10px;
      background: rgba(0,0,0,0.8);
      color: #ffffff;
      font-size: 12px;
      border-radius: 4px;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
      line-height: 1.5;
    }
    #fps-warning {
      position: absolute;
      bottom: 20px;
      right: 20px;
      display: none;
      z-index: 100;
    }
    #fps-warning svg {
      width: 40px; height: 40px;
      filter: drop-shadow(0 0 6px rgba(239,68,68,0.6));
    }
    @keyframes pulse-warn {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }
    #fps-warning.active {
      display: block;
      animation: pulse-warn 0.5s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div id="scene-container"></div>
  <div id="tooltip"></div>
  <div id="fps-warning">
    <svg viewBox="0 0 24 24" fill="#ef4444">
      <path d="M12 2L1 21h22L12 2zm0 4l7.53 13H4.47L12 6zm-1 5v4h2v-4h-2zm0 6v2h2v-2h-2z"/>
    </svg>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
