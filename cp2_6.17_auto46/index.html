<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星际矿物采集器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #050510;
      color: #c0c0e0;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    #game-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      width: 100%;
      max-width: 1200px;
      padding: 16px;
    }

    .side-hint {
      width: 160px;
      text-align: center;
      font-size: 13px;
      color: rgba(0, 229, 255, 0.5);
      line-height: 1.8;
      flex-shrink: 0;
    }

    .side-hint .key {
      display: inline-block;
      background: rgba(0, 229, 255, 0.12);
      border: 1px solid rgba(0, 229, 255, 0.3);
      border-radius: 4px;
      padding: 1px 7px;
      font-size: 12px;
      margin: 0 2px;
      color: #00e5ff;
    }

    #game-container {
      position: relative;
      width: 800px;
      height: 600px;
      flex-shrink: 0;
    }

    #gameCanvas {
      display: block;
      width: 800px;
      height: 600px;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(0, 229, 255, 0.15), 0 0 60px rgba(0, 229, 255, 0.05);
      cursor: crosshair;
    }

    @media (max-width: 1100px) {
      .side-hint {
        display: none;
      }
    }

    @media (max-width: 860px) {
      #game-container {
        width: 100%;
        height: auto;
        aspect-ratio: 4 / 3;
      }
      #gameCanvas {
        width: 100%;
        height: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <div class="side-hint">
      <div style="margin-bottom: 12px; font-size: 14px; color: rgba(0,229,255,0.8);">操作提示</div>
      <div><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> 移动飞船</div>
      <div style="margin-top: 8px;"><span class="key">鼠标</span> 控制方向</div>
      <div style="margin-top: 8px;"><span class="key">左键</span> 发射激光采集</div>
      <div style="margin-top: 16px; font-size: 11px; color: rgba(0,229,255,0.3);">采集矿石升级飞船</div>
    </div>
    <div id="game-container">
      <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>
    <div class="side-hint">
      <div style="margin-bottom: 12px; font-size: 14px; color: rgba(0,229,255,0.8);">矿石图鉴</div>
      <div style="color: #ff4466;">◆ 红色水晶 +10</div>
      <div style="margin-top: 6px; color: #44aaff;">❄ 蓝色冰晶 +15</div>
      <div style="margin-top: 6px; color: #ffcc00;">★ 金色金块 +25</div>
      <div style="margin-top: 16px; font-size: 11px; color: rgba(0,229,255,0.3);">稀有矿石分值更高</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
