<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>手势密码强度分析</title>
  <style>
    :root {
      --primary-blue: #3B82F6;
      --primary-purple: #6366F1;
      --danger-red: #EF4444;
      --danger-red-hover: #DC2626;
      --warning-yellow: #F59E0B;
      --success-green: #22C55E;
      --bg-light: #F8FAFC;
      --bg-white: #FFFFFF;
      --border-gray: #E2E8F0;
      --text-primary: #1E293B;
      --text-secondary: #64748B;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--bg-light);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .app-container {
      display: flex;
      min-height: 100vh;
      padding: 24px;
      gap: 24px;
    }

    .grid-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-light);
      border-radius: 12px;
      min-height: 600px;
      position: relative;
    }

    .mode-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 8px;
    }

    .mode-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: none;
      background-color: var(--border-gray);
      color: var(--text-primary);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .mode-btn:hover {
      background-color: #cbd5e1;
    }

    .mode-btn.active::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 2px;
      background-color: var(--primary-blue);
      border-radius: 1px;
      transition: all 0.3s ease;
    }

    #gestureCanvas {
      cursor: crosshair;
      transition: all 0.3s ease;
      touch-action: none;
    }

    .panel-section {
      width: 320px;
      background-color: var(--bg-white);
      border: 1px solid var(--border-gray);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 600px;
    }

    .panel-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .strength-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .strength-label {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .strength-bar-container {
      width: 100%;
      height: 8px;
      background-color: var(--border-gray);
      border-radius: 4px;
      overflow: hidden;
    }

    .strength-bar {
      height: 100%;
      width: 0%;
      border-radius: 4px;
      transition: width 0.5s ease, background-color 0.3s ease;
    }

    .strength-bar.weak {
      background-color: var(--danger-red);
    }

    .strength-bar.medium {
      background: linear-gradient(90deg, var(--danger-red) 0%, var(--warning-yellow) 100%);
    }

    .strength-bar.strong {
      background: linear-gradient(90deg, var(--warning-yellow) 0%, var(--success-green) 100%);
    }

    .score-display {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .score-value {
      font-size: 24px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .suggestions-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .suggestions-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .suggestion-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .suggestion-item {
      font-size: 14px;
      color: var(--text-secondary);
      padding-left: 16px;
      position: relative;
    }

    .suggestion-item::before {
      content: '•';
      position: absolute;
      left: 0;
      color: var(--primary-purple);
    }

    .action-buttons {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .btn {
      flex: 1;
      height: 36px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background-color: var(--primary-blue);
      color: white;
    }

    .btn-primary:hover {
      background-color: #2563eb;
    }

    .btn-secondary {
      background-color: var(--border-gray);
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      background-color: #cbd5e1;
    }

    .btn-danger {
      background-color: var(--danger-red);
      color: white;
    }

    .btn-danger:hover {
      background-color: var(--danger-red-hover);
    }

    .history-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .btn-clear {
      width: 100px;
      height: 36px;
      border-radius: 8px;
      border: none;
      background-color: var(--danger-red);
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-clear:hover {
      background-color: var(--danger-red-hover);
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .history-item {
      height: 48px;
      background-color: var(--bg-light);
      border-radius: 8px;
      padding: 0 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      border-bottom: 1px solid var(--border-gray);
      transition: background-color 0.2s ease;
    }

    .history-item:hover {
      background-color: var(--border-gray);
    }

    .history-item.fade-out {
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .history-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .history-grid {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .history-time {
      font-size: 11px;
      color: #94a3b8;
    }

    .history-score {
      font-size: 16px;
      font-weight: 600;
    }

    .history-score.weak {
      color: var(--danger-red);
    }

    .history-score.medium {
      color: var(--warning-yellow);
    }

    .history-score.strong {
      color: var(--success-green);
    }

    .empty-history {
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
      padding: 24px 0;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      width: 280px;
      background-color: var(--bg-white);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal-content {
      transform: scale(1);
    }

    .modal-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      background-color: rgba(34, 197, 94, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-icon svg {
      width: 24px;
      height: 24px;
      color: var(--success-green);
    }

    .modal-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .modal-score {
      font-size: 14px;
      color: var(--text-secondary);
    }

    @media (max-width: 768px) {
      .app-container {
        flex-direction: column;
        padding: 16px;
      }

      .grid-section {
        min-height: 400px;
      }

      .panel-section {
        width: 100%;
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="grid-section">
      <div class="mode-toggle">
        <button class="mode-btn active" data-mode="3">3×3</button>
        <button class="mode-btn" data-mode="4">4×4</button>
      </div>
      <canvas id="gestureCanvas" width="400" height="400"></canvas>
    </div>
    <div class="panel-section">
      <h1 class="panel-title">手势密码强度分析</h1>
      
      <div class="strength-section">
        <div class="strength-label">密码强度</div>
        <div class="strength-bar-container">
          <div class="strength-bar" id="strengthBar"></div>
        </div>
        <div class="score-display">
          评分：<span class="score-value" id="scoreValue">0</span> 分
        </div>
      </div>

      <div class="suggestions-section">
        <div class="suggestions-title">改进建议</div>
        <ul class="suggestion-list" id="suggestionList">
          <li class="suggestion-item">请在左侧网格绘制手势密码</li>
        </ul>
      </div>

      <div class="action-buttons">
        <button class="btn btn-primary" id="saveBtn">保存</button>
        <button class="btn btn-secondary" id="resetBtn">重置</button>
      </div>

      <div class="history-section">
        <div class="history-header">
          <div class="history-title">历史记录</div>
          <button class="btn-clear" id="clearBtn">清空历史</button>
        </div>
        <div class="history-list" id="historyList">
          <div class="empty-history">暂无保存的手势</div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="saveModal">
    <div class="modal-content">
      <div class="modal-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
      </div>
      <div class="modal-title">已保存</div>
      <div class="modal-score" id="modalScore">评分：0 分</div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
